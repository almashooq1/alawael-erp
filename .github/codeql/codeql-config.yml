# CodeQL configuration for alawael-erp (W1276).
#
# Why advanced setup instead of default setup:
#   The first default-setup scan (2026-06-12) produced 4,890
#   js/missing-rate-limiting alerts — all false positives. The backend
#   applies a global Redis-backed limiter to every API route:
#     backend/startup/middleware.js:  app.use('/api', apiLimiter);
#   CodeQL cannot see the limiter because it is wired in a separate
#   startup module, and every new route file would re-trigger the rule.
#   Default setup does not support query filters, so we exclude the rule
#   here and keep every other security query active.

name: "alawael-erp CodeQL config"

paths-ignore:
  # Dead code graveyard — archived, never deployed.
  - _archived
  # Generated / vendored / non-source artifacts.
  - coverage
  - uploads
  - logs
  - "**/node_modules"
  # Prose-only documentation (code snippets are illustrative).
  - docs

query-filters:
  # False positive at scale: global `app.use('/api', apiLimiter)` in
  # backend/startup/middleware.js (express-rate-limit + rate-limit-redis)
  # already rate-limits every API route. See header comment.
  - exclude:
      id: js/missing-rate-limiting
  # False positive at scale (2,931 alerts, W1277): the project has ZERO SQL
  # databases — no mysql/pg/sequelize/knex/typeorm dependency anywhere.
  # Every flagged sink is a Mongoose query (Model.find/findOne/...), and
  # NoSQL operator injection is neutralized globally before any route:
  #   backend/startup/middleware.js L164: app.use(sanitizeInput)
  #   backend/middleware/sanitize.js: express-mongo-sanitize({replaceWith:'_'})
  # which strips `$`/`.` keys from req.body/query/params. CodeQL cannot see
  # the wiring across the startup module boundary (same blind spot as the
  # rate-limiting rule above).
  - exclude:
      id: js/sql-injection
  # Noise at scale (764 alerts, W1277): name-based heuristic flags ordinary
  # REST filter params (?beneficiary=, ?status=, ?nationalId=) read in GET
  # list endpoints as "sensitive data in query string". These are resource
  # filters, not credentials/secrets; the API is HTTPS-only and auth is via
  # Authorization headers, never query strings.
  - exclude:
      id: js/sensitive-get-query
