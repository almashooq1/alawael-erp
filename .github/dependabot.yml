# ════════════════════════════════════════════════════════════════
#  Al-Awael ERP — Dependabot Configuration
#  تحديث التبعيات تلقائياً: npm + GitHub Actions
#
#  سياسة الإصدارات الكبرى (semver-major) — مُضافة 2026-05-29 (W561):
#  نتجاهل ترقيات major تلقائياً في كل حِزم npm. السبب الجذري: ترقيات
#  major شبه دائماً كاسرة وتحتاج ترحيل يدوي للكود، فطلبات Dependabot
#  الآلية لها تَفشل في CI أسبوعياً بلا فائدة (≈35 طلباً فاشلاً تراكَم
#  هكذا). الترقيات الصغيرة/التصحيحية (minor/patch) — بما فيها تصحيحات
#  الأمان — تستمر تلقائياً كالمعتاد.
#  لتفعيل ترقية major لحزمة بعينها عند الرغبة في ترحيلها: احذف هذه
#  الحزمة من قائمة ignore (أو نفّذ الترقية يدوياً).
#  حزم github-actions لا تتأثر بالتجاهل عمداً — نريد إبقاء الإجراءات
#  محدّثة (مثل الابتعاد عن وقت تشغيل Node 20 المهمَل).
# ════════════════════════════════════════════════════════════════
version: 2

updates:
  # ─── Backend npm dependencies ────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "saturday"
      time: "06:00"
      timezone: "Asia/Riyadh"
    open-pull-requests-limit: 10
    reviewers:
      - "almashooq1"
    labels:
      - "dependencies"
      - "backend"
    commit-message:
      prefix: "chore(deps)"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      express:
        patterns:
          - "express*"
          - "body-parser"
          - "cors"
          - "helmet"
          - "compression"
      database:
        patterns:
          - "mongoose"
          - "mongodb"
          - "redis"
          - "ioredis"
      testing:
        dependency-type: "development"
        patterns:
          - "jest*"
          - "supertest"
          - "@testing-library/*"
      security:
        patterns:
          - "jsonwebtoken"
          - "bcrypt*"
          - "passport*"
          - "express-rate-limit"

  # ─── Frontend npm dependencies ───────────────────────────────
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "saturday"
      time: "06:00"
      timezone: "Asia/Riyadh"
    open-pull-requests-limit: 8
    reviewers:
      - "almashooq1"
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "chore(deps)"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "react-router*"
          - "react-scripts"
      mui:
        patterns:
          - "@mui/*"
          - "@emotion/*"
      charts:
        patterns:
          - "recharts"
          - "chart.js"
          - "react-chartjs*"

  # ─── GitHub Actions ──────────────────────────────────────────
  # عمداً بلا تجاهل major — ترقيات الإجراءات منخفضة المخاطر ونريدها
  # (تُبقينا على وقت تشغيل Node حديث).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "saturday"
      time: "06:00"
      timezone: "Asia/Riyadh"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci(deps)"

  # ─── Mobile (React Native + Expo) ────────────────────────────
  - package-ecosystem: "npm"
    directory: "/mobile"
    schedule:
      interval: "weekly"
      day: "saturday"
      time: "06:00"
      timezone: "Asia/Riyadh"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "mobile"
    commit-message:
      prefix: "chore(deps-mobile)"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ─── Supply Chain Management (backend) ───────────────────────
  - package-ecosystem: "npm"
    directory: "/supply-chain-management/backend"
    schedule:
      interval: "weekly"
      day: "saturday"
      time: "06:00"
      timezone: "Asia/Riyadh"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "scm"
    commit-message:
      prefix: "chore(deps-scm-be)"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ─── Supply Chain Management (frontend) ──────────────────────
  - package-ecosystem: "npm"
    directory: "/supply-chain-management/frontend"
    schedule:
      interval: "weekly"
      day: "saturday"
      time: "06:00"
      timezone: "Asia/Riyadh"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "scm"
    commit-message:
      prefix: "chore(deps-scm-fe)"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ─── Microservices (file-processor, queue-worker, etc.) ──────
  - package-ecosystem: "npm"
    directory: "/services/file-processor"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels: ["dependencies", "services"]
    commit-message:
      prefix: "chore(deps-svc)"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "npm"
    directory: "/services/queue-worker"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels: ["dependencies", "services"]
    commit-message:
      prefix: "chore(deps-svc)"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "npm"
    directory: "/services/iot-gateway"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels: ["dependencies", "services"]
    commit-message:
      prefix: "chore(deps-svc)"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "npm"
    directory: "/services/saudi-gov-gateway"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels: ["dependencies", "services"]
    commit-message:
      prefix: "chore(deps-svc)"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "npm"
    directory: "/services/scheduler"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels: ["dependencies", "services"]
    commit-message:
      prefix: "chore(deps-svc)"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "npm"
    directory: "/services/webhook-worker"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels: ["dependencies", "services"]
    commit-message:
      prefix: "chore(deps-svc)"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
