name: CI/CD Pipeline - Production Ready

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 2 * * *' # Daily at 2 AM

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DOCKER_BUILDKIT: 1
  NODE_VERSION: '18'

jobs:
  # ======================================
  # 1. CODE QUALITY & LINTING
  # ======================================
  code-quality:
    runs-on: ubuntu-latest
    name: Code Quality Checks

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install Backend Dependencies
        run: cd backend && npm ci

      - name: Lint Backend
        run: cd backend && npm run lint

      - name: Check Backend Formatting
        run: cd backend && npm run format:check || echo "::warning::Backend formatting issues found"

      - name: Install Frontend Dependencies
        run: cd frontend && npm ci

      - name: Lint Frontend
        run: cd frontend && npm run lint

  # ======================================
  # 2. SECURITY SCANNING
  # ======================================
  security:
    runs-on: ubuntu-latest
    name: Security Scanning

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
        continue-on-error: true

      - name: Audit Backend Dependencies
        run: |
          cd backend
          npm ci
          npm audit --audit-level=high || echo "::warning::Backend npm audit found vulnerabilities"

      - name: Audit Frontend Dependencies
        run: |
          cd frontend
          npm ci
          npm audit --audit-level=high || echo "::warning::Frontend npm audit found vulnerabilities"

  # ======================================
  # 3. BACKEND UNIT TESTS
  # ======================================
  test-backend:
    runs-on: ubuntu-latest
    name: Backend Unit Tests
    needs: code-quality

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: cd backend && npm ci

      - name: Run maintenance mock guard
        run: cd backend && npm run test:guard:maintenance-mocks

      - name: Run all backend tests
        run: cd backend && npm test -- --ci --runInBand --passWithNoTests --forceExit
        env:
          NODE_ENV: test
          USE_MOCK_DB: 'true'
          DISABLE_REDIS: 'true'
          JWT_SECRET: ci-test-secret
          JWT_REFRESH_SECRET: ci-test-refresh-secret

      - name: Run coverage report
        if: github.event_name == 'pull_request'
        run: cd backend && npm test -- --coverage --ci --runInBand --forceExit
        env:
          NODE_ENV: test
          USE_MOCK_DB: 'true'
          DISABLE_REDIS: 'true'
          JWT_SECRET: ci-test-secret
          JWT_REFRESH_SECRET: ci-test-refresh-secret

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 7
        continue-on-error: true

  # ======================================
  # 4. FRONTEND UNIT TESTS
  # ======================================
  test-frontend:
    runs-on: ubuntu-latest
    name: Frontend Unit Tests
    needs: code-quality

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Run frontend tests
        run: cd frontend && npm test -- --coverage --watchAll=false --ci --passWithNoTests
        env:
          CI: true

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 7
        continue-on-error: true

  # ======================================
  # 5. PERFORMANCE TESTS
  # ======================================
  performance-tests:
    runs-on: ubuntu-latest
    name: Performance Tests
    needs: [test-backend]
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: cd backend && npm ci

      - name: Run performance tests
        run: cd backend && npm run test:perf || echo "::warning::Performance tests had issues"
        env:
          NODE_ENV: test
          USE_MOCK_DB: 'true'
          DISABLE_REDIS: 'true'
        continue-on-error: true

  # ======================================
  # 6. E2E TESTS
  # ======================================
  e2e-tests:
    runs-on: ubuntu-latest
    name: E2E Tests
    needs: [test-backend, test-frontend]
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install all dependencies
        run: |
          cd backend && npm ci
          cd ../frontend && npm ci

      - name: Start backend server
        run: |
          cd backend
          npm start &
          sleep 10
        env:
          NODE_ENV: test
          PORT: 5000
          USE_MOCK_DB: 'true'
          DISABLE_REDIS: 'true'
          JWT_SECRET: ci-test-secret
          JWT_REFRESH_SECRET: ci-test-refresh-secret

      - name: Start frontend server
        run: |
          cd frontend
          npm start &
          sleep 15
        env:
          REACT_APP_API_URL: http://localhost:5000/api
          BROWSER: none

      - name: Run Cypress E2E tests
        uses: cypress-io/github-action@v6
        with:
          working-directory: frontend
          browser: chrome
          wait-on: 'http://localhost:3000'
          wait-on-timeout: 60

      - name: Upload Cypress screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: frontend/cypress/screenshots
          retention-days: 7

      - name: Upload Cypress videos
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-videos
          path: frontend/cypress/videos
          retention-days: 7

  # ======================================
  # 7. BUILD DOCKER IMAGES
  # ======================================
  build:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    name: Build Docker Images
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (Backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata (Frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ======================================
  # 8. DEPLOY TO STAGING
  # ======================================
  deploy-staging:
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    needs: [build]
    runs-on: ubuntu-latest
    name: Deploy to Staging
    environment:
      name: staging
      url: ${{ secrets.STAGING_SERVER_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.STAGING_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.STAGING_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to staging
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
        run: |
          ssh $STAGING_USER@$STAGING_HOST "cd /app && bash deploy-production.sh staging deploy"

      - name: Health check
        run: |
          STAGING_URL="${{ secrets.STAGING_SERVER_URL }}"
          for i in $(seq 1 30); do
            if curl -sf "$STAGING_URL/api/health" > /dev/null 2>&1; then
              echo "Staging deployment successful"
              exit 0
            fi
            echo "Waiting for staging to be ready... ($i/30)"
            sleep 10
          done
          echo "Staging health check failed"
          exit 1

  # ======================================
  # 9. DEPLOY TO PRODUCTION
  # ======================================
  deploy-production:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [build]
    runs-on: ubuntu-latest
    name: Deploy to Production
    environment:
      name: production
      url: ${{ secrets.PROD_SERVER_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.PROD_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to production
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
        run: |
          ssh $PROD_USER@$PROD_HOST "cd /app && bash deploy-production.sh production deploy"

      - name: Health check
        run: |
          PROD_URL="${{ secrets.PROD_SERVER_URL }}"
          for i in $(seq 1 30); do
            if curl -sf "$PROD_URL/api/health" > /dev/null 2>&1; then
              echo "Production deployment successful"
              exit 0
            fi
            echo "Waiting for production to be ready... ($i/30)"
            sleep 10
          done
          echo "Production health check failed"
          exit 1

      - name: Notify deployment
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Production Deploy: ${{ job.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*AlAwael ERP Production Deploy*\n*Status:* ${{ job.status }}\n*Branch:* `${{ github.ref_name }}`\n*Commit:* `${{ github.sha }}`\n*By:* ${{ github.actor }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
        continue-on-error: true

  # ======================================
  # 10. CLEANUP & REPORTING
  # ======================================
  cleanup:
    runs-on: ubuntu-latest
    name: Cleanup & Reporting
    needs: [test-backend, test-frontend, security]
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: coverage-reports
        continue-on-error: true

      - name: Generate pipeline summary
        run: |
          echo "## Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Tests | ${{ needs.test-backend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Tests | ${{ needs.test-frontend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Scan | ${{ needs.security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

      - name: Upload combined reports
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-reports
          path: coverage-reports/
          retention-days: 14
        continue-on-error: true
