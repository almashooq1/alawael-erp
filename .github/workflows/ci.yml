# ═══════════════════════════════════════════════════════════════════════════
# Al-Awael ERP — Continuous Integration Pipeline
# ═══════════════════════════════════════════════════════════════════════════
# Triggers on every push to main / feature branches and on all pull requests.
# Gates: lint → test → audit → docker build. All must pass before deploy.
# ═══════════════════════════════════════════════════════════════════════════

name: CI

permissions:
  contents: read

# ── Triggers ──────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main
      - 'feat/**'
  pull_request:
    branches:
      - main

# ── Shared Environment ──────────────────────────────────────────────────
env:
  NODE_VERSION: '20'

# ── Concurrency: cancel stale runs on the same branch/PR ───────────────
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ═══════════════════════════════════════════════════════════════════
  # Job 1: Lint — ESLint check on backend/
  # ═══════════════════════════════════════════════════════════════════
  lint:
    name: Lint Backend
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci --legacy-peer-deps 2>&1 || npm install --legacy-peer-deps

      - name: Run ESLint
        working-directory: backend
        run: npm run lint

  # ═══════════════════════════════════════════════════════════════════
  # Job 2: Test — Jest with mongodb-memory-server
  # ═══════════════════════════════════════════════════════════════════
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci --legacy-peer-deps 2>&1 || npm install --legacy-peer-deps

      - name: Run Jest tests
        working-directory: backend
        run: npm run test:sprint -- --ci --runInBand --forceExit --testTimeout=30000 2>&1 | tee sprint-test-output.log
        env:
          NODE_ENV: test
          JWT_SECRET: test-jwt-secret-ci-only
          MONGOMS_VERSION: '7.0'
          MONGOMS_DOWNLOAD_TIMEOUT: 120000

      - name: Upload sprint test output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sprint-test-output
          path: backend/sprint-test-output.log
          retention-days: 1

      - name: Print sprint test output on failure
        if: failure()
        working-directory: backend
        run: tail -n 200 sprint-test-output.log || true

  # ═══════════════════════════════════════════════════════════════════
  # Job 3: Audit — npm audit (fail on high/critical vulnerabilities)
  # ═══════════════════════════════════════════════════════════════════
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: test
    if: always()   # Run even if tests fail, so we always see audit results

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies (production)
        working-directory: backend
        run: npm ci --legacy-peer-deps 2>&1 || npm install --legacy-peer-deps

      - name: Run npm audit (high/critical only)
        working-directory: backend
        run: npm audit --audit-level=high --omit=dev
        # --audit-level=high  → fails on HIGH and CRITICAL severities
        # --omit=dev          → skip devDependencies to reduce noise

  # ═══════════════════════════════════════════════════════════════════
  # Job 4: Build — Verify Docker image builds successfully
  # ═══════════════════════════════════════════════════════════════════
  build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint, test]
    if: always() && (needs.lint.result == 'success' && needs.test.result == 'success')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: |
            alawael-erp:${{ github.sha }}
            alawael-erp:latest
          build-args: |
            GIT_SHA=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp || github.event.pull_request.updated_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
