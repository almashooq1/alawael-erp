# ══════════════════════════════════════════════════════════════════
# CI — Tests & Quality | AlAwael ERP Backend
# Rehab-ERP v2.0 | Node.js + MongoDB + Redis
# ══════════════════════════════════════════════════════════════════
name: CI — Tests & Quality

on:
  push:
    branches: [main, develop, 'feature/**', 'fix/**']
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '22'
  MONGODB_VERSION: '7.0'

# إلغاء التشغيلات القديمة تلقائياً عند push جديد
concurrency:
  group: ci-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────
  # Backend Tests
  # ──────────────────────────────────────────────────────────────
  backend-tests:
    name: Backend Tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['22']

    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ping: 1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install backend dependencies
        working-directory: backend
        run: npm install --no-audit --no-fund
        env:
          HUSKY: '0'
          CI: 'true'

      - name: Copy environment file
        working-directory: backend
        run: |
          cp .env.example .env 2>/dev/null || true
          echo "MONGODB_URI=mongodb://127.0.0.1:27017/alawael_test" >> .env
          echo "REDIS_HOST=127.0.0.1" >> .env
          echo "REDIS_PORT=6379" >> .env
          echo "NODE_ENV=test" >> .env
          echo "JWT_SECRET=test-ci-secret-key-minimum-32-chars-ok!!" >> .env
          echo "JWT_REFRESH_SECRET=test-ci-refresh-secret-minimum-32-chars-ok!!" >> .env
          echo "ENCRYPTION_KEY=test-ci-encryption-key-minimum-32chars-ok!!" >> .env
          echo "SESSION_SECRET=test-ci-session-secret-min-16chars!" >> .env
          echo "USE_MOCK_DB=true" >> .env
          echo "DISABLE_REDIS=true" >> .env

      - name: Check versions
        working-directory: backend
        run: |
          node --version
          node node_modules/jest/bin/jest.js --version

      - name: Debug environment
        working-directory: backend
        run: |
          echo "=== Node/npm versions ==="
          node --version && npm --version
          echo "=== Key env vars ==="
          echo "NODE_ENV=$NODE_ENV"
          echo "USE_MOCK_DB=$USE_MOCK_DB"
          echo "DISABLE_REDIS=$DISABLE_REDIS"
          echo "SMART_TEST_MODE=$SMART_TEST_MODE"
          echo "JWT_SECRET length=${#JWT_SECRET}"
          echo "JWT_REFRESH_SECRET length=${#JWT_REFRESH_SECRET}"
          echo "=== .env first 20 lines (keys only) ==="
          head -20 .env | cut -d'=' -f1 || echo "(no .env file)"
        env:
          NODE_ENV: test
          USE_MOCK_DB: 'true'
          DISABLE_REDIS: 'true'
          SMART_TEST_MODE: 'true'
          JWT_SECRET: test-ci-secret-key-minimum-32-chars-ok!!
          JWT_REFRESH_SECRET: test-ci-refresh-secret-minimum-32-chars-ok!!

      - name: Verify app startup
        working-directory: backend
        run: |
          echo "=== Testing if app.js loads correctly ==="
          timeout 30 node -e "
            process.env.NODE_ENV='test';
            process.env.USE_MOCK_DB='true';
            process.env.SMART_TEST_MODE='true';
            process.env.DISABLE_REDIS='true';
            process.env.CI='true';
            process.env.JWT_SECRET='test-ci-secret-key-minimum-32-chars-ok!!';
            process.env.JWT_REFRESH_SECRET='test-ci-refresh-secret-minimum-32-chars-ok!!';
            process.env.ENCRYPTION_KEY='test-ci-encryption-key-minimum-32chars-ok!!';
            process.env.SESSION_SECRET='test-ci-session-secret-min-16chars!';
            process.env.MONGODB_URI='mongodb://127.0.0.1:27017/alawael_test';
            try {
              const app = require('./app');
              console.log('app.js loaded OK - type:', typeof app);
            } catch(e) {
              console.error('FAILED to load app.js:', e.message);
              console.error(e.stack ? e.stack.split('\n').slice(0,8).join('\n') : '');
            }
            try {
              const server = require('./server');
              console.log('server.js loaded OK - type:', typeof server);
              process.exit(0);
            } catch(e) {
              console.error('FAILED to load server.js:', e.message);
              console.error(e.stack ? e.stack.split('\n').slice(0,8).join('\n') : '');
              process.exit(0);
            }
          " 2>&1 || echo "startup check timed out or errored"
        continue-on-error: true

      - name: Run Jest tests
        working-directory: backend
        shell: bash
        run: |
          set +e
          npm run test:ci 2>&1 | tee jest-output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          echo "=== JEST EXIT CODE: $EXIT_CODE ==="
          echo "=== FULL JEST OUTPUT ==="
          cat jest-output.txt
          # Write summary to GitHub Step Summary (accessible without auth)
          echo "## Jest Test Results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat jest-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          exit $EXIT_CODE
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://127.0.0.1:27017/alawael_test
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          JWT_SECRET: test-ci-secret-key-minimum-32-chars-ok!!
          JWT_REFRESH_SECRET: test-ci-refresh-secret-minimum-32-chars-ok!!
          ENCRYPTION_KEY: test-ci-encryption-key-minimum-32chars-ok!!
          SESSION_SECRET: test-ci-session-secret-min-16chars!
          USE_MOCK_DB: 'true'
          DISABLE_REDIS: 'true'
          STRICT_ENV_VALIDATION: 'false'
          SMART_TEST_MODE: 'true'

      - name: Print failed tests summary
        if: always()
        working-directory: backend
        run: |
          if [ -f jest-results.json ]; then
            echo "=== JEST RESULTS SUMMARY ==="
            python3 << 'EOF'
import json, sys, os
try:
    with open('jest-results.json', 'r') as f:
        d = json.load(f)
    suites = d.get('testResults', [])
    total_failed = 0
    for s in suites:
        tests = s.get('testResults', [])
        failed = [t for t in tests if t['status'] == 'failed']
        if failed:
            filepath = s['testFilePath'].split('/')[-1]
            total_failed += len(failed)
            print('FAIL SUITE: ' + filepath)
            for t in failed:
                name = t['fullName'][:120]
                print('  x ' + name)
                msgs = t.get('failureMessages', [])
                if msgs:
                    # Print as annotation (visible in GitHub UI)
                    short_msg = msgs[0][:300].replace('\n', ' | ')
                    print('::error title=' + name[:50] + '::' + short_msg)
    print('Total failed: %d' % total_failed)
    # Also write to step summary
    summary_path = os.environ.get('GITHUB_STEP_SUMMARY', '')
    if summary_path:
        with open(summary_path, 'a') as sf:
            sf.write('## Failed Tests\n')
            for s in suites:
                tests = s.get('testResults', [])
                failed = [t for t in tests if t['status'] == 'failed']
                if failed:
                    sf.write('### ' + s['testFilePath'].split('/')[-1] + '\n')
                    for t in failed:
                        sf.write('- **' + t['fullName'][:100] + '**\n')
                        msgs = t.get('failureMessages', [])
                        if msgs:
                            sf.write('```\n' + msgs[0][:500] + '\n```\n')
except Exception as e:
    print('Parse error: ' + str(e))
    import traceback
    traceback.print_exc()
EOF
          else
            echo "jest-results.json not found"
            echo "::error::jest-results.json not found - Jest may have crashed before producing output"
          fi
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-node-${{ matrix.node }}
          path: |
            backend/jest-results.json
            backend/jest-output.txt
          if-no-files-found: warn
          retention-days: 7

  # ──────────────────────────────────────────────────────────────
  # Code Quality (ESLint + Prettier)
  # ──────────────────────────────────────────────────────────────
  code-quality:
    name: Code Quality (ESLint + Prettier)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: backend
        run: npm install --no-audit --no-fund --ignore-scripts

      - name: Run ESLint
        working-directory: backend
        run: npx eslint . --ext .js --max-warnings=0 --format=compact
        continue-on-error: true

      - name: Check Prettier formatting
        working-directory: backend
        run: npx prettier --check "**/*.{js,json}" --ignore-path .prettierignore
        continue-on-error: true

  # ──────────────────────────────────────────────────────────────
  # Security Audit
  # ──────────────────────────────────────────────────────────────
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Check for vulnerable dependencies
        working-directory: backend
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Check for secrets in code
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified
        continue-on-error: true

  # ──────────────────────────────────────────────────────────────
  # Docker Build Validation
  # ──────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: [backend-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (validate only)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: alawael-erp:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────
  # Health Check (تحقق من أن التطبيق يبدأ بشكل صحيح)
  # ──────────────────────────────────────────────────────────────
  health-check:
    name: App Startup Health Check
    runs-on: ubuntu-latest
    needs: [backend-tests]

    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ping: 1})'"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: backend
        run: npm install --no-audit --no-fund --ignore-scripts

      - name: Start server and check health
        working-directory: backend
        run: |
          export NODE_ENV=test
          export MONGODB_URI=mongodb://127.0.0.1:27017/alawael_health_test
          export REDIS_HOST=127.0.0.1
          export JWT_SECRET=health-check-secret
          export PORT=3001
          export USE_MOCK_DB=false

          # تشغيل الخادم في الخلفية
          node app.js &
          APP_PID=$!

          # انتظار 10 ثوانٍ للبدء
          sleep 10

          # فحص الصحة
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/health || echo "000")
          echo "Health check status: $HTTP_STATUS"

          kill $APP_PID 2>/dev/null || true

          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "503" ]; then
            echo "❌ Health check failed with unexpected status: $HTTP_STATUS"
            exit 1
          fi

          echo "✅ Health check passed (status: $HTTP_STATUS)"
        continue-on-error: true
