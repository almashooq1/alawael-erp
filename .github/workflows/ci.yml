# ══════════════════════════════════════════════════════════════════
# CI — Tests & Quality | AlAwael ERP Backend
# Rehab-ERP v2.0 | Node.js + MongoDB + Redis
# ══════════════════════════════════════════════════════════════════
name: CI — Tests & Quality

on:
  push:
    branches: [main, develop, 'feature/**', 'fix/**']
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '22'
  MONGODB_VERSION: '7.0'

# إلغاء التشغيلات القديمة تلقائياً عند push جديد
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────
  # Backend Tests
  # ──────────────────────────────────────────────────────────────
  backend-tests:
    name: Backend Tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['22']

    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ping: 1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install backend dependencies
        working-directory: backend
        run: npm install --no-audit --no-fund --ignore-scripts

      - name: Copy environment file
        working-directory: backend
        run: |
          cp .env.example .env 2>/dev/null || true
          echo "MONGODB_URI=mongodb://127.0.0.1:27017/alawael_test" >> .env
          echo "REDIS_HOST=127.0.0.1" >> .env
          echo "REDIS_PORT=6379" >> .env
          echo "NODE_ENV=test" >> .env
          echo "JWT_SECRET=test-secret-key-for-ci-only" >> .env
          echo "USE_MOCK_DB=false" >> .env

      - name: Run Jest tests
        working-directory: backend
        run: npm run test:ci
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://127.0.0.1:27017/alawael_test
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          JWT_SECRET: test-ci-secret

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-node-${{ matrix.node }}
          path: backend/coverage/
          retention-days: 7

  # ──────────────────────────────────────────────────────────────
  # Code Quality (ESLint + Prettier)
  # ──────────────────────────────────────────────────────────────
  code-quality:
    name: Code Quality (ESLint + Prettier)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: backend
        run: npm install --no-audit --no-fund --ignore-scripts

      - name: Run ESLint
        working-directory: backend
        run: npx eslint . --ext .js --max-warnings=0 --format=compact
        continue-on-error: true

      - name: Check Prettier formatting
        working-directory: backend
        run: npx prettier --check "**/*.{js,json}" --ignore-path .prettierignore
        continue-on-error: true

  # ──────────────────────────────────────────────────────────────
  # Security Audit
  # ──────────────────────────────────────────────────────────────
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Check for vulnerable dependencies
        working-directory: backend
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Check for secrets in code
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified
        continue-on-error: true

  # ──────────────────────────────────────────────────────────────
  # Docker Build Validation
  # ──────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: [backend-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (validate only)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: alawael-erp:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────
  # Health Check (تحقق من أن التطبيق يبدأ بشكل صحيح)
  # ──────────────────────────────────────────────────────────────
  health-check:
    name: App Startup Health Check
    runs-on: ubuntu-latest
    needs: [backend-tests]

    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ping: 1})'"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: backend
        run: npm install --no-audit --no-fund --ignore-scripts

      - name: Start server and check health
        working-directory: backend
        run: |
          export NODE_ENV=test
          export MONGODB_URI=mongodb://127.0.0.1:27017/alawael_health_test
          export REDIS_HOST=127.0.0.1
          export JWT_SECRET=health-check-secret
          export PORT=3001
          export USE_MOCK_DB=false

          # تشغيل الخادم في الخلفية
          node app.js &
          APP_PID=$!

          # انتظار 10 ثوانٍ للبدء
          sleep 10

          # فحص الصحة
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/health || echo "000")
          echo "Health check status: $HTTP_STATUS"

          kill $APP_PID 2>/dev/null || true

          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "503" ]; then
            echo "❌ Health check failed with unexpected status: $HTTP_STATUS"
            exit 1
          fi

          echo "✅ Health check passed (status: $HTTP_STATUS)"
        continue-on-error: true
