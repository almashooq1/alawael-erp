# ════════════════════════════════════════════════════════════════════
#  Al-Awael ERP — Deploy ALL Services via Docker Compose
#  نشر جميع الخدمات عبر Docker Compose على VPS
# ════════════════════════════════════════════════════════════════════
name: "🐳 Deploy All Services (Docker Compose)"

on:
  workflow_dispatch:
    inputs:
      deploy_mode:
        description: "وضع النشر"
        required: true
        default: "full"
        type: choice
        options:
          - full          # جميع الخدمات (~91 خدمة)
          - core          # البنية التحتية + التطبيق الأساسي
          - phase-5       # حتى المرحلة 5
          - phase-6       # حتى المرحلة 6
          - monitoring    # الخدمات + المراقبة
      force_rebuild:
        description: "إعادة بناء جميع الصور؟"
        required: false
        default: false
        type: boolean
      confirm:
        description: "اكتب 'deploy' للتأكيد"
        required: true
        default: "deploy"
        type: string

env:
  APP_DIR: /home/alawael/app
  NODE_VERSION: "20"
  DEPLOY_DOMAIN: alaweal.org

concurrency:
  group: deploy-docker-compose
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

jobs:
  # ─── Pre-flight ─────────────────────────────────────────────────────────
  preflight:
    name: "🔍 Pre-flight"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      short_sha: ${{ steps.info.outputs.short_sha }}
      deploy_mode: ${{ steps.mode.outputs.mode }}
    steps:
      - name: Confirm deployment
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "deploy" ]; then
            echo "❌ You must type 'deploy' to confirm!"
            exit 1
          fi
          echo "✅ Deployment confirmed"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Gather info
        id: info
        run: |
          echo "short_sha=$(echo '${{ github.sha }}' | cut -c1-8)" >> $GITHUB_OUTPUT
          echo "📋 Commit: $(echo '${{ github.sha }}' | cut -c1-8)"
          echo "📋 Actor: ${{ github.actor }}"

      - name: Determine deploy mode
        id: mode
        run: |
          MODE="${{ github.event.inputs.deploy_mode || 'full' }}"
          echo "mode=$MODE" >> $GITHUB_OUTPUT
          echo "🎯 Deploy mode: $MODE"

  # ─── Build Frontend ────────────────────────────────────────────────────
  build-frontend:
    name: "📦 Build Frontend"
    runs-on: ubuntu-latest
    needs: preflight
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install & Build
        working-directory: frontend
        run: |
          npm ci --legacy-peer-deps 2>&1 || npm install --legacy-peer-deps
          npm run build
        env:
          REACT_APP_API_URL: /api/v1
          REACT_APP_API_V1_URL: /api/v1
          REACT_APP_WS_URL: ""
          REACT_APP_ENVIRONMENT: production
          REACT_APP_VERSION: ${{ needs.preflight.outputs.short_sha }}
          GENERATE_SOURCEMAP: "false"
          CI: "false"
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-build-${{ github.sha }}
          path: frontend/build/
          retention-days: 3

  # ─── Deploy via Docker Compose ──────────────────────────────────────────
  deploy:
    name: "🐳 Deploy Docker Compose"
    runs-on: ubuntu-latest
    needs: [preflight, build-frontend]
    timeout-minutes: 30
    environment:
      name: production
      url: https://alaweal.org
    steps:
      - uses: actions/checkout@v4

      - name: Check secrets
        run: |
          MISSING=0
          [ -z "${{ secrets.VPS_HOST }}" ]    && echo "❌ VPS_HOST"    && MISSING=1
          [ -z "${{ secrets.VPS_USER }}" ]    && echo "❌ VPS_USER"    && MISSING=1
          [ -z "${{ secrets.VPS_SSH_KEY }}" ] && echo "❌ VPS_SSH_KEY" && MISSING=1
          [ "$MISSING" = "1" ] && exit 1
          echo "✅ All secrets present"

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build-${{ github.sha }}
          path: frontend/build/

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o BatchMode=yes -o ConnectTimeout=15 \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "echo '✅ SSH OK'" || exit 1

      - name: Sync entire project to VPS
        run: |
          SSH_CMD="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"
          SSH_TARGET="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"

          echo "📦 Syncing project files..."
          rsync -avz --delete \
            -e "$SSH_CMD" \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='.env' \
            --exclude='logs/' \
            --exclude='uploads/' \
            --exclude='data/' \
            --exclude='coverage/' \
            --exclude='__tests__/' \
            --exclude='*.test.js' \
            --exclude='.venv/' \
            --exclude='vendor/' \
            ./ $SSH_TARGET:${{ env.APP_DIR }}/

          echo "✅ Project synced"

      - name: Deploy with Docker Compose
        run: |
          SSH_CMD="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"
          SSH_TARGET="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          MODE="${{ needs.preflight.outputs.deploy_mode }}"
          REBUILD="${{ github.event.inputs.force_rebuild }}"

          $SSH_CMD $SSH_TARGET << DEPLOY_SCRIPT
            set -e
            cd ${{ env.APP_DIR }}

            echo "═══════════════════════════════════════════════"
            echo "  🐳 Docker Compose Deployment — Mode: $MODE"
            echo "═══════════════════════════════════════════════"

            # Ensure Docker is available
            if ! command -v docker &>/dev/null; then
              echo "❌ Docker is not installed on VPS!"
              exit 1
            fi

            # Set deploy phase based on mode
            PHASE_FLAG=""
            MONITORING_FLAG=""
            case "$MODE" in
              full)       PHASE_FLAG="--phase 9" ;;
              core)       PHASE_FLAG="--core-only" ;;
              phase-5)    PHASE_FLAG="--phase 5" ;;
              phase-6)    PHASE_FLAG="--phase 6" ;;
              monitoring) PHASE_FLAG="--phase 9"; MONITORING_FLAG="--with-monitoring" ;;
            esac

            # Make deploy script executable
            chmod +x ops/deploy-docker-compose.sh

            # Run deployment
            if [ "$REBUILD" = "true" ]; then
              echo "🔄 Force rebuilding all images..."
              docker compose -f docker-compose.yml -f docker-compose.production.yml build --no-cache --parallel 2>&1 | tail -20
            fi

            # Execute phased deployment
            bash ops/deploy-docker-compose.sh \$PHASE_FLAG \$MONITORING_FLAG

            echo ""
            echo "════════════════════════════════════════════"
            echo "  ✅ Deployment complete!"
            echo "  📊 Running containers:"
            docker ps --format "table {{.Names}}\t{{.Status}}" | head -30
            echo "  Total: \$(docker ps -q | wc -l) containers"
            echo "════════════════════════════════════════════"
          DEPLOY_SCRIPT

      - name: Health check
        run: |
          SSH_CMD="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"
          SSH_TARGET="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"

          echo "⏳ Waiting 20s for services to stabilize..."
          sleep 20

          $SSH_CMD $SSH_TARGET << 'HEALTH_CHECK'
            echo "═══ Health Checks ═══"

            # Backend
            if curl -sf http://127.0.0.1:3001/health >/dev/null 2>&1; then
              echo "✅ Backend (3001)"
            else
              echo "⚠️  Backend — not responding"
            fi

            # API Gateway
            if curl -sf http://127.0.0.1:8080/health >/dev/null 2>&1; then
              echo "✅ API Gateway (8080)"
            else
              echo "⚠️  API Gateway — not responding"
            fi

            # GraphQL
            if curl -sf http://127.0.0.1:4000/.well-known/apollo/server-health >/dev/null 2>&1; then
              echo "✅ GraphQL (4000)"
            else
              echo "⚠️  GraphQL — not responding"
            fi

            # Nginx
            if curl -sf http://127.0.0.1/health >/dev/null 2>&1; then
              echo "✅ Nginx (80)"
            else
              echo "⚠️  Nginx — not responding"
            fi

            # Count healthy/unhealthy containers
            TOTAL=$(docker ps -q | wc -l)
            HEALTHY=$(docker ps --filter "health=healthy" -q | wc -l)
            echo ""
            echo "📊 Containers: $TOTAL total, $HEALTHY healthy"

            # Show any unhealthy
            UNHEALTHY=$(docker ps --filter "health=unhealthy" --format "{{.Names}}" 2>/dev/null)
            if [ -n "$UNHEALTHY" ]; then
              echo "⚠️  Unhealthy: $UNHEALTHY"
            fi
          HEALTH_CHECK

  # ─── Summary ────────────────────────────────────────────────────────────
  notify:
    name: "📢 Summary"
    runs-on: ubuntu-latest
    needs: [preflight, deploy]
    if: always()
    steps:
      - name: Deployment summary
        run: |
          STATUS="${{ needs.deploy.result }}"
          SHA="${{ needs.preflight.outputs.short_sha }}"
          MODE="${{ needs.preflight.outputs.deploy_mode }}"
          [ "$STATUS" = "success" ] && ICON="✅" || ICON="❌"

          echo "## $ICON Docker Compose Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|:-------|:------|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | $STATUS |" >> $GITHUB_STEP_SUMMARY
          echo "| Mode   | $MODE |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`$SHA\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Actor  | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Time   | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "| URL    | https://alaweal.org |" >> $GITHUB_STEP_SUMMARY
