# ════════════════════════════════════════════════════════════════════
#  Al-Awael ERP — Deploy to Production VPS (Manual Only)
#  النشر يدوي فقط — لا يعمل تلقائياً عند كل push
# ════════════════════════════════════════════════════════════════════
name: "🚀 Deploy to Production"

on:
  # ✅ تلقائي عند كل push على main + يدوي
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "ماذا تريد نشره؟"
        required: true
        default: "both"
        type: choice
        options:
          - both
          - backend-only
          - frontend-only
      skip_tests:
        description: "تخطي الاختبارات؟"
        required: false
        default: false
        type: boolean
      confirm:
        description: "اكتب 'deploy' للتأكيد"
        required: true
        default: "deploy"
        type: string

env:
  APP_DIR: /home/alawael/app
  NODE_VERSION: "20"
  DEPLOY_DOMAIN: alaweal.org

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

jobs:
  # ─── Guard: Require secrets + confirmation ───────────────────────
  preflight:
    name: "🔍 Pre-flight"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      short_sha: ${{ steps.info.outputs.short_sha }}
      deploy_backend: ${{ steps.target.outputs.deploy_backend }}
      deploy_frontend: ${{ steps.target.outputs.deploy_frontend }}
    steps:
      - name: Confirm deployment intent
        run: |
          # للـ push التلقائي: لا يحتاج تأكيد
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "✅ Auto-deploy triggered by push to main"
          elif [ "${{ github.event.inputs.confirm }}" != "deploy" ]; then
            echo "❌ You must type 'deploy' in the confirm field!"
            exit 1
          fi
          echo "✅ Deployment confirmed"

      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Gather info
        id: info
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "📋 Commit: $SHORT_SHA"
          echo "📋 Actor: ${{ github.actor }}"

      - name: Determine deploy targets
        id: target
        run: |
          # عند push التلقائي: نشر الكل بالقيمة الافتراضية 'both'
          TARGET="${{ github.event.inputs.deploy_target || 'both' }}"
          echo "🎯 Target: $TARGET"

          if [ "$TARGET" = "both" ] || [ "$TARGET" = "backend-only" ]; then
            echo "deploy_backend=true" >> $GITHUB_OUTPUT
          else
            echo "deploy_backend=false" >> $GITHUB_OUTPUT
          fi

          if [ "$TARGET" = "both" ] || [ "$TARGET" = "frontend-only" ]; then
            echo "deploy_frontend=true" >> $GITHUB_OUTPUT
          else
            echo "deploy_frontend=false" >> $GITHUB_OUTPUT
          fi

  # ─── Build Frontend ──────────────────────────────────────────────
  build-frontend:
    name: "📦 Build Frontend"
    runs-on: ubuntu-latest
    needs: preflight
    if: needs.preflight.outputs.deploy_frontend == 'true'
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          REACT_APP_API_URL: /api/v1
          REACT_APP_API_V1_URL: /api/v1
          REACT_APP_WS_URL: ""
          REACT_APP_ENVIRONMENT: production
          REACT_APP_VERSION: ${{ needs.preflight.outputs.short_sha }}
          GENERATE_SOURCEMAP: "false"
          CI: "false"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-build-prod-${{ github.sha }}
          path: frontend/build/
          retention-days: 3

  # ─── Deploy ──────────────────────────────────────────────────────
  deploy:
    name: "🚀 Deploy to VPS"
    runs-on: ubuntu-latest
    needs: [preflight, build-frontend]
    if: |
      always() &&
      needs.preflight.result == 'success' &&
      (needs.build-frontend.result == 'success' || needs.build-frontend.result == 'skipped')
    timeout-minutes: 20
    environment:
      name: VPS_USER
      url: https://alaweal.org
    steps:
      - uses: actions/checkout@v6

      - name: Check required secrets
        run: |
          MISSING=0
          [ -z "${{ secrets.VPS_HOST }}" ]     && echo "❌ Missing: VPS_HOST"     && MISSING=1
          [ -z "${{ secrets.VPS_USER }}" ]     && echo "❌ Missing: VPS_USER"     && MISSING=1
          [ -z "${{ secrets.VPS_SSH_KEY }}" ]  && echo "❌ Missing: VPS_SSH_KEY"  && MISSING=1
          if [ "$MISSING" = "1" ]; then
            echo ""
            echo "⚙️  Add secrets to Environment 'VPS_HOST' at:"
            echo "   Settings → Environments → VPS_HOST → Add secret"
            exit 1
          fi
          echo "✅ All secrets present"

      - name: Download frontend build
        if: needs.build-frontend.result == 'success'
        uses: actions/download-artifact@v8
        with:
          name: frontend-build-prod-${{ github.sha }}
          path: frontend/build/

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          # Debug: verify key format
          echo "Key file size: $(wc -c < ~/.ssh/deploy_key) bytes"
          echo "Key type: $(head -1 ~/.ssh/deploy_key)"
          echo "VPS_USER length: ${#VPS_USER_VAL} chars"
          echo "VPS_HOST length: ${#VPS_HOST_VAL} chars"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o BatchMode=yes -o ConnectTimeout=10 "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "echo '✅ SSH test connection successful'" || {
            echo "❌ SSH test failed, trying with verbose..."
            ssh -vvv -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o BatchMode=yes -o ConnectTimeout=10 "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "echo test" 2>&1 | tail -30
            exit 1
          }
          echo "✅ SSH configured"
        env:
          VPS_USER_VAL: ${{ secrets.VPS_USER }}
          VPS_HOST_VAL: ${{ secrets.VPS_HOST }}

      - name: Deploy backend
        if: needs.preflight.outputs.deploy_backend == 'true'
        run: |
          SSH_CMD="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"
          SSH_TARGET="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          rsync -avz --delete \
            -e "$SSH_CMD" \
            --exclude='node_modules' --exclude='.env' \
            --exclude='logs/' --exclude='uploads/' \
            --exclude='__tests__/' --exclude='*.test.js' \
            --exclude='coverage/' --exclude='data/' \
            backend/ $SSH_TARGET:${{ env.APP_DIR }}/backend/

          $SSH_CMD $SSH_TARGET "cd ${{ env.APP_DIR }}/backend && npm ci --production --no-audit --no-fund 2>&1 | tail -5"
          echo "✅ Backend deployed"

      - name: Deploy frontend
        if: needs.build-frontend.result == 'success'
        run: |
          SSH_CMD="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"
          SSH_TARGET="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"

          # 1. Deploy to standard app dir
          rsync -avz --delete -e "$SSH_CMD" frontend/build/ $SSH_TARGET:${{ env.APP_DIR }}/frontend/build/
          echo "✅ Frontend deployed to ${{ env.APP_DIR }}/frontend/build/"

          # 2. Find and update ALL locations where frontend is served from
          $SSH_CMD $SSH_TARGET << 'DEPLOY_FRONTEND'
            set -e
            SRC="/home/alawael/app/frontend/build"
            echo "=== SMART FRONTEND DEPLOY ==="

            # A) Check if Docker frontend container is running
            DOCKER_FRONTEND=$(docker ps --filter "name=frontend" --format "{{.Names}}" 2>/dev/null | head -1)
            if [ -n "$DOCKER_FRONTEND" ]; then
              echo "🐳 Docker frontend container found: $DOCKER_FRONTEND"
              # Copy build files INTO the Docker container
              docker cp "$SRC/." "$DOCKER_FRONTEND:/usr/share/nginx/html/" 2>/dev/null && echo "  ✅ Copied to $DOCKER_FRONTEND:/usr/share/nginx/html/" || true
              docker cp "$SRC/." "$DOCKER_FRONTEND:/app/build/" 2>/dev/null && echo "  ✅ Copied to $DOCKER_FRONTEND:/app/build/" || true
              docker cp "$SRC/." "$DOCKER_FRONTEND:/var/www/html/" 2>/dev/null && echo "  ✅ Copied to $DOCKER_FRONTEND:/var/www/html/" || true
              # Also try to find where nginx in the container serves from
              CONTAINER_ROOT=$(docker exec "$DOCKER_FRONTEND" sh -c "cat /etc/nginx/conf.d/default.conf 2>/dev/null | grep 'root ' | head -1 | sed 's/.*root *//;s/;.*//' | tr -d ' '" 2>/dev/null || true)
              if [ -n "$CONTAINER_ROOT" ] && [ "$CONTAINER_ROOT" != "/usr/share/nginx/html" ]; then
                docker cp "$SRC/." "$DOCKER_FRONTEND:$CONTAINER_ROOT/" 2>/dev/null && echo "  ✅ Copied to $DOCKER_FRONTEND:$CONTAINER_ROOT/" || true
              fi
              echo "  Container root: ${CONTAINER_ROOT:-unknown}"
            else
              echo "🖥️ No Docker frontend container - using filesystem paths"
            fi

            # B) Find ALL index.html files on the system that reference main.*.js (React build)
            echo ""
            echo "--- Searching for React build index.html files ---"
            find /home /var/www /usr/share/nginx 2>/dev/null -name "index.html" -exec grep -l "main\." {} \; 2>/dev/null | while read IDX; do
              DIR=$(dirname "$IDX")
              if [ "$DIR" != "$SRC" ]; then
                echo "  Found React app at: $DIR"
                cp -r "$SRC"/* "$DIR"/ 2>/dev/null && echo "    ✅ Updated $DIR" || echo "    ❌ Failed to update $DIR"
              fi
            done

            # C) Check nginx root directives
            echo ""
            echo "--- Checking nginx root paths ---"
            ROOTS=$(nginx -T 2>/dev/null | grep -oP 'root\s+\K[^;]+' | sort -u || true)
            for ROOT in $ROOTS; do
              if [ -d "$ROOT" ] && [ "$ROOT" != "$SRC" ]; then
                echo "  Nginx root: $ROOT"
                cp -r "$SRC"/* "$ROOT"/ 2>/dev/null && echo "    ✅ Updated $ROOT" || true
              fi
            done

            # D) Show what we found for debugging
            echo ""
            echo "--- Docker containers ---"
            docker ps --format "table {{.Names}}\t{{.Image}}\t{{.Ports}}" 2>/dev/null || echo "No Docker"
            echo ""
            echo "--- PM2 processes ---"
            pm2 list 2>/dev/null | head -10 || echo "No PM2"
            echo ""
            echo "--- New build hash ---"
            grep -o 'main\.[a-f0-9]*\.js' "$SRC/index.html" 2>/dev/null || echo "No hash found"

            echo ""
            echo "✅ Smart deploy complete"
          DEPLOY_FRONTEND

      - name: Restart services
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" << 'EOF'
            set -e
            cd /home/alawael/app
            if pm2 list 2>/dev/null | grep -q "alawael"; then
              pm2 reload all --update-env
              echo "🔄 PM2 reloaded"
            fi
            nginx -t 2>/dev/null && systemctl reload nginx 2>/dev/null || true
            echo "✅ Services restarted"
          EOF

      - name: Health check
        run: |
          echo "⏳ Waiting for app..."
          sleep 15
          for i in 1 2 3 4 5; do
            HEALTH=$(ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
              "curl -sf http://127.0.0.1:5000/api/health 2>/dev/null" || echo "")
            if echo "$HEALTH" | grep -q '"ok"\|"status"'; then
              echo "✅ Health check PASSED (attempt $i)"
              exit 0
            fi
            echo "⏳ Attempt $i/5..."
            sleep 5
          done
          echo "⚠️ Health check could not confirm — check manually"

  # ─── Summary ─────────────────────────────────────────────────────
  notify:
    name: "📢 Summary"
    runs-on: ubuntu-latest
    needs: [preflight, deploy]
    if: always()
    steps:
      - name: Deployment summary
        run: |
          STATUS="${{ needs.deploy.result }}"
          SHA="${{ needs.preflight.outputs.short_sha }}"
          [ "$STATUS" = "success" ] && ICON="✅" || ICON="❌"

          echo "## $ICON Production Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|:-------|:------|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | $STATUS |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`$SHA\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Actor  | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Time   | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "| URL    | https://${{ secrets.DOMAIN || 'alaweal.org' }} |" >> $GITHUB_STEP_SUMMARY
