# ════════════════════════════════════════════════════════════════
#  Alawael ERP - Deploy to Hostinger VPS via SSH
#  النشر التلقائي على سيرفر Hostinger عند كل push
# ════════════════════════════════════════════════════════════════
name: 🚀 Deploy to Hostinger VPS

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'deploy/hostinger/**'
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'ماذا تريد نشره؟'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - backend-only
          - frontend-only

env:
  APP_DIR: /home/alawael/app
  NODE_VERSION: '22'

# Prevent concurrent deployments
concurrency:
  group: deploy-hostinger
  cancel-in-progress: false

jobs:
  # ─── Stage 1: Test ──────────────────────────────────────────────
  test:
    name: ✅ Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json

    - name: Install Backend Dependencies
      working-directory: backend
      run: npm ci

    - name: Run Backend Tests
      working-directory: backend
      run: npm test -- --passWithNoTests --no-coverage --forceExit
      env:
        NODE_ENV: test
        DISABLE_REDIS: 'true'

  # ─── Stage 2: Build Frontend ────────────────────────────────────
  build-frontend:
    name: 📦 Build Frontend
    runs-on: ubuntu-latest
    needs: test
    if: |
      github.event.inputs.deploy_target != 'backend-only'
    timeout-minutes: 15

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install Dependencies
      working-directory: frontend
      run: |
        npm install -g npm@latest
        npm ci

    - name: Build Production Bundle
      working-directory: frontend
      run: npm run build
      env:
        REACT_APP_API_URL: https://${{ secrets.DOMAIN }}/api
        REACT_APP_API_V1_URL: https://${{ secrets.DOMAIN }}/api/v1
        REACT_APP_WS_URL: wss://${{ secrets.DOMAIN }}
        REACT_APP_ENVIRONMENT: production
        REACT_APP_DEBUG: 'false'
        GENERATE_SOURCEMAP: 'false'
        CI: 'false'

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: frontend-build
        path: frontend/build/
        retention-days: 1

  # ─── Stage 3: Deploy ────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to VPS
    runs-on: ubuntu-latest
    needs: [test, build-frontend]
    if: |
      always() &&
      needs.test.result == 'success' &&
      (needs.build-frontend.result == 'success' || needs.build-frontend.result == 'skipped')
    timeout-minutes: 10
    environment:
      name: production
      url: https://${{ secrets.DOMAIN }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Download Frontend Build
      if: needs.build-frontend.result == 'success'
      uses: actions/download-artifact@v4
      with:
        name: frontend-build
        path: frontend/build/

    - name: Setup SSH Key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

    - name: Deploy Backend
      if: |
        github.event.inputs.deploy_target != 'frontend-only'
      run: |
        echo "📤 Uploading backend files..."
        rsync -avz --delete \
          --exclude='node_modules' \
          --exclude='.env' \
          --exclude='logs/' \
          --exclude='uploads/' \
          --exclude='__tests__/' \
          --exclude='*.test.js' \
          --exclude='*.spec.js' \
          --exclude='coverage/' \
          backend/ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ env.APP_DIR }}/backend/

        echo "📦 Installing production dependencies..."
        ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
          cd /home/alawael/app/backend
          npm ci --production --no-audit --no-fund
          echo "✅ Backend dependencies installed"
        EOF

    - name: Deploy Frontend
      if: |
        needs.build-frontend.result == 'success'
      run: |
        echo "📤 Uploading frontend build..."
        rsync -avz --delete \
          frontend/build/ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ env.APP_DIR }}/frontend/build/
        echo "✅ Frontend uploaded"

    - name: Deploy Config Files
      run: |
        rsync -avz \
          deploy/hostinger/ecosystem.config.js \
          ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ env.APP_DIR }}/ecosystem.config.js

    - name: Restart Application
      run: |
        ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
          cd /home/alawael/app

          # Restart PM2
          if pm2 list | grep -q "alawael-api"; then
            pm2 reload alawael-api --update-env
            echo "🔄 PM2 reloaded (zero-downtime)"
          else
            pm2 start ecosystem.config.js
            echo "🚀 PM2 started fresh"
          fi
          pm2 save

          # Reload Nginx (in case of config changes)
          sudo nginx -t && sudo systemctl reload nginx
          echo "✅ Nginx reloaded"
        EOF

    - name: Health Check
      run: |
        echo "⏳ Waiting for application to start..."
        sleep 5

        for i in 1 2 3 4 5; do
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://${{ secrets.DOMAIN }}/health 2>/dev/null || echo "000")

          if [ "$STATUS" = "200" ]; then
            echo "✅ Health check passed! (HTTP $STATUS)"
            exit 0
          fi
          echo "⏳ Attempt $i/5 - HTTP $STATUS, retrying in 5s..."
          sleep 5
        done

        echo "❌ Health check failed after 5 attempts"
        exit 1

    - name: Deployment Summary
      if: always()
      run: |
        echo "════════════════════════════════════════"
        echo "  Deployment Summary"
        echo "════════════════════════════════════════"
        echo "  Domain:    ${{ secrets.DOMAIN }}"
        echo "  Branch:    ${{ github.ref_name }}"
        echo "  Commit:    ${{ github.sha }}"
        echo "  Trigger:   ${{ github.event_name }}"
        echo "  Time:      $(date -u '+%Y-%m-%d %H:%M UTC')"
        echo "════════════════════════════════════════"

  # ─── Rollback (manual) ──────────────────────────────────────────
  rollback:
    name: ⏪ Rollback (Manual)
    runs-on: ubuntu-latest
    if: failure() && needs.deploy.result == 'failure'
    needs: deploy

    steps:
    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

    - name: Rollback PM2
      run: |
        ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
          cd /home/alawael/app
          pm2 restart alawael-api
          echo "⏪ Rolled back to previous version"
        EOF
