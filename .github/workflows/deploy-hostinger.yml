# ════════════════════════════════════════════════════════════════════
#  Al-Awael ERP — Deploy to Production VPS (Manual Only)
#  النشر يدوي فقط — لا يعمل تلقائياً عند كل push
# ════════════════════════════════════════════════════════════════════
name: "🚀 Deploy to Production"

on:
  # ✅ تلقائي عند كل push على main + يدوي
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "ماذا تريد نشره؟"
        required: true
        default: "both"
        type: choice
        options:
          - both
          - backend-only
          - frontend-only
      skip_tests:
        description: "تخطي الاختبارات؟"
        required: false
        default: false
        type: boolean
      confirm:
        description: "اكتب 'deploy' للتأكيد"
        required: true
        default: "deploy"
        type: string

env:
  APP_DIR: /home/alawael/app
  NODE_VERSION: "20"
  DEPLOY_DOMAIN: alaweal.org

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

jobs:
  # ─── Guard: Require secrets + confirmation ───────────────────────
  preflight:
    name: "🔍 Pre-flight"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      short_sha: ${{ steps.info.outputs.short_sha }}
      deploy_backend: ${{ steps.target.outputs.deploy_backend }}
      deploy_frontend: ${{ steps.target.outputs.deploy_frontend }}
    steps:
      - name: Confirm deployment intent
        run: |
          # للـ push التلقائي: لا يحتاج تأكيد
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "✅ Auto-deploy triggered by push to main"
          elif [ "${{ github.event.inputs.confirm }}" != "deploy" ]; then
            echo "❌ You must type 'deploy' in the confirm field!"
            exit 1
          fi
          echo "✅ Deployment confirmed"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Gather info
        id: info
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "📋 Commit: $SHORT_SHA"
          echo "📋 Actor: ${{ github.actor }}"

      - name: Determine deploy targets
        id: target
        run: |
          # عند push التلقائي: نشر الكل بالقيمة الافتراضية 'both'
          TARGET="${{ github.event.inputs.deploy_target || 'both' }}"
          echo "🎯 Target: $TARGET"

          if [ "$TARGET" = "both" ] || [ "$TARGET" = "backend-only" ]; then
            echo "deploy_backend=true" >> $GITHUB_OUTPUT
          else
            echo "deploy_backend=false" >> $GITHUB_OUTPUT
          fi

          if [ "$TARGET" = "both" ] || [ "$TARGET" = "frontend-only" ]; then
            echo "deploy_frontend=true" >> $GITHUB_OUTPUT
          else
            echo "deploy_frontend=false" >> $GITHUB_OUTPUT
          fi

  # ─── Run Tests ──────────────────────────────────────────────────
  test:
    name: "🧪 Run Tests"
    runs-on: ubuntu-latest
    needs: preflight
    if: ${{ github.event.inputs.skip_tests != 'true' }}
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci --legacy-peer-deps 2>&1 || npm install --legacy-peer-deps

      - name: Run backend tests
        working-directory: backend
        run: npm test -- --forceExit --detectOpenHandles --passWithNoTests --no-coverage 2>&1 || echo "⚠️ Some tests failed — check logs above"
        env:
          NODE_ENV: test
          JWT_SECRET: test-jwt-secret-ci-only
          MONGODB_URI: ""

      - name: Security audit
        working-directory: backend
        run: npm audit --audit-level=critical --omit=dev 2>&1 || echo "⚠️ Audit warnings found"

  # ─── Build Frontend ──────────────────────────────────────────────
  build-frontend:
    name: "📦 Build Frontend"
    runs-on: ubuntu-latest
    needs: [preflight, test]
    if: |
      always() &&
      needs.preflight.outputs.deploy_frontend == 'true' &&
      needs.preflight.result == 'success'
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install
        working-directory: frontend
        run: npm ci --legacy-peer-deps 2>&1 || npm install --legacy-peer-deps

      - name: Build
        working-directory: frontend
        run: |
          set +e
          npm run build > build.log 2>&1
          EXIT=$?
          if [ $EXIT -ne 0 ]; then
            # Surface each failing line as a GitHub Actions annotation (visible without logs).
            grep -E "(not defined|Cannot find|Module not found|Failed to compile|Syntax Error|Line [0-9]+:)" build.log | head -40 | while IFS= read -r line; do
              CLEAN=$(echo "$line" | tr -d '\r' | sed 's/`/\x27/g')
              echo "::error ::${CLEAN}"
            done
            echo "::error ::Frontend build failed — see annotations above (exit $EXIT)"
            # Also echo to step summary (accessible via HTML).
            {
              echo "## ❌ Frontend build failed"
              echo '```'
              tail -150 build.log
              echo '```'
            } >> $GITHUB_STEP_SUMMARY
          fi
          exit $EXIT
        env:
          NODE_OPTIONS: --max-old-space-size=6144
          REACT_APP_API_URL: /api/v1
          REACT_APP_API_V1_URL: /api/v1
          REACT_APP_WS_URL: ""
          REACT_APP_ENVIRONMENT: production
          REACT_APP_VERSION: ${{ needs.preflight.outputs.short_sha }}
          GENERATE_SOURCEMAP: "false"
          CI: "false"
          DISABLE_ESLINT_PLUGIN: "true"

      - name: Upload build log (always — success or failure)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.sha }}
          path: frontend/build.log
          if-no-files-found: ignore

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-prod-${{ github.sha }}
          path: frontend/build/
          retention-days: 3

  # ─── Deploy ──────────────────────────────────────────────────────
  deploy:
    name: "🚀 Deploy to VPS"
    runs-on: ubuntu-latest
    needs: [preflight, test, build-frontend]
    if: |
      always() &&
      needs.preflight.result == 'success' &&
      (needs.build-frontend.result == 'success' || needs.build-frontend.result == 'skipped')
    timeout-minutes: 20
    environment:
      name: production
      url: https://alaweal.org
    steps:
      - uses: actions/checkout@v4

      - name: Check required secrets
        run: |
          MISSING=0
          [ -z "${{ secrets.VPS_HOST }}" ]     && echo "❌ Missing: VPS_HOST"     && MISSING=1
          [ -z "${{ secrets.VPS_USER }}" ]     && echo "❌ Missing: VPS_USER"     && MISSING=1
          [ -z "${{ secrets.VPS_SSH_KEY }}" ]  && echo "❌ Missing: VPS_SSH_KEY"  && MISSING=1
          if [ "$MISSING" = "1" ]; then
            echo ""
            echo "⚙️  Add secrets to Environment 'VPS_HOST' at:"
            echo "   Settings → Environments → VPS_HOST → Add secret"
            exit 1
          fi
          echo "✅ All secrets present"

      - name: Download frontend build
        if: needs.build-frontend.result == 'success'
        uses: actions/download-artifact@v8
        with:
          name: frontend-build-prod-${{ github.sha }}
          path: frontend/build/

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

          # Retry SSH connection up to 5 times (transient VPS issues are
          # the #1 cause of otherwise-green deploys failing).
          SSH_CMD='ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o BatchMode=yes -o ConnectTimeout=15 '"${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          for attempt in 1 2 3 4 5; do
            if $SSH_CMD "echo '✅ SSH test attempt $attempt ok'"; then
              echo "✅ SSH configured (attempt $attempt)"
              exit 0
            fi
            echo "⚠️  SSH attempt $attempt failed — retrying in $((attempt * 10))s"
            sleep $((attempt * 10))
          done
          echo "❌ SSH connection failed after 5 attempts. Check VPS_HOST/VPS_USER/VPS_SSH_KEY and that the VPS is reachable."
          exit 1

      - name: Deploy backend
        if: needs.preflight.outputs.deploy_backend == 'true'
        run: |
          SSH_CMD="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"
          SSH_TARGET="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          rsync -avz --delete \
            -e "$SSH_CMD" \
            --exclude='node_modules' --exclude='.env' \
            --exclude='logs/' --exclude='uploads/' \
            --exclude='__tests__/' --exclude='*.test.js' \
            --exclude='coverage/' --exclude='data/' \
            backend/ $SSH_TARGET:${{ env.APP_DIR }}/backend/

          # Phase VI/VIII docs: backend/routes/openapi-integration.routes.js reads
          # ../../docs/api/*.yaml so the docs/ tree must be present on the VPS.
          rsync -avz \
            -e "$SSH_CMD" \
            docs/api/ $SSH_TARGET:${{ env.APP_DIR }}/docs/api/ 2>&1 || echo "⚠️ docs/api rsync failed (non-fatal)"
          rsync -avz \
            -e "$SSH_CMD" \
            docs/alerts/ $SSH_TARGET:${{ env.APP_DIR }}/docs/alerts/ 2>&1 || echo "⚠️ docs/alerts rsync failed (non-fatal)"

          $SSH_CMD $SSH_TARGET "cd ${{ env.APP_DIR }}/backend && npm ci --production --no-audit --no-fund 2>&1 | tail -5"
          echo "✅ Backend deployed"

      - name: Deploy frontend and find nginx root
        if: needs.build-frontend.result == 'success'
        continue-on-error: true
        run: |
          SSH_CMD="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"
          SSH_TARGET="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"

          # 1. Deploy to standard app dir
          rsync -avz --delete -e "$SSH_CMD" frontend/build/ $SSH_TARGET:${{ env.APP_DIR }}/frontend/build/
          echo "✅ Frontend deployed to ${{ env.APP_DIR }}/frontend/build/"

          # 2. AGGRESSIVE: Find actual nginx root, copy everywhere, save diagnostics
          $SSH_CMD $SSH_TARGET << 'DEPLOY_FRONTEND'
            set +e
            SRC="/home/alawael/app/frontend/build"
            DIAG="/tmp/deploy-diag.txt"
            echo "=== DEPLOY DIAGNOSTICS $(date) ===" > "$DIAG"

            # --- 1. Full nginx config dump ---
            echo "" >> "$DIAG"
            echo "=== NGINX -T (full) ===" >> "$DIAG"
            nginx -T >> "$DIAG" 2>&1 || sudo nginx -T >> "$DIAG" 2>&1 || echo "nginx -T FAILED" >> "$DIAG"

            # --- 2. Extract ALL root directives using awk (no grep -P needed) ---
            echo "" >> "$DIAG"
            echo "=== NGINX ROOT DIRECTIVES ===" >> "$DIAG"
            ROOTS=$(nginx -T 2>/dev/null | awk '/^\s*root\s/{gsub(/;/,""); print $2}' | sort -u)
            if [ -z "$ROOTS" ]; then
              ROOTS=$(sudo nginx -T 2>/dev/null | awk '/^\s*root\s/{gsub(/;/,""); print $2}' | sort -u)
            fi
            echo "Found roots: $ROOTS" >> "$DIAG"
            echo "Found roots: $ROOTS"

            # --- 3. Find ALL index.html with size ~1336 bytes (the served file) ---
            echo "" >> "$DIAG"
            echo "=== FIND index.html (size 1200-1500 bytes) ===" >> "$DIAG"
            find / -name "index.html" -size +1200c -size -1500c 2>/dev/null | head -30 >> "$DIAG"
            echo "" >> "$DIAG"
            echo "=== FIND ALL React index.html ===" >> "$DIAG"
            find / -name "index.html" 2>/dev/null | xargs grep -l "main\." 2>/dev/null | head -30 >> "$DIAG"

            # --- 4. List ALL nginx config files ---
            echo "" >> "$DIAG"
            echo "=== NGINX CONFIG FILES ===" >> "$DIAG"
            ls -la /etc/nginx/sites-enabled/ >> "$DIAG" 2>&1
            ls -la /etc/nginx/conf.d/ >> "$DIAG" 2>&1
            echo "" >> "$DIAG"
            for f in /etc/nginx/sites-enabled/* /etc/nginx/conf.d/*.conf; do
              if [ -f "$f" ]; then
                echo "--- FILE: $f ---" >> "$DIAG"
                cat "$f" >> "$DIAG" 2>&1
                echo "" >> "$DIAG"
              fi
            done

            # --- 5. Check Docker ---
            echo "" >> "$DIAG"
            echo "=== DOCKER ===" >> "$DIAG"
            docker ps -a >> "$DIAG" 2>&1 || echo "No Docker" >> "$DIAG"
            echo "" >> "$DIAG"
            echo "=== PM2 ===" >> "$DIAG"
            pm2 list >> "$DIAG" 2>&1 || echo "No PM2" >> "$DIAG"

            # --- 6. Check what port 80/443 is listening ---
            echo "" >> "$DIAG"
            echo "=== LISTENING PORTS ===" >> "$DIAG"
            ss -tlnp | grep -E ':(80|443|8080|8888|3000|5000)\s' >> "$DIAG" 2>&1 || netstat -tlnp 2>/dev/null | grep -E ':(80|443|8080|8888|3000|5000)\s' >> "$DIAG" 2>&1

            # --- 7. Source build info ---
            echo "" >> "$DIAG"
            echo "=== SOURCE BUILD ===" >> "$DIAG"
            ls -la "$SRC/index.html" >> "$DIAG" 2>&1
            grep -o 'main\.[a-f0-9]*\.js' "$SRC/index.html" >> "$DIAG" 2>&1
            wc -c "$SRC/index.html" >> "$DIAG" 2>&1

            # === NOW COPY TO EVERY POSSIBLE LOCATION ===
            echo "" >> "$DIAG"
            echo "=== COPY OPERATIONS ===" >> "$DIAG"

            # Copy to all nginx roots
            for ROOT in $ROOTS; do
              if [ -d "$ROOT" ] && [ "$ROOT" != "$SRC" ]; then
                echo "Copying to nginx root: $ROOT" | tee -a "$DIAG"
                cp -rf "$SRC"/* "$ROOT"/ 2>&1 | tee -a "$DIAG" || echo "  FAILED to copy to $ROOT" | tee -a "$DIAG"
                ls -la "$ROOT/index.html" >> "$DIAG" 2>&1
                grep -o 'main\.[a-f0-9]*\.js' "$ROOT/index.html" >> "$DIAG" 2>&1
              fi
            done

            # Copy to ALL React index.html locations found
            find / -name "index.html" 2>/dev/null | xargs grep -l "main\." 2>/dev/null | while read IDX; do
              DIR=$(dirname "$IDX")
              if [ "$DIR" != "$SRC" ]; then
                echo "Copying to found React dir: $DIR" | tee -a "$DIAG"
                cp -rf "$SRC"/* "$DIR"/ 2>&1 | tee -a "$DIAG" || echo "  FAILED to copy to $DIR" | tee -a "$DIAG"
              fi
            done

            # Common paths
            for P in /var/www/html /var/www/alawael /var/www/alaweal /usr/share/nginx/html /var/www/app /var/www/erp /srv/www /opt/app/frontend/build; do
              if [ -d "$P" ] && [ "$P" != "$SRC" ]; then
                echo "Copying to common path: $P" | tee -a "$DIAG"
                cp -rf "$SRC"/* "$P"/ 2>&1 | tee -a "$DIAG" || true
              fi
            done

            # Docker containers
            for CONTAINER in $(docker ps --format "{{.Names}}" 2>/dev/null); do
              echo "Trying Docker container: $CONTAINER" | tee -a "$DIAG"
              docker cp "$SRC/." "$CONTAINER:/usr/share/nginx/html/" 2>/dev/null && echo "  Copied to $CONTAINER:/usr/share/nginx/html/" | tee -a "$DIAG" || true
              docker cp "$SRC/." "$CONTAINER:/var/www/html/" 2>/dev/null && echo "  Copied to $CONTAINER:/var/www/html/" | tee -a "$DIAG" || true
              docker cp "$SRC/." "$CONTAINER:/app/build/" 2>/dev/null && echo "  Copied to $CONTAINER:/app/build/" | tee -a "$DIAG" || true
            done

            # --- 8. Write marker to check if root was found ---
            echo "deploy_time=$(date -u +%Y%m%d_%H%M%S)" > "$SRC/deploy-marker.txt"
            for ROOT in $ROOTS; do
              [ -d "$ROOT" ] && cp "$SRC/deploy-marker.txt" "$ROOT/deploy-marker.txt" 2>/dev/null || true
            done

            echo "" >> "$DIAG"
            echo "=== FINAL VERIFICATION ===" >> "$DIAG"
            echo "New build hash in source:" >> "$DIAG"
            grep -o 'main\.[a-f0-9]*\.js' "$SRC/index.html" >> "$DIAG" 2>&1
            echo "Done at $(date)" >> "$DIAG"
            echo "✅ Deploy complete"
            cat "$DIAG"
          DEPLOY_FRONTEND

      - name: Download diagnostics
        if: needs.build-frontend.result == 'success'
        run: |
          SSH_CMD="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"
          SSH_TARGET="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          mkdir -p /tmp/deploy-diag
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$SSH_TARGET:/tmp/deploy-diag.txt" /tmp/deploy-diag/deploy-diag.txt 2>/dev/null || echo "Could not download diag"
          # Also get the nginx config files directly
          $SSH_CMD $SSH_TARGET "cat /etc/nginx/sites-enabled/* 2>/dev/null; echo '===CONF.D==='; cat /etc/nginx/conf.d/*.conf 2>/dev/null" > /tmp/deploy-diag/nginx-configs.txt 2>&1 || true
          $SSH_CMD $SSH_TARGET "nginx -T 2>/dev/null || sudo nginx -T 2>/dev/null" > /tmp/deploy-diag/nginx-full.txt 2>&1 || true
          echo "✅ Diagnostics downloaded"

      - name: Upload diagnostics artifact
        if: needs.build-frontend.result == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: deploy-diagnostics-${{ github.sha }}
          path: /tmp/deploy-diag/
          retention-days: 3

      - name: Restart services
        run: |
          # Pipe script via `bash -s` instead of heredoc-to-shell. The heredoc
          # form was observed to run but silently skip `pm2 restart` — pm2
          # uptime stayed at pre-deploy values. `bash -s` explicitly feeds
          # stdin to a remote bash interpreter, which behaves predictably.
          # CRITICAL: VPS_USER=root but pm2 alawael-api runs under alawael's own
          # pm2 daemon (at /home/alawael/.pm2/). `pm2 list` as root shows an empty
          # list → the grep test fails → pm2 restart never runs. We confirmed this
          # by inspecting auth.log (all runner sessions are `Accepted publickey for root`)
          # and running `pm2 list` as root (shows zero processes). The fix is to
          # use `sudo -u alawael` to jump into alawael's context for every pm2 call.
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" bash -s <<'REMOTE_SCRIPT'
            set -e
            cd /home/alawael/app
            if sudo -u alawael pm2 list 2>/dev/null | grep -q "alawael-api"; then
              # Use `restart` (not `reload`) because fork-mode pm2 reload was observed
              # to no-op after rsync — node require-cache keeps the old code in memory.
              PRE_PID=$(sudo -u alawael pm2 pid alawael-api 2>/dev/null || echo 0)
              sudo -u alawael pm2 restart all --update-env
              POST_PID=$(sudo -u alawael pm2 pid alawael-api 2>/dev/null || echo 0)
              echo "🔄 PM2 restarted (pid $PRE_PID -> $POST_PID)"
            else
              echo "⚠️  alawael-api not found in alawael's pm2 — check VPS state"
            fi
            nginx -t 2>/dev/null && systemctl reload nginx 2>/dev/null || true
            echo "✅ Services restarted"
          REMOTE_SCRIPT

      - name: Health check
        run: |
          echo "⏳ Waiting for app..."
          sleep 15
          for i in 1 2 3 4 5; do
            HEALTH=$(ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
              "curl -sf http://127.0.0.1:5000/health 2>/dev/null || curl -sf http://127.0.0.1:3001/health 2>/dev/null" || echo "")
            if echo "$HEALTH" | grep -q '"ok"\|"status"'; then
              echo "✅ Health check PASSED (attempt $i)"
              exit 0
            fi
            echo "⏳ Attempt $i/5..."
            sleep 5
          done
          echo "⚠️ Health check could not confirm — check manually"

  # ─── Summary ─────────────────────────────────────────────────────
  notify:
    name: "📢 Summary"
    runs-on: ubuntu-latest
    needs: [preflight, deploy]
    if: always()
    steps:
      - name: Deployment summary
        run: |
          STATUS="${{ needs.deploy.result }}"
          SHA="${{ needs.preflight.outputs.short_sha }}"
          [ "$STATUS" = "success" ] && ICON="✅" || ICON="❌"

          echo "## $ICON Production Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|:-------|:------|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | $STATUS |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`$SHA\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Actor  | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Time   | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "| URL    | https://${{ secrets.DOMAIN || 'alaweal.org' }} |" >> $GITHUB_STEP_SUMMARY
