# ════════════════════════════════════════════════════════════════════
#  Al-Awael ERP — Deploy to Production VPS (auto on push to main + manual dispatch)
#  ينشر تلقائياً عند كل push على main (CD)، وأيضاً يدوياً عبر workflow_dispatch.
#  للتشغيل اليدوي فقط يلزم كتابة "deploy" في حقل confirm — انظر خطوة
#  "Confirm deployment intent" أدناه؛ الـ push التلقائي لا يحتاج تأكيداً.
# ════════════════════════════════════════════════════════════════════
name: "🚀 Deploy to Production"

on:
  # ✅ تلقائي عند كل push على main + يدوي.
  # paths-ignore: لا تُطلق نشراً إنتاجياً للتغييرات التي لا تمسّ وقت تشغيل
  # التطبيق المنشور (وثائق + إعدادات CI/الحوكمة). أي تغيير في كود backend/
  # frontend أو التبعيات (package.json) لا يُطابَق هنا فيستمر بالنشر كالمعتاد.
  # يُتخطّى التشغيل فقط حين تكون كل الملفات المتغيّرة ضمن هذه الأنماط.
  # النشر اليدوي (workflow_dispatch) لا يتأثر بـ paths-ignore إطلاقاً.
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "ماذا تريد نشره؟"
        required: true
        default: "both"
        type: choice
        options:
          - both
          - backend-only
          - frontend-only
      skip_tests:
        description: "تخطي الاختبارات؟"
        required: false
        default: false
        type: boolean
      confirm:
        description: "اكتب 'deploy' للتأكيد"
        required: true
        default: "deploy"
        type: string

env:
  APP_DIR: /home/alawael/app
  NODE_VERSION: "20"
  DEPLOY_DOMAIN: alaweal.org

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

jobs:
  # ─── Guard: Require secrets + confirmation ───────────────────────
  preflight:
    name: "🔍 Pre-flight"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      short_sha: ${{ steps.info.outputs.short_sha }}
      deploy_backend: ${{ steps.target.outputs.deploy_backend }}
      deploy_frontend: ${{ steps.target.outputs.deploy_frontend }}
    steps:
      - name: Confirm deployment intent
        run: |
          # للـ push التلقائي: لا يحتاج تأكيد
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "✅ Auto-deploy triggered by push to main"
          elif [ "${{ github.event.inputs.confirm }}" != "deploy" ]; then
            echo "❌ You must type 'deploy' in the confirm field!"
            exit 1
          fi
          echo "✅ Deployment confirmed"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Gather info
        id: info
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "📋 Commit: $SHORT_SHA"
          echo "📋 Actor: ${{ github.actor }}"

      - name: Determine deploy targets
        id: target
        run: |
          # عند push التلقائي: نشر الكل بالقيمة الافتراضية 'both'
          TARGET="${{ github.event.inputs.deploy_target || 'both' }}"
          echo "🎯 Target: $TARGET"

          if [ "$TARGET" = "both" ] || [ "$TARGET" = "backend-only" ]; then
            echo "deploy_backend=true" >> $GITHUB_OUTPUT
          else
            echo "deploy_backend=false" >> $GITHUB_OUTPUT
          fi

          if [ "$TARGET" = "both" ] || [ "$TARGET" = "frontend-only" ]; then
            echo "deploy_frontend=true" >> $GITHUB_OUTPUT
          else
            echo "deploy_frontend=false" >> $GITHUB_OUTPUT
          fi

  # ─── Run Tests ──────────────────────────────────────────────────
  # CI approach: single job, no sharding. The run-sprint.js script
  # generates testMatch from sprint-tests.txt; --shard is incompatible
  # with this approach because Jest cannot partition absolute testMatch
  # paths. CI uses --runInBand to avoid MongoDB Memory Server deadlock.
  test:
    name: "🧪 Run Tests (sprint gate)"
    runs-on: ubuntu-latest
    needs: preflight
    if: ${{ github.event.inputs.skip_tests != 'true' }}
    continue-on-error: true
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install backend dependencies
        working-directory: backend
        run: npm install --legacy-peer-deps
      - name: Cache MongoMemoryServer binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/mongodb-binaries
          key: mongodb-binaries-${{ runner.os }}-${{ hashFiles('backend/package.json') }}
          restore-keys: |
            mongodb-binaries-${{ runner.os }}-
      - name: Pre-warm MongoMemoryServer binary
        working-directory: backend
        run: |
          node -e "const{MongoMemoryServer}=require('mongodb-memory-server');MongoMemoryServer.create().then(async m=>{console.log('mongod ready at',m.getUri());await m.stop();process.exit(0)}).catch(e=>{console.error('prewarm failed:',e&&e.message);process.exit(1)})" \
            || echo '⚠️ MMS pre-warm failed — tests may time out'
      - name: Run backend tests (sprint gate)
        working-directory: backend
        run: |
          # Pre-deploy SANITY gate = the fast static guards only (maintenance-mocks +
          # model-collisions + sprint-paths). The FULL sprint suite has its own
          # dedicated, SHARDED, gating workflow ("Sprint Tests") that runs on the same
          # push/PR and completes GREEN; running it again here UNSHARDED only ever hit
          # the 15-min cap (cancelled badge, zero added signal). Scoped to test:guard so
          # this job completes and the deploy run badge reflects reality.
          npm run test:guard
        env:
          NODE_ENV: test
          JWT_SECRET: test-jwt-secret-ci-only
          MONGODB_URI: ""
      - name: Security audit
        working-directory: backend
        run: npm audit --audit-level=critical --omit=dev 2>&1 || echo "⚠️ Audit warnings found (non-blocking)"

  # ─── Build Frontend ──────────────────────────────────────────────
  build-frontend:
    name: "📦 Build Frontend"
    runs-on: ubuntu-latest
    needs: [preflight, test]
    if: |
      always() &&
      needs.preflight.outputs.deploy_frontend == 'true' &&
      needs.preflight.result == 'success'
    continue-on-error: true
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install
        working-directory: frontend
        run: npm install --legacy-peer-deps
      - name: Build
        working-directory: frontend
        run: |
          set +e
          npm run build > build.log 2>&1
          EXIT=$?
          if [ $EXIT -ne 0 ]; then
            grep -E "(not defined|Cannot find|Module not found|Failed to compile|Syntax Error|Line [0-9]+:)" build.log | head -40 | while IFS= read -r line; do
              CLEAN=$(echo "$line" | tr -d '\r' | sed 's/`/\x27/g')
              echo "::error ::${CLEAN}"
            done
            echo "::error ::Frontend build failed — see annotations above (exit $EXIT)"
            {
              echo "## ❌ Frontend build failed"
              echo '```'
              tail -150 build.log
              echo '```'
            } >> $GITHUB_STEP_SUMMARY
          fi
          exit $EXIT
        env:
          NODE_OPTIONS: --max-old-space-size=6144
          VITE_API_BASE_URL: /api/v1
          VITE_API_V1_URL: /api/v1
          VITE_WS_URL: ""
          VITE_ENVIRONMENT: production
          VITE_VERSION: ${{ needs.preflight.outputs.short_sha }}
          GENERATE_SOURCEMAP: "false"
          CI: "false"
          DISABLE_ESLINT_PLUGIN: "true"
      - name: Upload build log (always — success or failure)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.sha }}
          path: frontend/build.log
          if-no-files-found: ignore
      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-prod-${{ github.sha }}
          path: frontend/dist/
          retention-days: 3
          if-no-files-found: ignore

  # ─── Deploy ──────────────────────────────────────────────────────
  deploy:
    name: "🚀 Deploy to VPS"
    runs-on: ubuntu-latest
    needs: [preflight, test, build-frontend]
    if: always() && needs.preflight.result == 'success'
    timeout-minutes: 20
    environment:
      name: production
      url: https://alaweal.org
    steps:
      - uses: actions/checkout@v4
      - name: Check required secrets
        run: |
          MISSING=0
          [ -z "${{ secrets.VPS_HOST }}" ]     && echo "❌ Missing: VPS_HOST"     && MISSING=1
          [ -z "${{ secrets.VPS_USER }}" ]     && echo "❌ Missing: VPS_USER"     && MISSING=1
          [ -z "${{ secrets.VPS_SSH_KEY }}" ]  && echo "❌ Missing: VPS_SSH_KEY"  && MISSING=1
          if [ "$MISSING" = "1" ]; then
            echo ""
            echo "⚙️  Add secrets to Environment 'VPS_HOST' at:"
            echo "   Settings → Environments → VPS_HOST → Add secret"
            exit 1
          fi
          echo "✅ All secrets present"
      - name: Download frontend build
        if: needs.build-frontend.result == 'success'
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: frontend-build-prod-${{ github.sha }}
          path: frontend/dist/
      - name: Verify frontend artifact
        id: check_frontend
        run: |
          if [ -d "frontend/dist" ] && [ -f "frontend/dist/index.html" ]; then
            echo "has_frontend=true" >> $GITHUB_OUTPUT
            echo "✅ Frontend artifact ready for deploy"
          else
            echo "has_frontend=false" >> $GITHUB_OUTPUT
            echo "⚠️  Frontend build not available — backend-only deploy"
          fi
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          SSH_CMD='ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o BatchMode=yes -o ConnectTimeout=25 ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}'
          for attempt in 1 2 3 4 5 6 7 8; do
            if $SSH_CMD "echo '✅ SSH test attempt $attempt ok'"; then
              echo "✅ SSH configured (attempt $attempt)"
              exit 0
            fi
            echo "⚠️  SSH attempt $attempt failed — retrying in $((attempt * 12))s"
            sleep $((attempt * 12))
          done
          echo "❌ SSH connection failed after 8 attempts (~10 min). Check VPS_HOST/VPS_USER/VPS_SSH_KEY and that the VPS is reachable."
          exit 1
      - name: Anti-regression guard (refuse older run over newer deploy)
        run: |
          SSH_CMD="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"
          SSH_TARGET="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          DEPLOYED=$($SSH_CMD $SSH_TARGET "head -1 ${{ env.APP_DIR }}/DEPLOY_STAMP 2>/dev/null" || echo "")
          INCOMING="${{ github.run_number }}"
          echo "deployed run: '${DEPLOYED:-none}' — incoming run: #$INCOMING"
          if [ -n "$DEPLOYED" ] && [ "$DEPLOYED" -eq "$DEPLOYED" ] 2>/dev/null && [ "$DEPLOYED" -gt "$INCOMING" ]; then
            echo "❌ REFUSING TO DEPLOY: run #$INCOMING is OLDER than already-deployed run #$DEPLOYED."
            echo "   This is almost always a rerun of a stale failed run after a newer run"
            echo "   succeeded — deploying it would silently REVERT prod to older code."
            echo "   To deliberately roll back, use workflow_dispatch (gets a fresh run number)."
            exit 1
          fi
          echo "✅ Guard passed — proceeding"
      - name: W1437 pre-deploy migration
        if: |
          needs.preflight.outputs.deploy_backend == 'true' &&
          vars.RUN_W1437_MIGRATION == 'true'
        run: |
          set -eo pipefail
          SSH_CMD="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"
          SSH_TARGET="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          if [ -z "${{ secrets.MONGODB_URI }}" ]; then
            echo "❌ MONGODB_URI secret is required for W1437 migration"
            exit 1
          fi
          echo "🗄️ Running W1437 migration on production host..."
          $SSH_CMD $SSH_TARGET bash -s <<'REMOTE_SCRIPT'
            set -euo pipefail
            cd "${{ env.APP_DIR }}"
            export MONGODB_URI="${{ secrets.MONGODB_URI }}"
            export NODE_ENV=production
            export DEPLOY_ROOT="${{ env.APP_DIR }}"
            ./scripts/deploy-w1437.sh --force
          REMOTE_SCRIPT
          echo "✅ W1437 migration completed"
      - name: Deploy backend
        if: needs.preflight.outputs.deploy_backend == 'true'
        run: |
          SSH_CMD="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"
          SSH_TARGET="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          rsync -avz --delete \
            -e "$SSH_CMD" \
            --exclude='node_modules' --exclude='.env' \
            --exclude='logs/' --exclude='uploads/' \
            --exclude='__tests__/' --exclude='*.test.js' \
            --exclude='coverage/' --exclude='data/' \
            backend/ $SSH_TARGET:${{ env.APP_DIR }}/backend/
          rsync -avz \
            -e "$SSH_CMD" \
            docs/api/ $SSH_TARGET:${{ env.APP_DIR }}/docs/api/ 2>&1 || echo "⚠️ docs/api rsync failed (non-fatal)"
          rsync -avz \
            -e "$SSH_CMD" \
            docs/alerts/ $SSH_TARGET:${{ env.APP_DIR }}/docs/alerts/ 2>&1 || echo "⚠️ docs/alerts rsync failed (non-fatal)"
          $SSH_CMD $SSH_TARGET "cd ${{ env.APP_DIR }}/backend && npm install --production --no-audit --no-fund 2>&1 | tail -5"
          echo "${{ github.sha }}" | $SSH_CMD $SSH_TARGET "cat > ${{ env.APP_DIR }}/backend/BUILD_SHA && chown www:www ${{ env.APP_DIR }}/backend/BUILD_SHA"
          echo "✅ Backend deployed"
      - name: Deploy frontend and find nginx root
        if: steps.check_frontend.outputs.has_frontend == 'true'
        continue-on-error: true
        run: |
          SSH_CMD="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"
          SSH_TARGET="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          rsync -avz --delete -e "$SSH_CMD" frontend/dist/ $SSH_TARGET:${{ env.APP_DIR }}/frontend/dist/
          echo "✅ Frontend deployed to ${{ env.APP_DIR }}/frontend/dist/"
          $SSH_CMD $SSH_TARGET << 'DEPLOY_FRONTEND'
            set +e
            SRC="/home/alawael/app/frontend/dist"
            DIAG="/tmp/deploy-diag.txt"
            echo "=== DEPLOY DIAGNOSTICS $(date) ===" > "$DIAG"
            echo "=== NGINX -T (full) ===" >> "$DIAG"
            nginx -T >> "$DIAG" 2>&1 || sudo nginx -T >> "$DIAG" 2>&1 || echo "nginx -T FAILED" >> "$DIAG"
            echo "=== NGINX ROOT DIRECTIVES ===" >> "$DIAG"
            ROOTS=$(nginx -T 2>/dev/null | awk '/^\s*root\s/{gsub(/;/,""); print $2}' | sort -u)
            if [ -z "$ROOTS" ]; then
              ROOTS=$(sudo nginx -T 2>/dev/null | awk '/^\s*root\s/{gsub(/;/,""); print $2}' | sort -u)
            fi
            echo "Found roots: $ROOTS" >> "$DIAG"
            echo "Found roots: $ROOTS"
            echo "=== FIND index.html (size 1200-1500 bytes) ===" >> "$DIAG"
            find / -name "index.html" -size +1200c -size -1500c 2>/dev/null | head -30 >> "$DIAG"
            echo "=== FIND ALL React index.html ===" >> "$DIAG"
            find / -name "index.html" 2>/dev/null | xargs grep -l "main\." 2>/dev/null | head -30 >> "$DIAG"
            echo "=== NGINX CONFIG FILES ===" >> "$DIAG"
            ls -la /etc/nginx/sites-enabled/ >> "$DIAG" 2>&1
            ls -la /etc/nginx/conf.d/ >> "$DIAG" 2>&1
            for f in /etc/nginx/sites-enabled/* /etc/nginx/conf.d/*.conf; do
              if [ -f "$f" ]; then
                echo "--- FILE: $f ---" >> "$DIAG"
                cat "$f" >> "$DIAG" 2>&1
                echo "" >> "$DIAG"
              fi
            done
            echo "=== DOCKER ===" >> "$DIAG"
            docker ps -a >> "$DIAG" 2>&1 || echo "No Docker" >> "$DIAG"
            echo "=== PM2 ===" >> "$DIAG"
            pm2 list >> "$DIAG" 2>&1 || echo "No PM2" >> "$DIAG"
            echo "=== LISTENING PORTS ===" >> "$DIAG"
            ss -tlnp | grep -E ':(80|443|8080|8888|3000|5000)\s' >> "$DIAG" 2>&1 || netstat -tlnp 2>/dev/null | grep -E ':(80|443|8080|8888|3000|5000)\s' >> "$DIAG" 2>&1
            echo "=== SOURCE BUILD ===" >> "$DIAG"
            ls -la "$SRC/index.html" >> "$DIAG" 2>&1
            grep -o 'main\.[a-f0-9]*\.js' "$SRC/index.html" >> "$DIAG" 2>&1
            wc -c "$SRC/index.html" >> "$DIAG" 2>&1
            echo "=== COPY OPERATIONS ===" >> "$DIAG"
            for ROOT in $ROOTS; do
              if [ -d "$ROOT" ] && [ "$ROOT" != "$SRC" ]; then
                echo "Copying to nginx root: $ROOT" | tee -a "$DIAG"
                cp -rf "$SRC"/* "$ROOT"/ 2>&1 | tee -a "$DIAG" || echo "  FAILED to copy to $ROOT" | tee -a "$DIAG"
                ls -la "$ROOT/index.html" >> "$DIAG" 2>&1
                grep -o 'main\.[a-f0-9]*\.js' "$ROOT/index.html" >> "$DIAG" 2>&1
              fi
            done
            find / -name "index.html" 2>/dev/null | xargs grep -l "main\." 2>/dev/null | while read IDX; do
              DIR=$(dirname "$IDX")
              if [ "$DIR" != "$SRC" ]; then
                echo "Copying to found React dir: $DIR" | tee -a "$DIAG"
                cp -rf "$SRC"/* "$DIR"/ 2>&1 | tee -a "$DIAG" || echo "  FAILED to copy to $DIR" | tee -a "$DIAG"
              fi
            done
            for P in /var/www/html /var/www/alawael /var/www/alaweal /usr/share/nginx/html /var/www/app /var/www/erp /srv/www /opt/app/frontend/dist; do
              if [ -d "$P" ] && [ "$P" != "$SRC" ]; then
                echo "Copying to common path: $P" | tee -a "$DIAG"
                cp -rf "$SRC"/* "$P"/ 2>&1 | tee -a "$DIAG" || true
              fi
            done
            for CONTAINER in $(docker ps --format "{{.Names}}" 2>/dev/null); do
              echo "Trying Docker container: $CONTAINER" | tee -a "$DIAG"
              docker cp "$SRC/." "$CONTAINER:/usr/share/nginx/html/" 2>/dev/null && echo "  Copied to $CONTAINER:/usr/share/nginx/html/" | tee -a "$DIAG" || true
              docker cp "$SRC/." "$CONTAINER:/var/www/html/" 2>/dev/null && echo "  Copied to $CONTAINER:/var/www/html/" | tee -a "$DIAG" || true
              docker cp "$SRC/." "$CONTAINER:/app/build/" 2>/dev/null && echo "  Copied to $CONTAINER:/app/build/" | tee -a "$DIAG" || true
            done
            echo "deploy_time=$(date -u +%Y%m%d_%H%M%S)" > "$SRC/deploy-marker.txt"
            for ROOT in $ROOTS; do
              [ -d "$ROOT" ] && cp "$SRC/deploy-marker.txt" "$ROOT/deploy-marker.txt" 2>/dev/null || true
            done
            echo "=== FINAL VERIFICATION ===" >> "$DIAG"
            echo "New build hash in source:" >> "$DIAG"
            grep -o 'main\.[a-f0-9]*\.js' "$SRC/index.html" >> "$DIAG" 2>&1
            echo "Done at $(date)" >> "$DIAG"
            echo "✅ Deploy complete"
            cat "$DIAG"
          DEPLOY_FRONTEND
      - name: Download diagnostics
        if: steps.check_frontend.outputs.has_frontend == 'true'
        continue-on-error: true
        run: |
          SSH_CMD="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"
          SSH_TARGET="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          mkdir -p /tmp/deploy-diag
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$SSH_TARGET:/tmp/deploy-diag.txt" /tmp/deploy-diag/deploy-diag.txt 2>/dev/null || echo "Could not download diag"
          $SSH_CMD $SSH_TARGET "cat /etc/nginx/sites-enabled/* 2>/dev/null; echo '===CONF.D==='; cat /etc/nginx/conf.d/*.conf 2>/dev/null" > /tmp/deploy-diag/nginx-configs.txt 2>&1 || true
          $SSH_CMD $SSH_TARGET "nginx -T 2>/dev/null || sudo nginx -T 2>/dev/null" > /tmp/deploy-diag/nginx-full.txt 2>&1 || true
          echo "✅ Diagnostics downloaded"
      - name: Upload diagnostics artifact
        if: steps.check_frontend.outputs.has_frontend == 'true'
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: deploy-diagnostics-${{ github.sha }}
          path: /tmp/deploy-diag/
          retention-days: 3
      - name: Restart services
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" bash -s <<'REMOTE_SCRIPT'
            set -e
            cd /home/alawael/app
            if sudo -u alawael pm2 list 2>/dev/null | grep -q "alawael-api"; then
              PRE_PID=$(sudo -u alawael pm2 pid alawael-api 2>/dev/null || echo 0)
              sudo -u alawael pm2 restart all --update-env
              POST_PID=$(sudo -u alawael pm2 pid alawael-api 2>/dev/null || echo 0)
              echo "🔄 PM2 restarted (pid $PRE_PID -> $POST_PID)"
            else
              echo "⚠️  alawael-api not found in alawael's pm2 — check VPS state"
            fi
            # reload-or-restart (NOT plain reload): if nginx is stopped, a plain
            # `reload` silently no-ops and the site stays down; reload-or-restart
            # STARTS it. `enable` ensures nginx survives a reboot. (2026-06-29)
            nginx -t 2>/dev/null && systemctl reload-or-restart nginx 2>/dev/null || true
            systemctl enable nginx 2>/dev/null || true
            echo "✅ Services restarted"
          REMOTE_SCRIPT
      - name: Stamp deployment
        run: |
          SSH_CMD="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"
          SSH_TARGET="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          printf '%s\n%s\n%s\n' "${{ github.run_number }}" "${{ github.sha }}" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            | $SSH_CMD $SSH_TARGET "cat > ${{ env.APP_DIR }}/DEPLOY_STAMP"
          echo "✅ Stamped run #${{ github.run_number }} (${{ github.sha }})"
      - name: Apply idempotent seeds (post-restart)
        if: needs.preflight.outputs.deploy_backend == 'true'
        continue-on-error: true
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" bash -s <<'SEED_SCRIPT'
            set +e
            cd /home/alawael/app/backend
            echo "🌱 Seeding insurance tariffs (idempotent)..."
            sudo -u alawael node scripts/seed-insurance-tariffs.js --json 2>&1 | tail -10
            T_EXIT=$?
            if [ "$T_EXIT" -ne 0 ]; then
              echo "⚠️  Tariff seed exited $T_EXIT — investigate but deploy succeeded"
            else
              echo "✅ Tariff seed applied"
            fi
            echo "🌱 Seeding measures catalog (idempotent)..."
            sudo -u alawael node -r dotenv/config scripts/seed-measures-catalog.js --json 2>&1 | tail -10
            M_EXIT=$?
            if [ "$M_EXIT" -ne 0 ]; then
              echo "⚠️  Measures seed exited $M_EXIT — engine may stay dormant; investigate"
            else
              echo "✅ Measures catalog applied"
            fi
          SEED_SCRIPT
      - name: Health check
        run: |
          echo "⏳ Waiting for app..."
          sleep 15
          for i in 1 2 3 4 5; do
            HEALTH=$(ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
              "curl -sf http://127.0.0.1:5000/health 2>/dev/null || curl -sf http://127.0.0.1:3001/health 2>/dev/null" || echo "")
            if echo "$HEALTH" | grep -q '"ok"\|"status"'; then
              echo "✅ Health check PASSED (attempt $i)"
              break
            fi
            echo "⏳ Attempt $i/5..."
            sleep 5
            [ "$i" = "5" ] && echo "⚠️ Health check could not confirm — check manually"
          done
      - name: Post-deploy smoke probes
        if: needs.preflight.outputs.deploy_backend == 'true'
        continue-on-error: true
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" bash -s <<'SMOKE_SCRIPT'
            set +e
            cd /home/alawael/app/backend
            echo "🔬 Running post-deploy smoke probes..."
            sudo -u alawael node scripts/post-deploy-smoke.js --json 2>&1 | tee /tmp/smoke-report.json
            EXIT=$?
            if [ "$EXIT" -ne 0 ]; then
              echo "⚠️  Smoke detected a critical regression (exit $EXIT)"
            else
              echo "✅ Smoke probes passed"
            fi
          SMOKE_SCRIPT
      - name: Post-deploy primary-journey smoke
        if: needs.preflight.outputs.deploy_backend == 'true'
        continue-on-error: true
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" bash -s <<'JOURNEY_SCRIPT'
            set +e
            cd /home/alawael/app/backend
            echo "🧭 Running primary-journey smoke against live DB..."
            sudo -u alawael node scripts/smoke-primary-journey.js 2>&1 | tee /tmp/smoke-journey-report.txt
            EXIT=$?
            if [ "$EXIT" -ne 0 ]; then
              echo "⚠️  Primary-journey smoke failed (exit $EXIT)"
            else
              echo "✅ Primary-journey smoke passed"
            fi
          JOURNEY_SCRIPT

  # ─── Summary ─────────────────────────────────────────────────────
  notify:
    name: "📢 Summary"
    runs-on: ubuntu-latest
    needs: [preflight, deploy]
    if: always()
    steps:
      - name: Deployment summary
        run: |
          STATUS="${{ needs.deploy.result }}"
          SHA="${{ needs.preflight.outputs.short_sha }}"
          [ "$STATUS" = "success" ] && ICON="✅" || ICON="❌"
          echo "## $ICON Production Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|:-------|:------|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | $STATUS |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`$SHA\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Actor  | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Time   | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "| URL    | https://${{ secrets.DOMAIN || 'alaweal.org' }} |" >> $GITHUB_STEP_SUMMARY
