# ════════════════════════════════════════════════════════════════
#  Al-Awael ERP — Deploy to Staging
#  النشر إلى بيئة الاختبار: اختبار ← بناء ← نشر ← فحص
# ════════════════════════════════════════════════════════════════
name: "🧪 Deploy to Staging"

on:
  push:
    branches: [develop, staging]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/deploy-staging.yml"
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "ماذا تريد نشره؟"
        required: true
        default: "both"
        type: choice
        options:
          - both
          - backend-only
          - frontend-only
      skip_tests:
        description: "تخطي الاختبارات؟"
        required: false
        default: false
        type: boolean

env:
  APP_DIR: /home/alawael/staging
  NODE_VERSION: "22"

concurrency:
  group: deploy-staging
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write

jobs:
  # ─── Stage 1: Pre-flight Checks ─────────────────────────────────
  preflight:
    name: "🔍 Pre-flight"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      short_sha: ${{ steps.info.outputs.short_sha }}
      deploy_backend: ${{ steps.target.outputs.backend }}
      deploy_frontend: ${{ steps.target.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Gather info
        id: info
        run: |
          echo "short_sha=$(echo ${{ github.sha }} | cut -c1-8)" >> $GITHUB_OUTPUT
          echo "📋 Commit: $(echo ${{ github.sha }} | cut -c1-8)"
          echo "📋 Branch: ${{ github.ref_name }}"

      - name: Determine deploy targets
        id: target
        run: |
          TARGET="${{ github.event.inputs.deploy_target || 'both' }}"
          if [ "$TARGET" = "both" ] || [ "$TARGET" = "backend-only" ]; then
            echo "backend=true" >> $GITHUB_OUTPUT
          else
            echo "backend=false" >> $GITHUB_OUTPUT
          fi
          if [ "$TARGET" = "both" ] || [ "$TARGET" = "frontend-only" ]; then
            echo "frontend=true" >> $GITHUB_OUTPUT
          else
            echo "frontend=false" >> $GITHUB_OUTPUT
          fi

  # ─── Stage 2: Test ──────────────────────────────────────────────
  test:
    name: "✅ Run Tests"
    runs-on: ubuntu-latest
    needs: preflight
    if: ${{ github.event.inputs.skip_tests != 'true' }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install & lint
        working-directory: backend
        run: |
          npm ci
          npm run lint -- --max-warnings 0

      - name: Run all tests
        working-directory: backend
        run: npm test -- --passWithNoTests --no-coverage --forceExit --ci --runInBand
        env:
          NODE_ENV: test
          DISABLE_REDIS: "true"

  # ─── Stage 3: Build Frontend ────────────────────────────────────
  build-frontend:
    name: "📦 Build Frontend"
    runs-on: ubuntu-latest
    needs: [preflight, test]
    if: |
      always() &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      needs.preflight.outputs.deploy_frontend == 'true'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: |
          npm install -g npm@latest
          npm ci

      - name: Build for staging
        working-directory: frontend
        run: npm run build
        env:
          REACT_APP_API_URL: https://${{ secrets.STAGING_DOMAIN || 'staging.alaweal.org' }}/api
          REACT_APP_API_V1_URL: https://${{ secrets.STAGING_DOMAIN || 'staging.alaweal.org' }}/api/v1
          REACT_APP_WS_URL: wss://${{ secrets.STAGING_DOMAIN || 'staging.alaweal.org' }}
          REACT_APP_ENVIRONMENT: staging
          REACT_APP_VERSION: ${{ needs.preflight.outputs.short_sha }}
          GENERATE_SOURCEMAP: "true"
          CI: "false"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-staging
          path: frontend/build/
          retention-days: 3

  # ─── Stage 4: Deploy to Staging ─────────────────────────────────
  deploy:
    name: "🧪 Deploy to Staging"
    runs-on: ubuntu-latest
    needs: [preflight, test, build-frontend]
    if: |
      always() &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      (needs.build-frontend.result == 'success' || needs.build-frontend.result == 'skipped')
    timeout-minutes: 15
    environment:
      name: staging
      url: https://${{ secrets.STAGING_DOMAIN || 'staging.alaweal.org' }}
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend build
        if: needs.build-frontend.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: frontend-build-staging
          path: frontend/build/

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.STAGING_SSH_KEY || secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.STAGING_HOST || secrets.VPS_HOST || '72.60.84.56' }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy backend
        if: needs.preflight.outputs.deploy_backend == 'true'
        run: |
          SSH_TARGET="${{ secrets.STAGING_USER || 'root' }}@${{ secrets.STAGING_HOST || secrets.VPS_HOST || '72.60.84.56' }}"
          echo "📤 Uploading backend to staging..."
          rsync -avz --delete \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='logs/' \
            --exclude='uploads/' \
            --exclude='__tests__/' \
            --exclude='*.test.js' \
            --exclude='*.spec.js' \
            --exclude='coverage/' \
            --exclude='data/' \
            backend/ $SSH_TARGET:${{ env.APP_DIR }}/backend/

          echo "📦 Installing production deps..."
          ssh $SSH_TARGET << 'EOF'
            cd /home/alawael/staging/backend
            npm ci --production --no-audit --no-fund 2>&1 | tail -5
            echo "✅ Staging backend deployed"
          EOF

      - name: Deploy frontend
        if: needs.build-frontend.result == 'success'
        run: |
          SSH_TARGET="${{ secrets.STAGING_USER || 'root' }}@${{ secrets.STAGING_HOST || secrets.VPS_HOST || '72.60.84.56' }}"
          echo "📤 Uploading frontend build to staging..."
          rsync -avz --delete \
            frontend/build/ $SSH_TARGET:${{ env.APP_DIR }}/frontend/build/
          echo "✅ Staging frontend deployed"

      - name: Restart staging application
        run: |
          SSH_TARGET="${{ secrets.STAGING_USER || 'root' }}@${{ secrets.STAGING_HOST || secrets.VPS_HOST || '72.60.84.56' }}"
          ssh $SSH_TARGET << 'EOF'
            cd /home/alawael/staging

            if su - alawael -c 'pm2 list' 2>/dev/null | grep -q "alawael-staging"; then
              su - alawael -c 'cd /home/alawael/staging && pm2 reload alawael-staging --update-env'
              echo "🔄 PM2 reloaded staging"
            else
              su - alawael -c 'cd /home/alawael/staging && PORT=5001 pm2 start backend/server.js --name alawael-staging'
              su - alawael -c 'pm2 save'
              echo "🚀 PM2 started staging fresh"
            fi
            echo "✅ Staging services restarted"
          EOF

      - name: Health check
        id: health
        run: |
          echo "⏳ Waiting for staging app to boot..."
          sleep 8

          HOST="${{ secrets.STAGING_HOST || secrets.VPS_HOST || '72.60.84.56' }}"
          SSH_TARGET="${{ secrets.STAGING_USER || 'root' }}@$HOST"

          for i in 1 2 3 4 5; do
            HEALTH=$(ssh $SSH_TARGET \
              "curl -sf http://127.0.0.1:5001/api/health 2>/dev/null" || echo "")

            if echo "$HEALTH" | grep -q '"ok"'; then
              echo "✅ Staging health check PASSED! (attempt $i)"
              echo "status=success" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "⏳ Attempt $i/5 — retrying in 5s..."
            sleep 5
          done

          echo "❌ Staging health check FAILED"
          echo "status=failure" >> $GITHUB_OUTPUT
          exit 1

  # ─── Stage 5: Notification ──────────────────────────────────────
  notify:
    name: "📢 Notify"
    runs-on: ubuntu-latest
    needs: [preflight, deploy]
    if: always()
    steps:
      - name: Deployment summary
        run: |
          DEPLOY_STATUS="${{ needs.deploy.result }}"
          SHA="${{ needs.preflight.outputs.short_sha }}"

          if [ "$DEPLOY_STATUS" = "success" ]; then
            ICON="✅"
            MSG="Staging deployment successful"
          else
            ICON="❌"
            MSG="Staging deployment FAILED"
          fi

          echo "## $ICON Staging Deployment Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|:-------|:------|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | $MSG |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`$SHA\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Author | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Time | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** https://${{ secrets.STAGING_DOMAIN || 'staging.alaweal.org' }}" >> $GITHUB_STEP_SUMMARY
