name: Deploy to Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:
    inputs:
      reason:
        description: 'سبب النشر اليدوي'
        required: false

jobs:
  deploy-staging:
    name: Deploy to Staging Environment
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, bcmath, redis, pdo_mysql

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-dev --optimize-autoloader

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Build assets for staging
        run: npm run build
        env:
          VITE_APP_ENV: staging

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/production/Dockerfile
          push: true
          tags: |
            rehaberp/app:staging
            rehaberp/app:staging-${{ github.sha }}

      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/rehab-erp-staging
            export IMAGE_TAG=staging-${{ github.sha }}
            docker pull rehaberp/app:${IMAGE_TAG}
            docker run --rm --env-file .env.staging rehaberp/app:${IMAGE_TAG} php artisan migrate --force
            sed -i "s|rehaberp/app:.*|rehaberp/app:${IMAGE_TAG}|g" docker-compose.staging.yml
            docker compose -f docker-compose.staging.yml up -d --no-deps app worker
            docker compose exec app php artisan config:cache
            docker compose exec app php artisan route:cache
            docker compose exec app php artisan view:cache

      - name: Register deployment
        run: |
          curl -X POST "${{ secrets.APP_URL }}/api/deployments" \
            -H "X-API-Key: ${{ secrets.DEPLOYMENT_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"version":"${{ github.sha }}","environment":"staging","commit_hash":"${{ github.sha }}","branch":"develop","deployed_by":"GitHub Actions"}'
        continue-on-error: true

      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "${{ job.status == 'success' && '✅' || '❌' }} Staging deployment ${{ job.status }}",
              "attachments": [{
                "color": "${{ job.status == 'success' && 'good' || 'danger' }}",
                "fields": [
                  {"title": "Branch", "value": "${{ github.ref_name }}", "short": true},
                  {"title": "Commit", "value": "${{ github.sha }}", "short": true}
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true
