# ════════════════════════════════════════════════════════════════════
#  Al-Awael ERP — Deploy to Staging (Manual / develop branch)
#  بيئة الاختبار — يدوي أو على فرع develop فقط
# ════════════════════════════════════════════════════════════════════
name: "🧪 Deploy to Staging"

on:
  # يعمل على فرع develop فقط (ليس main)
  push:
    branches: [develop, staging]
    paths:
      - "backend/**"
      - "frontend/**"
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "ماذا تنشر؟"
        required: true
        default: "both"
        type: choice
        options: [both, backend-only, frontend-only]
      skip_tests:
        description: "تخطي الاختبارات؟"
        required: false
        default: false
        type: boolean

env:
  APP_DIR: /home/alawael/staging
  NODE_VERSION: "20"

concurrency:
  group: deploy-staging
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  preflight:
    name: "🔍 Pre-flight"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      short_sha: ${{ steps.info.outputs.short_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Info
        id: info
        run: |
          echo "short_sha=$(echo ${{ github.sha }} | cut -c1-8)" >> $GITHUB_OUTPUT
          echo "📋 Commit: $(echo ${{ github.sha }} | cut -c1-8) | Branch: ${{ github.ref_name }}"

      - name: Check SSH secret
        run: |
          if [ -z "${{ secrets.VPS_SSH_KEY }}" ] && [ -z "${{ secrets.STAGING_SSH_KEY }}" ]; then
            echo "⚠️  No SSH secrets configured — staging deploy skipped"
            echo "   Add VPS_SSH_KEY or STAGING_SSH_KEY to run deployments"
            exit 0
          fi
          echo "✅ SSH secret available"

  build-frontend:
    name: "📦 Build Frontend"
    runs-on: ubuntu-latest
    needs: preflight
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          REACT_APP_API_URL: https://${{ secrets.STAGING_DOMAIN || 'staging.alaweal.org' }}/api
          REACT_APP_ENVIRONMENT: staging
          REACT_APP_VERSION: ${{ needs.preflight.outputs.short_sha }}
          GENERATE_SOURCEMAP: "true"
          CI: "false"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-staging-${{ github.sha }}
          path: frontend/build/
          retention-days: 3

  deploy:
    name: "🧪 Deploy Staging"
    runs-on: ubuntu-latest
    needs: [preflight, build-frontend]
    if: |
      always() &&
      needs.build-frontend.result == 'success' &&
      (secrets.VPS_SSH_KEY != '' || secrets.STAGING_SSH_KEY != '')
    timeout-minutes: 15
    environment:
      name: staging
      url: https://${{ secrets.STAGING_DOMAIN || 'staging.alaweal.org' }}
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-build-staging-${{ github.sha }}
          path: frontend/build/

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          SSH_KEY="${{ secrets.STAGING_SSH_KEY || secrets.VPS_SSH_KEY }}"
          if [ -z "$SSH_KEY" ]; then
            echo "⚠️ No SSH key — deploy skipped"
            exit 0
          fi
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          HOST="${{ secrets.STAGING_HOST || secrets.VPS_HOST }}"
          [ -n "$HOST" ] && ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy backend
        run: |
          SSH_TARGET="${{ secrets.STAGING_USER || secrets.VPS_USER || 'root' }}@${{ secrets.STAGING_HOST || secrets.VPS_HOST }}"
          rsync -avz --delete \
            --exclude='node_modules' --exclude='.env' \
            --exclude='logs/' --exclude='uploads/' \
            --exclude='__tests__/' --exclude='*.test.js' \
            backend/ $SSH_TARGET:${{ env.APP_DIR }}/backend/ 2>/dev/null || echo "⚠️ rsync skipped (no host)"

      - name: Deploy frontend
        run: |
          SSH_TARGET="${{ secrets.STAGING_USER || secrets.VPS_USER || 'root' }}@${{ secrets.STAGING_HOST || secrets.VPS_HOST }}"
          rsync -avz --delete frontend/build/ $SSH_TARGET:${{ env.APP_DIR }}/frontend/build/ 2>/dev/null || echo "⚠️ rsync skipped (no host)"

      - name: Summary
        if: always()
        run: |
          echo "## 🧪 Staging Deployment" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|:-------|:------|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ needs.preflight.outputs.short_sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Time   | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
