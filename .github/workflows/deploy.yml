name: 🚀 Deploy to Hostinger VPS

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild all images'
        required: false
        default: 'false'
        type: boolean

env:
  PROJECT_DIR: /opt/alawael-erp
  COMPOSE_FILE: docker-compose.yml

jobs:
  # ─── Job 1: Test & Validate ───────────────────────────────────────────────
  validate:
    name: ✅ Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate docker-compose syntax
        run: |
          docker compose config --quiet
          echo "✅ docker-compose.yml is valid"

      - name: Check required secrets
        run: |
          if [ -z "${{ secrets.VPS_HOST }}" ]; then
            echo "❌ Missing secret: VPS_HOST"
            exit 1
          fi
          if [ -z "${{ secrets.VPS_USER }}" ]; then
            echo "❌ Missing secret: VPS_USER"
            exit 1
          fi
          if [ -z "${{ secrets.VPS_SSH_KEY }}" ]; then
            echo "❌ Missing secret: VPS_SSH_KEY"
            exit 1
          fi
          echo "✅ All required secrets are present"

  # ─── Job 2: Deploy to VPS ─────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Hostinger VPS
    runs-on: ubuntu-latest
    needs: validate
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts
          echo "✅ Added VPS to known hosts"

      - name: Deploy to VPS
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'ENDSSH'
            set -e

            echo "🔄 Starting deployment..."

            # Navigate to project directory
            cd ${{ env.PROJECT_DIR }}

            # Pull latest changes
            echo "📥 Pulling latest changes from GitHub..."
            git fetch origin
            git reset --hard origin/main || git reset --hard origin/master

            # Create .env if it doesn't exist
            if [ ! -f .env ]; then
              echo "⚠️  .env file not found, copying from .env.example"
              cp .env.example .env
            fi

            # Pull new Docker images (infrastructure)
            echo "🐳 Pulling infrastructure images..."
            docker compose pull mongodb redis nats minio elasticsearch postgres 2>/dev/null || true

            # Build and start services
            echo "🔨 Building and starting services..."
            if [ "${{ github.event.inputs.force_rebuild }}" = "true" ]; then
              docker compose up -d --build --force-recreate
            else
              docker compose up -d --build
            fi

            # Remove old/dangling images to save disk space
            echo "🧹 Cleaning up old images..."
            docker image prune -f

            # Show running containers
            echo "📊 Running containers:"
            docker compose ps --format "table {{.Name}}\t{{.Status}}\t{{.Ports}}"

            echo "✅ Deployment completed successfully!"
          ENDSSH

      - name: Verify deployment
        run: |
          echo "🔍 Verifying services..."
          sleep 30
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'ENDSSH'
            cd ${{ env.PROJECT_DIR }}

            # Check core services
            SERVICES=("alawael-backend" "alawael-frontend" "alawael-gateway" "alawael-mongodb" "alawael-redis")
            ALL_HEALTHY=true

            for service in "${SERVICES[@]}"; do
              STATUS=$(docker inspect --format='{{.State.Status}}' $service 2>/dev/null || echo "not_found")
              if [ "$STATUS" = "running" ]; then
                echo "✅ $service: running"
              else
                echo "❌ $service: $STATUS"
                ALL_HEALTHY=false
              fi
            done

            if [ "$ALL_HEALTHY" = "true" ]; then
              echo "🎉 All core services are healthy!"
            else
              echo "⚠️  Some services are not running. Check logs with: docker compose logs"
              exit 1
            fi
          ENDSSH

      - name: Notify on success
        if: success()
        run: |
          echo "🎉 Deployment to Hostinger VPS completed successfully!"
          echo "   Branch: ${{ github.ref_name }}"
          echo "   Commit: ${{ github.sha }}"
          echo "   Actor: ${{ github.actor }}"

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Deployment FAILED!"
          echo "   Branch: ${{ github.ref_name }}"
          echo "   Commit: ${{ github.sha }}"
          echo "   Check the logs above for details"
