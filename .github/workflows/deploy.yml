# ═══════════════════════════════════════════════════════════════════════════
#  Al-Awael ERP — Deploy to Production VPS (Docker Compose)
#  ينشر تلقائياً عند كل push إلى main (CD)
#
#  المطلوب من GitHub Secrets:
#    VPS_HOST      → IP أو hostname السيرفر
#    VPS_USER      → اسم المستخدم (root أو deploy)
#    VPS_SSH_KEY   → مفتاح SSH خاص (private key)
#    APP_DIR       → مسار المشروع على السيرفر (افتراضي: /opt/alawael-erp)
#
#  قبل أول نشر، يجب إعداد .env يدوياً على السيرفر (انظر VPS_SETUP_GUIDE.md)
# ═══════════════════════════════════════════════════════════════════════════

name: 🚀 Deploy to VPS

permissions:
  contents: read

# ── Triggers ──────────────────────────────────────────────────────────
on:
  # DISABLED: This workflow uses Docker Compose but the VPS runs PM2 + nginx.
  # The real deploy workflow is deploy-hostinger.yml (🚀 Deploy to Production).
  # Kept workflow_dispatch only for emergency manual use.
  # push:
  #   branches:
  #     - main
  workflow_dispatch:
    inputs:
      confirm:
        description: "اكتب 'deploy' للتشغيل اليدوي"
        required: true
        default: ""

env:
  NODE_VERSION: '20'
  APP_DIR: /opt/alawael-erp

jobs:
  # ═══════════════════════════════════════════════════════════════════
  # Deploy — SSH to VPS and run Docker Compose deployment
  # ═══════════════════════════════════════════════════════════════════
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Confirm manual deployment
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "deploy" ]; then
            echo "❌ You must type 'deploy' to confirm manual deployment"
            exit 1
          fi

      - name: Check out code
        uses: actions/checkout@v4

      # ── Check required secrets ───────────────────────────────────
      - name: Check required secrets
        run: |
          MISSING=0
          [ -z "${{ secrets.VPS_HOST }}" ] && echo "❌ Missing: VPS_HOST" && MISSING=1
          [ -z "${{ secrets.VPS_USER }}" ] && echo "❌ Missing: VPS_USER" && MISSING=1
          [ -z "${{ secrets.VPS_SSH_KEY }}" ] && echo "❌ Missing: VPS_SSH_KEY" && MISSING=1
          if [ "$MISSING" = "1" ]; then
            echo ""
            echo "⚙️  Add these secrets at:"
            echo "   Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi
          echo "✅ All required secrets present"

      # ── Setup SSH ────────────────────────────────────────────────
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "✅ SSH key configured"

      # ── Deploy via SSH ───────────────────────────────────────────
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          # port: 22
          script_stop: true
          debug: true
          script: |
            echo "══════════════════════════════════════════════════════════════════"
            echo "  Al-Awael ERP — Deploy $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "  Commit: ${{ github.sha }}"
            echo "══════════════════════════════════════════════════════════════════"

            APP_DIR="${{ env.APP_DIR }}"

            # ─── Ensure app directory exists ─────────────────────────
            if [ ! -d "$APP_DIR" ]; then
              echo "❌ App directory not found: $APP_DIR"
              echo "   Clone the repo first: git clone https://github.com/almashooq1/alawael-erp.git $APP_DIR"
              exit 1
            fi
            cd "$APP_DIR"

            # ─── Stop host nginx (free ports 80/443 for Docker nginx) ────
            echo "🛑 Stopping host nginx (if running) to free ports 80/443..."
            sudo systemctl stop nginx 2>/dev/null || true
            sudo systemctl disable nginx 2>/dev/null || true
            sudo fuser -k 80/tcp 2>/dev/null || true
            sudo fuser -k 443/tcp 2>/dev/null || true
            echo "✅ Host nginx stopped"

            # ─── Create or update .env from secrets ──────────────────
            echo "📝 Checking .env configuration..."
            REQUIRED_VARS="MONGO_ROOT_PASSWORD REDIS_PASSWORD JWT_SECRET JWT_REFRESH_SECRET SETUP_SECRET_KEY ADMIN_PASSWORD"
            MISSING_VARS=""

            # Check if .env exists and has required variables
            if [ -f ".env" ]; then
              for var in $REQUIRED_VARS; do
                if ! grep -q "^${var}=" .env || grep -q "^${var}=$" .env; then
                  MISSING_VARS="$MISSING_VARS $var"
                fi
              done
            else
              MISSING_VARS="$REQUIRED_VARS"
            fi

            # If any required vars are missing, generate .env from secrets
            if [ -n "$MISSING_VARS" ]; then
              echo "⚠️  Missing required variables:$MISSING_VARS"
              echo "   Generating .env from GitHub secrets..."

              # Check if secrets are available
              if [ -z "${{ secrets.MONGO_ROOT_PASSWORD }}" ]; then
                echo "❌ Missing GitHub secret: MONGO_ROOT_PASSWORD"
                echo "   Add it at: Settings → Secrets and variables → Actions → New repository secret"
                exit 1
              fi
              if [ -z "${{ secrets.REDIS_PASSWORD }}" ]; then
                echo "❌ Missing GitHub secret: REDIS_PASSWORD"
                echo "   Add it at: Settings → Secrets and variables → Actions → New repository secret"
                exit 1
              fi
              if [ -z "${{ secrets.JWT_SECRET }}" ]; then
                echo "❌ Missing GitHub secret: JWT_SECRET"
                echo "   Add it at: Settings → Secrets and variables → Actions → New repository secret"
                exit 1
              fi
              if [ -z "${{ secrets.JWT_REFRESH_SECRET }}" ]; then
                echo "❌ Missing GitHub secret: JWT_REFRESH_SECRET"
                echo "   Add it at: Settings → Secrets and variables → Actions → New repository secret"
                exit 1
              fi
              if [ -z "${{ secrets.SETUP_SECRET_KEY }}" ]; then
                echo "❌ Missing GitHub secret: SETUP_SECRET_KEY"
                echo "   Add it at: Settings → Secrets and variables → Actions → New repository secret"
                exit 1
              fi
              if [ -z "${{ secrets.ADMIN_PASSWORD }}" ]; then
                echo "❌ Missing GitHub secret: ADMIN_PASSWORD"
                echo "   Add it at: Settings → Secrets and variables → Actions → New repository secret"
                exit 1
              fi

              # NOTE: written via indented `echo` lines (not a column-0
              # heredoc) so the surrounding YAML script block scalar is
              # not terminated early. Defaults use GHA "or" (not shell
              # colon-dash, which is invalid inside a GHA expression).
              {
                echo "MONGO_ROOT_USER=admin"
                echo "MONGO_ROOT_PASSWORD=${{ secrets.MONGO_ROOT_PASSWORD }}"
                echo "REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}"
                echo "JWT_SECRET=${{ secrets.JWT_SECRET }}"
                echo "JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}"
                echo "SETUP_SECRET_KEY=${{ secrets.SETUP_SECRET_KEY }}"
                echo "ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}"
                echo "ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL || 'admin@alawael.com' }}"
                echo "FRONTEND_URL=${{ secrets.FRONTEND_URL || 'http://localhost' }}"
                echo "CORS_ORIGINS=${{ secrets.CORS_ORIGINS || 'http://localhost:3004,http://localhost:3000' }}"
                echo "TZ=Asia/Riyadh"
                echo "NODE_ENV=production"
              } > .env
              echo "✅ .env created from GitHub secrets"
            else
              echo "✅ .env is complete"
            fi

            # ─── Pull latest code ────────────────────────────────────
            echo "📥 Pulling latest code..."
            git fetch origin
            git reset --hard origin/main
            echo "✅ Code updated to $(git rev-parse --short HEAD)"

            # ─── Build & deploy with Docker Compose ─────────────────
            echo "🐳 Building and deploying with Docker Compose..."
            docker compose -f docker-compose.yml -f docker-compose.production.yml pull || true
            docker compose -f docker-compose.yml -f docker-compose.production.yml up -d --build --remove-orphans

            # ─── Cleanup old images ──────────────────────────────────
            echo "🧹 Cleaning up old Docker images..."
            docker image prune -af --filter "until=168h" || true

            echo "✅ Deploy completed"

      # ── Smoke test ───────────────────────────────────────────────
      - name: Smoke test /health endpoint
        if: always()
        run: |
          echo "⏳ Waiting 30s for containers to warm up..."
          sleep 30

          MAX_RETRIES=5
          for i in $(seq 1 $MAX_RETRIES); do
            echo "🩺 Health check attempt $i/$MAX_RETRIES..."
            # Check via NGINX on port 80 (production path) — port 3001 is internal only
            HEALTH=$(curl -fsS --max-time 10 "http://${{ secrets.VPS_HOST }}/health" 2>/dev/null || echo "")
            if echo "$HEALTH" | grep -q '"ok"\|"status"'; then
              echo "✅ Health check PASSED: $HEALTH"
              exit 0
            fi
            echo "⚠️  Attempt $i failed, retrying in 10s..."
            sleep 10
          done

          echo "❌ Health check failed after $MAX_RETRIES attempts"
          exit 1

      - name: Print container logs on failure
        if: failure()
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "══════════════════════════════════════════════════════"
            echo "  Docker container status"
            echo "══════════════════════════════════════════════════════"
            cd /opt/alawael-erp
            docker compose ps
            echo ""
            echo "══════════════════════════════════════════════════════"
            echo "  Backend container logs (last 50 lines)"
            echo "══════════════════════════════════════════════════════"
            docker compose logs --tail 50 backend 2>/dev/null || docker compose logs --tail 50
            echo ""
            echo "══════════════════════════════════════════════════════"
            echo "  Nginx container logs (last 20 lines)"
            echo "══════════════════════════════════════════════════════"
            docker compose logs --tail 20 nginx 2>/dev/null || echo "nginx container not found"
            echo ""
            echo "══════════════════════════════════════════════════════"
            echo "  Port listening check (80 + 3001)"
            echo "══════════════════════════════════════════════════════"
            ss -tlnp | grep -E '3001|80' || netstat -tlnp | grep -E '3001|80' || echo "No relevant ports listening"
            echo "══════════════════════════════════════════════════════"

      - name: Save container logs as artifact
        if: failure()
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/alawael-erp
            mkdir -p /tmp/deploy-logs
            docker compose logs --tail 200 backend > /tmp/deploy-logs/backend.log 2>&1 || echo "backend logs failed" > /tmp/deploy-logs/backend.log
            docker compose logs --tail 100 nginx > /tmp/deploy-logs/nginx.log 2>&1 || echo "nginx logs failed" > /tmp/deploy-logs/nginx.log
            docker compose ps > /tmp/deploy-logs/ps.log 2>&1 || echo "docker ps failed" > /tmp/deploy-logs/ps.log
            echo "Logs saved to /tmp/deploy-logs/"

      - name: Download logs from VPS to runner
        if: failure()
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "/tmp/deploy-logs/*"
          target: "deploy-logs/"

      - name: Upload deploy logs artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-logs
          path: deploy-logs/
          retention-days: 3
