# ═══════════════════════════════════════════════════════════════════════════
#  Al-Awael ERP — Deploy to Production VPS (Docker Compose)
#  ينشر تلقائياً عند كل push إلى main (CD)
#
#  المطلوب من GitHub Secrets:
#    VPS_HOST      → IP أو hostname السيرفر
#    VPS_USER      → اسم المستخدم (root أو deploy)
#    VPS_SSH_KEY   → مفتاح SSH خاص (private key)
#    APP_DIR       → مسار المشروع على السيرفر (افتراضي: /opt/alawael-erp)
#
#  قبل أول نشر، يجب إعداد .env يدوياً على السيرفر (انظر VPS_SETUP_GUIDE.md)
# ═══════════════════════════════════════════════════════════════════════════

name: 🚀 Deploy to VPS

permissions:
  contents: read

# ── Triggers ──────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      confirm:
        description: "اكتب 'deploy' للتشغيل اليدوي"
        required: true
        default: ""

env:
  NODE_VERSION: '20'
  APP_DIR: /opt/alawael-erp

jobs:
  # ═══════════════════════════════════════════════════════════════════
  # Deploy — SSH to VPS and run Docker Compose deployment
  # ═══════════════════════════════════════════════════════════════════
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Confirm manual deployment
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "deploy" ]; then
            echo "❌ You must type 'deploy' to confirm manual deployment"
            exit 1
          fi

      - name: Check out code
        uses: actions/checkout@v4

      # ── Check required secrets ───────────────────────────────────
      - name: Check required secrets
        run: |
          MISSING=0
          [ -z "${{ secrets.VPS_HOST }}" ] && echo "❌ Missing: VPS_HOST" && MISSING=1
          [ -z "${{ secrets.VPS_USER }}" ] && echo "❌ Missing: VPS_USER" && MISSING=1
          [ -z "${{ secrets.VPS_SSH_KEY }}" ] && echo "❌ Missing: VPS_SSH_KEY" && MISSING=1
          if [ "$MISSING" = "1" ]; then
            echo ""
            echo "⚙️  Add these secrets at:"
            echo "   Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi
          echo "✅ All required secrets present"

      # ── Setup SSH ────────────────────────────────────────────────
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "✅ SSH key configured"

      # ── Deploy via SSH ───────────────────────────────────────────
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          # port: 22
          script_stop: true
          debug: true
          script: |
            echo "══════════════════════════════════════════════════════════════════"
            echo "  Al-Awael ERP — Deploy $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "  Commit: ${{ github.sha }}"
            echo "══════════════════════════════════════════════════════════════════"

            APP_DIR="${{ env.APP_DIR }}"

            # ─── Ensure app directory exists ─────────────────────────
            if [ ! -d "$APP_DIR" ]; then
              echo "❌ App directory not found: $APP_DIR"
              echo "   Clone the repo first: git clone https://github.com/almashooq1/alawael-erp.git $APP_DIR"
              exit 1
            fi
            cd "$APP_DIR"

            # ─── Check .env exists ───────────────────────────────────
            if [ ! -f ".env" ]; then
              echo "❌ .env file not found at $APP_DIR/.env"
              echo "   Create it first: cp .env.example .env && nano .env"
              exit 1
            fi
            echo "✅ .env found"

            # ─── Pull latest code ────────────────────────────────────
            echo "📥 Pulling latest code..."
            git fetch origin
            git reset --hard origin/main
            echo "✅ Code updated to $(git rev-parse --short HEAD)"

            # ─── Build & deploy with Docker Compose ─────────────────
            echo "🐳 Building and deploying with Docker Compose..."
            docker compose -f docker-compose.yml -f docker-compose.production.yml pull || true
            docker compose -f docker-compose.yml -f docker-compose.production.yml up -d --build --remove-orphans

            # ─── Cleanup old images ──────────────────────────────────
            echo "🧹 Cleaning up old Docker images..."
            docker image prune -af --filter "until=168h" || true

            echo "✅ Deploy completed"

      # ── Smoke test ───────────────────────────────────────────────
      - name: Smoke test /health endpoint
        if: always()
        run: |
          echo "⏳ Waiting 30s for containers to warm up..."
          sleep 30

          MAX_RETRIES=5
          for i in $(seq 1 $MAX_RETRIES); do
            echo "🩺 Health check attempt $i/$MAX_RETRIES..."
            # Check via NGINX on port 80 (production path) — port 3001 is internal only
            HEALTH=$(curl -fsS --max-time 10 "http://${{ secrets.VPS_HOST }}/health" 2>/dev/null || echo "")
            if echo "$HEALTH" | grep -q '"ok"\|"status"'; then
              echo "✅ Health check PASSED: $HEALTH"
              exit 0
            fi
            echo "⚠️  Attempt $i failed, retrying in 10s..."
            sleep 10
          done

          echo "❌ Health check failed after $MAX_RETRIES attempts"
          exit 1

      - name: Print container logs on failure
        if: failure()
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "══════════════════════════════════════════════════════"
            echo "  Docker container status"
            echo "══════════════════════════════════════════════════════"
            cd /opt/alawael-erp
            docker compose ps
            echo ""
            echo "══════════════════════════════════════════════════════"
            echo "  Backend container logs (last 50 lines)"
            echo "══════════════════════════════════════════════════════"
            docker compose logs --tail 50 backend 2>/dev/null || docker compose logs --tail 50
            echo ""
            echo "══════════════════════════════════════════════════════"
            echo "  Nginx container logs (last 20 lines)"
            echo "══════════════════════════════════════════════════════"
            docker compose logs --tail 20 nginx 2>/dev/null || echo "nginx container not found"
            echo ""
            echo "══════════════════════════════════════════════════════"
            echo "  Port listening check (80 + 3001)"
            echo "══════════════════════════════════════════════════════"
            ss -tlnp | grep -E '3001|80' || netstat -tlnp | grep -E '3001|80' || echo "No relevant ports listening"
            echo "══════════════════════════════════════════════════════"
