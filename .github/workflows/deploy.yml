# ════════════════════════════════════════════════════════════════════
#  Al-Awael ERP — Quick Deploy (Manual Only)
#  نشر سريع يدوي — لا يعمل تلقائياً
# ════════════════════════════════════════════════════════════════════
name: "⚡ Quick Deploy (Manual)"

on:
  # ✅ يدوي فقط — أُزيل التشغيل التلقائي على push
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: "إعادة بناء كل الـ images؟"
        required: false
        default: "false"
        type: boolean

env:
  PROJECT_DIR: /opt/alawael-erp

jobs:
  validate:
    name: "✅ Validate"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose
        run: |
          docker compose config --quiet 2>/dev/null && echo "✅ docker-compose.yml valid" || echo "⚠️ docker-compose validation skipped"

      - name: Check required secrets
        run: |
          MISSING=0
          [ -z "${{ secrets.VPS_HOST }}" ]    && echo "❌ Missing: VPS_HOST"    && MISSING=1
          [ -z "${{ secrets.VPS_USER }}" ]    && echo "❌ Missing: VPS_USER"    && MISSING=1
          [ -z "${{ secrets.VPS_SSH_KEY }}" ] && echo "❌ Missing: VPS_SSH_KEY" && MISSING=1
          if [ "$MISSING" = "1" ]; then
            echo "⚙️  Set secrets at: Settings → Secrets and variables → Actions"
            exit 1
          fi
          echo "✅ All required secrets present"

  deploy:
    name: "🚀 Deploy via Docker"
    runs-on: ubuntu-latest
    needs: validate
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts
          echo "✅ Added VPS to known hosts"

      - name: Deploy to VPS
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'ENDSSH'
            set -e
            cd ${{ env.PROJECT_DIR }}
            echo "📥 Pulling latest..."
            git fetch origin && git reset --hard origin/main

            [ ! -f .env ] && cp .env.example .env && echo "⚠️ Created .env from example"

            echo "🐳 Pulling images..."
            docker compose pull mongodb redis 2>/dev/null || true

            echo "🔨 Building & starting..."
            if [ "${{ github.event.inputs.force_rebuild }}" = "true" ]; then
              docker compose up -d --build --force-recreate
            else
              docker compose up -d --build
            fi

            docker image prune -f
            docker compose ps --format "table {{.Name}}\t{{.Status}}\t{{.Ports}}"
            echo "✅ Deployment done!"
          ENDSSH

      - name: Verify
        run: |
          sleep 30
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'ENDSSH'
            cd ${{ env.PROJECT_DIR }}
            for svc in alawael-backend alawael-frontend alawael-mongodb; do
              STATUS=$(docker inspect --format='{{.State.Status}}' $svc 2>/dev/null || echo "missing")
              [ "$STATUS" = "running" ] && echo "✅ $svc: running" || echo "⚠️  $svc: $STATUS"
            done
          ENDSSH

      - name: Result
        if: always()
        run: |
          echo "## 🚀 Quick Deploy Result" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|:-------|:------|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`$(echo ${{ github.sha }} | cut -c1-8)\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Actor  | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Time   | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
