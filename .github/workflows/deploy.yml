# ════════════════════════════════════════════════════════════════════
#  Al-Awael ERP — Quick Deploy (Manual Only)
#  نشر سريع يدوي — لا يعمل تلقائياً
# ════════════════════════════════════════════════════════════════════
name: "⚡ Quick Deploy (Manual)"

on:
  # ✅ يدوي فقط — لا يعمل تلقائياً على push
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: "إعادة بناء كل الـ images؟"
        required: false
        default: "false"
        type: boolean

env:
  PROJECT_DIR: /opt/alawael-erp
  HUSKY: "0"

jobs:
  validate:
    name: "✅ Validate"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docker-compose syntax
        run: |
          # docker compose config validates YAML syntax
          if docker compose config --quiet 2>/dev/null; then
            echo "✅ docker-compose.yml is valid"
          else
            echo "⚠️ docker-compose validation skipped (non-blocking)"
          fi

      - name: Check required secrets
        run: |
          MISSING=0
          [ -z "${{ secrets.VPS_HOST }}" ]    && echo "❌ Missing: VPS_HOST"    && MISSING=1
          [ -z "${{ secrets.VPS_USER }}" ]    && echo "❌ Missing: VPS_USER"    && MISSING=1
          [ -z "${{ secrets.VPS_SSH_KEY }}" ] && echo "❌ Missing: VPS_SSH_KEY" && MISSING=1
          if [ "$MISSING" = "1" ]; then
            echo ""
            echo "⚙️  Set secrets at: Settings → Secrets and variables → Actions"
            exit 1
          fi
          echo "✅ All required secrets present"

  deploy:
    name: "🚀 Deploy via Docker"
    runs-on: ubuntu-latest
    needs: validate
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
          echo "✅ Added VPS to known hosts"

      - name: Deploy to VPS
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'ENDSSH'
            set -e
            cd ${{ env.PROJECT_DIR }}

            echo "📥 Pulling latest..."
            git fetch origin
            git reset --hard origin/main

            # Create .env if missing
            [ ! -f .env ] && cp .env.example .env 2>/dev/null && echo "⚠️ Created .env from example — review settings"

            echo "🐳 Pulling base images..."
            docker compose pull mongodb redis 2>/dev/null || true

            echo "🔨 Building & starting services..."
            if [ "${{ github.event.inputs.force_rebuild }}" = "true" ]; then
              docker compose up -d --build --force-recreate
            else
              docker compose up -d --build
            fi

            # Cleanup old images
            docker image prune -f

            echo "📊 Service status:"
            docker compose ps --format "table {{.Name}}\t{{.Status}}\t{{.Ports}}"
            echo "✅ Deployment complete!"
          ENDSSH

      - name: Verify deployment
        run: |
          sleep 30
          echo "🔍 Checking service health..."
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'ENDSSH'
            for svc in alawael-backend alawael-frontend alawael-mongodb; do
              STATUS=$(docker inspect --format='{{.State.Status}}' $svc 2>/dev/null || echo "not found")
              if [ "$STATUS" = "running" ]; then
                echo "✅ $svc: $STATUS"
              else
                echo "⚠️  $svc: $STATUS"
              fi
            done
          ENDSSH

      - name: Deployment summary
        if: always()
        run: |
          echo "## ⚡ Quick Deploy" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|:-------|:------|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`$(echo ${{ github.sha }} | cut -c1-8)\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Actor  | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Force rebuild | ${{ github.event.inputs.force_rebuild }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Time   | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
