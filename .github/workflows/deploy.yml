name: 🚀 Build and Deploy to AWS

on:
  push:
    branches: [ main, develop, master ]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/deploy.yml'
      - 'docker/**'
      - 'package.json'
  pull_request:
    branches: [ main, develop, master ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: alawael-api
  IMAGE_TAG: ${{ github.sha }}
  REGISTRY: 248505667813.dkr.ecr.us-east-1.amazonaws.com
  NODE_ENV: production

concurrency:
  group: ${{ github.ref }}-deploy
  cancel-in-progress: true

jobs:
  #=============================================================================
  # STAGE 1: Validate and Test
  #=============================================================================
  validate:
    name: ✅ Validate & Setup
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      should-deploy: ${{ steps.check.outputs.should-deploy }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Check trigger conditions
      id: check
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          echo "should-deploy=true" >> $GITHUB_OUTPUT
        elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
          echo "should-deploy=true" >> $GITHUB_OUTPUT
        elif [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
          echo "should-deploy=true" >> $GITHUB_OUTPUT
        else
          echo "should-deploy=false" >> $GITHUB_OUTPUT
        fi

    - name: Validate project structure
      run: |
        echo "🔍 Validating project structure..."
        [ -d "backend" ] && echo "✅ backend directory found" || echo "⚠️ backend directory missing"
        [ -d "frontend" ] && echo "✅ frontend directory found" || echo "⚠️ frontend directory missing"
        [ -f "package.json" ] && echo "✅ package.json found" || echo "⚠️ package.json missing"
        [ -f "docker-compose.yml" ] && echo "✅ docker-compose.yml found" || echo "⚠️ docker-compose.yml missing"

  #=============================================================================
  # STAGE 2: Backend Tests
  #=============================================================================
  backend-test:
    name: 🧪 Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: validate
    if: needs.validate.outputs.should-deploy == 'true'

    services:
      mongodb:
        image: mongo:6-alpine
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\" --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci --prefix backend || npm install --prefix backend

    - name: Run linting
      continue-on-error: true
      run: |
        cd backend
        npm run lint || echo "⚠️ Linting warnings found but continuing..."

    - name: Run tests
      run: npm test --prefix backend -- --passWithNoTests --forceExit
      env:
        DATABASE_URL: mongodb://localhost:27017/test
        REDIS_URL: redis://localhost:6379/0
        NODE_ENV: test
        JWT_SECRET: test-secret-key

    - name: Upload coverage
      uses: codecov/codecov-action@v3
      if: always()
      with:
        files: ./backend/coverage/coverage-final.json
        fail_ci_if_error: false
        verbose: true

  #=============================================================================
  # STAGE 3: Frontend Tests
  #=============================================================================
  frontend-test:
    name: 🧪 Frontend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: validate
    if: needs.validate.outputs.should-deploy == 'true'

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: |
        npm ci --prefix frontend || npm install --prefix frontend
        npm ci --prefix supply-chain-management/frontend || npm install --prefix supply-chain-management/frontend

    - name: Run tests
      run: npm test --prefix frontend -- --passWithNoTests
      continue-on-error: true

    - name: Build frontend
      run: npm run build --prefix frontend || true

  #=============================================================================
  # STAGE 4: Build Docker Images
  #=============================================================================
  build:
    name: 🐳 Build Docker Images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [validate, backend-test, frontend-test]
    if: needs.validate.outputs.should-deploy == 'true'

    permissions:
      contents: read
      id-token: write

    outputs:
      backend-image: ${{ steps.build.outputs.backend-image }}
      frontend-image: ${{ steps.build.outputs.frontend-image }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-role
        aws-region: ${{ env.AWS_REGION }}
        role-session-name: github-actions-session-${{ github.run_id }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Create ECR repositories if not exist
      run: |
        aws ecr describe-repositories --repository-names "${{ env.ECR_REPOSITORY }}-backend" --region ${{ env.AWS_REGION }} || \
        aws ecr create-repository --repository-name "${{ env.ECR_REPOSITORY }}-backend" --region ${{ env.AWS_REGION }}
        
        aws ecr describe-repositories --repository-names "${{ env.ECR_REPOSITORY }}-frontend" --region ${{ env.AWS_REGION }} || \
        aws ecr create-repository --repository-name "${{ env.ECR_REPOSITORY }}-frontend" --region ${{ env.AWS_REGION }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push backend image
      id: build
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      run: |
        BACKEND_IMAGE="${{ env.REGISTRY }}/${{ env.ECR_REPOSITORY }}-backend:${{ env.IMAGE_TAG }}"
        FRONTEND_IMAGE="${{ env.REGISTRY }}/${{ env.ECR_REPOSITORY }}-frontend:${{ env.IMAGE_TAG }}"
        
        docker build -t $BACKEND_IMAGE \
          --build-arg NODE_ENV=production \
          -f docker/Dockerfile.backend . || \
        docker build -t $BACKEND_IMAGE -f Dockerfile .
        
        docker push $BACKEND_IMAGE || true
        docker tag $BACKEND_IMAGE "${{ env.REGISTRY }}/${{ env.ECR_REPOSITORY }}-backend:latest"
        docker push "${{ env.REGISTRY }}/${{ env.ECR_REPOSITORY }}-backend:latest" || true
        
        echo "backend-image=$BACKEND_IMAGE" >> $GITHUB_OUTPUT
        echo "frontend-image=$FRONTEND_IMAGE" >> $GITHUB_OUTPUT

  #=============================================================================
  # STAGE 5: Deploy to AWS
  #=============================================================================
  deploy:
    name: 🚀 Deploy to AWS
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

    permissions:
      contents: read
      id-token: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-role
        aws-region: ${{ env.AWS_REGION }}
        role-session-name: github-actions-session-${{ github.run_id }}

    - name: Get ECS cluster and service info
      id: ecs-info
      run: |
        # List available ECS clusters
        CLUSTERS=$(aws ecs list-clusters --region ${{ env.AWS_REGION }} --query 'clusterArns' --output text)
        if [ -z "$CLUSTERS" ]; then
          echo "⚠️ No ECS clusters found. Creating basic infrastructure..."
          CLUSTER_NAME="alawael-cluster"
        else
          CLUSTER_NAME=$(echo $CLUSTERS | awk '{print $1}' | rev | cut -d'/' -f1 | rev)
        fi
        
        SERVICE_NAME="alawael-api-service"
        echo "cluster-name=$CLUSTER_NAME" >> $GITHUB_OUTPUT
        echo "service-name=$SERVICE_NAME" >> $GITHUB_OUTPUT

    - name: Update ECS service
      id: deploy
      run: |
        CLUSTER="${{ steps.ecs-info.outputs.cluster-name }}"
        SERVICE="${{ steps.ecs-info.outputs.service-name }}"
        
        if aws ecs describe-services \
          --cluster $CLUSTER \
          --services $SERVICE \
          --region ${{ env.AWS_REGION }} \
          --query 'services[0].serviceName' \
          --output text 2>/dev/null | grep -q .; then
          
          echo "📦 Updating existing ECS service..."
          aws ecs update-service \
            --cluster $CLUSTER \
            --service $SERVICE \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }} || true
          
          echo "deploy-status=updated" >> $GITHUB_OUTPUT
        else
          echo "⚠️ ECS service not found. Manual configuration required."
          echo "deploy-status=not-found" >> $GITHUB_OUTPUT
        fi

    - name: Wait for deployment
      if: steps.deploy.outputs.deploy-status == 'updated'
      continue-on-error: true
      run: |
        aws ecs wait services-stable \
          --cluster "${{ steps.ecs-info.outputs.cluster-name }}" \
          --services "${{ steps.ecs-info.outputs.service-name }}" \
          --region ${{ env.AWS_REGION }} || true

    - name: Verify deployment
      run: |
        CLUSTER="${{ steps.ecs-info.outputs.cluster-name }}"
        SERVICE="${{ steps.ecs-info.outputs.service-name }}"
        
        SERVICE_STATUS=$(aws ecs describe-services \
          --cluster $CLUSTER \
          --services $SERVICE \
          --region ${{ env.AWS_REGION }} \
          --query 'services[0].status' \
          --output text 2>/dev/null || echo "UNKNOWN")
        
        RUNNING_COUNT=$(aws ecs describe-services \
          --cluster $CLUSTER \
          --services $SERVICE \
          --region ${{ env.AWS_REGION }} \
          --query 'services[0].runningCount' \
          --output text 2>/dev/null || echo "0")
        
        echo "📊 Deployment Status:"
        echo "  Service Status: $SERVICE_STATUS"
        echo "  Running Tasks: $RUNNING_COUNT"
        
        if [ "$SERVICE_STATUS" = "ACTIVE" ]; then
          echo "✅ Deployment successful!"
        else
          echo "⚠️ Deployment in progress or pending..."
        fi

  #=============================================================================
  # STAGE 6: Health Check & Smoke Tests
  #=============================================================================
  health-check:
    name: 🏥 Health Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: deploy
    if: always()

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Run health checks
      run: |
        chmod +x scripts/health-check.sh 2>/dev/null || true
        bash scripts/health-check.sh 2>/dev/null || echo "Health check script not found"

    - name: API endpoint check
      continue-on-error: true
      run: |
        API_URL="${{ secrets.PRODUCTION_API_URL || 'http://localhost:3000' }}"
        
        echo "🔍 Checking API endpoint: $API_URL"
        curl -f -s -m 10 "$API_URL/api/health" && echo "✅ API is healthy" || echo "⚠️ API health check failed"

  #=============================================================================
  # STAGE 7: Notification
  #=============================================================================
  notify:
    name: 📢 Notify Status
    runs-on: ubuntu-latest
    needs: [validate, backend-test, frontend-test, build, deploy, health-check]
    if: always()

    steps:
    - name: Determine status
      id: status
      run: |
        if [[ "${{ needs.deploy.result }}" == "success" ]]; then
          echo "status=✅ Deployment Successful" >> $GITHUB_OUTPUT
          echo "color=good" >> $GITHUB_OUTPUT
        else
          echo "status=⚠️ Deployment Completed with Issues" >> $GITHUB_OUTPUT
          echo "color=warning" >> $GITHUB_OUTPUT
        fi

    - name: Create summary
      run: |
        echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| ✅ Validate | ${{ needs.validate.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| 🧪 Backend Tests | ${{ needs.backend-test.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| 🧪 Frontend Tests | ${{ needs.frontend-test.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| 🐳 Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| 🚀 Deploy | ${{ needs.deploy.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| 🏥 Health Check | ${{ needs.health-check.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
        echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
