name: GraphQL Quality Gate

on:
  pull_request:
    branches: [main, master, develop]
    paths:
      - 'graphql/**'
      - '.github/workflows/graphql-quality-gate.yml'
  push:
    branches: [main, master]
    paths:
      - 'graphql/**'
  workflow_dispatch:

concurrency:
  group: graphql-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  graphql-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: graphql/package-lock.json

      - name: Install dependencies
        run: cd graphql && npm ci

      - name: Run GraphQL Quality Gate
        run: cd graphql && npm run quality

      - name: Upload coverage (optional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: graphql-coverage
          path: graphql/coverage
          retention-days: 7
          if-no-files-found: ignore
