# ═══════════════════════════════════════════════════════════════════════════
# Al-Awael ERP — Health Check & Incident Notification
# ═══════════════════════════════════════════════════════════════════════════
# Runs every 15 minutes via cron, and can be triggered manually.
# 1. Pings the production /health endpoint.
# 2. If the health check fails, opens a GitHub issue + optionally sends a webhook.
#
# Required GitHub Secrets:
#   HEALTH_CHECK_URL  → full URL to the /health endpoint (e.g. https://erp.example.com/health)
#   WEBHOOK_URL       → optional webhook URL for external alerting (e.g. Slack/Teams)
# ═══════════════════════════════════════════════════════════════════════════

name: Health Check

permissions:
  contents: read
  issues: write   # needed to create incident issues

# ── Triggers ──────────────────────────────────────────────────────────────
on:
  schedule:
    # Every 15 minutes (top of hour, :15, :30, :45)
    - cron: '*/15 * * * *'
  workflow_dispatch:

# ── Shared Environment ──────────────────────────────────────────────────
env:
  # Must be the HTTPS domain, NOT http://<IP>: nginx `listen 80` returns a 301
  # to https, and the TLS cert is for alaweal.org (an IP host fails SNI), so a
  # plain-HTTP-or-IP check always saw 301/handshake-fail and false-alarmed
  # (opened a GitHub incident issue every 15 min). https://alaweal.org/health = 200.
  HEALTH_CHECK_URL: ${{ secrets.HEALTH_CHECK_URL || 'https://alaweal.org/health' }}

jobs:
  # ═══════════════════════════════════════════════════════════════════
  # ping — curl the /health endpoint and capture status
  # ═══════════════════════════════════════════════════════════════════
  ping:
    name: Ping Health Endpoint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    outputs:
      status: ${{ steps.health_check.outputs.status }}
      http_code: ${{ steps.health_check.outputs.http_code }}
      response: ${{ steps.health_check.outputs.response }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Health Check (curl)
        id: health_check
        run: |
          echo "Pinging ${{ env.HEALTH_CHECK_URL }} ..."

          # Perform the request, capture HTTP code and body separately
          HTTP_CODE=$(curl -sL -o response_body.txt -w "%{http_code}" \
            --max-time 30 \
            --retry 2 \
            --retry-delay 5 \
            "${{ env.HEALTH_CHECK_URL }}")

          RESPONSE=$(cat response_body.txt)
          echo "HTTP_CODE=$HTTP_CODE"
          echo "RESPONSE=$RESPONSE"

          # Export as step outputs for downstream jobs. Collapse the body to a
          # SINGLE line — the heredoc-delimiter form breaks when the body has no
          # trailing newline (the closing delimiter lands mid-line → "Matching
          # delimiter not found"), and a `tr | head` pipe would SIGPIPE under
          # pipefail. `tr -d < file` + bash substring avoids both.
          RESP_ONELINE=$(tr -d '\r\n' < response_body.txt)
          echo "status=$([ "$HTTP_CODE" == "200" ] && echo 'UP' || echo 'DOWN')" >> "$GITHUB_OUTPUT"
          echo "http_code=$HTTP_CODE" >> "$GITHUB_OUTPUT"
          echo "response=${RESP_ONELINE:0:1500}" >> "$GITHUB_OUTPUT"

          # Pretty-print for logs
          echo "--- Health Check Result ---"
          echo "Status: $([ "$HTTP_CODE" == "200" ] && echo 'UP' || echo 'DOWN')"
          echo "HTTP Code: $HTTP_CODE"
          echo "Response: $RESPONSE"

          # Exit with error if not 200 so the job fails visibly
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Health check FAILED!"
            exit 1
          fi

          echo "Health check PASSED."

  # ═══════════════════════════════════════════════════════════════════
  # sw_guard — runtime anti-regression for the stale-shell 404 class (W1611)
  # Independent of `ping` on purpose: a failure here fails the run VISIBLY but
  # does NOT trigger the incident-issue `notify` job (which needs `ping`), so it
  # can't spam issues. The source has CI drift guards (W1586/W1611) and the repo
  # has an nginx snapshot, but nothing verified these invariants at RUNTIME on
  # prod — this closes that gap (the nginx `/registerSW.js` override + SW
  # no-cache headers are edited on the server directly, outside the deploy).
  # ═══════════════════════════════════════════════════════════════════
  sw_guard:
    name: SW / stale-shell anti-regression (runtime)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      BASE_URL: ${{ secrets.PROD_BASE_URL || 'https://alaweal.org' }}
    steps:
      - name: Assert the SW-404 fix still holds in prod
        run: |
          set -euo pipefail
          echo "Base: $BASE_URL"
          CURL="curl -fsSL --retry 2 --retry-delay 3 --max-time 30"

          # (1) The app shell must NOT register a root-scope service worker. A
          # `<script src="/registerSW.js">` tag (vite-plugin-pwa injectRegister)
          # or an inline `serviceWorker.register` is the exact regression that
          # served a stale legacy shell for every navigation → 404 on /rehab,
          # /admin, etc. (W1611).
          SHELL_HTML=$($CURL "$BASE_URL/")
          if printf '%s' "$SHELL_HTML" | grep -qiE 'registerSW\.js|serviceWorker\.register'; then
            echo "::error::REGRESSION — the app shell registers a service worker again (W1611 stale-shell 404 class)."
            exit 1
          fi
          echo "OK: shell registers no service worker."

          # (2) /registerSW.js must be the nginx cleanup shim (unregister + purge),
          # not a real registration. Guards the deploy-proof nginx override.
          if ! $CURL "$BASE_URL/registerSW.js" | grep -q 'CLEANUP'; then
            echo "::error::REGRESSION — /registerSW.js is not the cleanup shim (nginx override reverted?)."
            exit 1
          fi
          echo "OK: /registerSW.js is the cleanup shim."

          # (3) SW scripts must be served no-cache so a bad SW can always be superseded.
          if ! curl -fsSI --retry 2 --max-time 30 "$BASE_URL/service-worker.js" | grep -qi 'cache-control: *no-cache'; then
            echo "::error::REGRESSION — /service-worker.js is not served no-cache."
            exit 1
          fi
          echo "OK: /service-worker.js served no-cache."

          echo "SW-404 anti-regression checks PASSED."

  # ═══════════════════════════════════════════════════════════════════
  # notify — If health check failed, create an issue and send webhook
  # ═══════════════════════════════════════════════════════════════════
  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: ping
    if: always() && needs.ping.outputs.status == 'DOWN'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Create GitHub Issue ────────────────────────────────────
      # NOTE: All dynamic values are passed through `env:` and read via
      # process.env so we never inline `${{ }}` into the JS body. This both
      # avoids the YAML block-scalar break (markdown table rows at column 0
      # used to terminate the `script: |` block → startup failure) and
      # prevents script injection from the captured response body.
      - name: Create incident issue
        uses: actions/github-script@v7
        env:
          HTTP_CODE: ${{ needs.ping.outputs.http_code }}
          RESPONSE: ${{ needs.ping.outputs.response }}
          HEALTH_URL: ${{ env.HEALTH_CHECK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const httpCode = process.env.HTTP_CODE || 'unknown';
            const response = String(process.env.RESPONSE || '').substring(0, 2000);
            const healthUrl = process.env.HEALTH_URL || '';
            const runUrl = process.env.RUN_URL || '';
            const now = new Date().toISOString();

            const title = `🚨 Health Check Failed — ${now}`;
            const body = [
              '## Health Check Incident',
              '',
              '| Field | Value |',
              '|-------|-------|',
              `| **Time** | ${now} |`,
              '| **Status** | DOWN |',
              `| **HTTP Code** | ${httpCode} |`,
              `| **URL** | ${healthUrl} |`,
              `| **Workflow Run** | ${runUrl} |`,
              '',
              '### Response',
              '```json',
              response,
              '```',
              '',
              '---',
              '*This issue was auto-generated by the `health-check.yml` workflow.*',
            ].join('\n');

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['incident', 'health-check', 'automated'],
            });

            console.log(`Created issue #${issue.data.number}: ${issue.data.html_url}`);

      # ── Optional Webhook Notification ──────────────────────────
      - name: Send webhook notification
        if: env.WEBHOOK_URL != ''
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: |
          curl -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{
              "text": "🚨 Al-Awael ERP Health Check FAILED",
              "url": "${{ env.HEALTH_CHECK_URL }}",
              "http_code": "${{ needs.ping.outputs.http_code }}",
              "time": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'",
              "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }' || echo "Webhook delivery failed (non-blocking)"
