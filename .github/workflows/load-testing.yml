# W1401 — Performance load testing workflow
# See docs/runbooks/performance-load-testing.md
name: load-testing

on:
  workflow_dispatch:
    inputs:
      target_env:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - local
          - staging
          # production DISABLED — never run synthetic load against production
      peak_vus:
        description: 'Peak virtual users'
        required: true
        default: '50'
      peak_duration:
        description: 'Peak duration'
        required: true
        default: '1m'
      run_gov_tests:
        description: 'Run government integration tests'
        required: true
        default: true
        type: boolean
  schedule:
    - cron: '0 2 * * 0' # Weekly Sunday 02:00 UTC

jobs:
  load-testing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve target URL
        id: resolve
        run: |
          if [ "${{ github.event.inputs.target_env }}" = "production" ]; then
            echo "Production load testing is DISABLED"
            exit 1
          fi
          if [ "${{ github.event.inputs.target_env }}" = "staging" ]; then
            echo "url=https://staging-api.example.com" >> "$GITHUB_OUTPUT"
          else
            echo "url=http://localhost:3001" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate environment readiness
        run: |
          curl -sf "${{ steps.resolve.outputs.url }}/health" || exit 1

      - name: Run smoke test
        run: |
          cd backend
          BASE_URL="${{ steps.resolve.outputs.url }}" npm run test:load:smoke

      - name: Run baseline load test
        run: |
          cd backend
          BASE_URL="${{ steps.resolve.outputs.url }}" PEAK_VUS="${{ github.event.inputs.peak_vus }}" PEAK_DURATION="${{ github.event.inputs.peak_duration }}" npm run test:load

      - name: Run government integration load test
        if: ${{ github.event.inputs.run_gov_tests != 'false' }}
        run: |
          cd backend
          BASE_URL="${{ steps.resolve.outputs.url }}" npm run test:load:gov

      - name: Open runbook
        if: failure()
        run: |
          echo "See docs/runbooks/performance-load-testing.md for troubleshooting"
