# ════════════════════════════════════════════════════════════════════
#  Al-Awael ERP — PR Checks (v2 — Simplified & Non-blocking)
#  فحوصات طلبات الدمج — مبسطة وغير حرجة
# ════════════════════════════════════════════════════════════════════
name: "🔎 PR Checks"

on:
  pull_request:
    types: [opened, synchronize, edited, labeled, unlabeled]
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write

jobs:
  pr-quality:
    name: "📏 PR Quality"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: PR size report
        id: size
        run: |
          ADDITIONS="${{ github.event.pull_request.additions || 0 }}"
          DELETIONS="${{ github.event.pull_request.deletions || 0 }}"
          TOTAL=$((ADDITIONS + DELETIONS))
          FILES="${{ github.event.pull_request.changed_files || 0 }}"

          if   [ "$TOTAL" -gt 2000 ]; then SIZE="XL 🔴"
          elif [ "$TOTAL" -gt 800  ]; then SIZE="L 🟠"
          elif [ "$TOTAL" -gt 300  ]; then SIZE="M 🟡"
          elif [ "$TOTAL" -gt 50   ]; then SIZE="S 🟢"
          else                              SIZE="XS 🟢"
          fi

          echo "size=$SIZE" >> $GITHUB_OUTPUT
          echo "PR Size: $SIZE (+$ADDITIONS / -$DELETIONS) in $FILES files"

      - name: Check PR title format
        continue-on-error: true
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          PATTERN="^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert|design|wip)(\(.+\))?: .{3,}"
          if echo "$TITLE" | grep -qE "$PATTERN"; then
            echo "✅ Title OK: $TITLE"
          else
            echo "⚠️ Suggested format: type(scope): description"
            echo "   Types: feat|fix|docs|style|refactor|perf|test|build|ci|chore|design|wip"
            echo "   Got: $TITLE"
          fi

      - name: Summary comment
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const size = '${{ steps.size.outputs.size }}' || 'Unknown';
            const add  = parseInt('${{ github.event.pull_request.additions  || 0 }}');
            const del  = parseInt('${{ github.event.pull_request.deletions  || 0 }}');
            const files = parseInt('${{ github.event.pull_request.changed_files || 0 }}');

            const body = [
              `## 📊 PR Size: **${size}**`,
              '',
              '| Metric | Value |',
              '|:-------|------:|',
              `| Files  | ${files} |`,
              `| Added  | +${add} |`,
              `| Removed| -${del} |`,
              `| Total  | ${add + del} |`,
            ].join('\n');

            try {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
              });

              const existing = comments.find(c => c.user.type === 'Bot' && c.body.includes('PR Size:'));
              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body,
                });
              }
            } catch(e) {
              console.log('⚠️ Could not post comment:', e.message);
            }

  # ─── Quick frontend build check on PR ───────────────────────────
  build-check:
    name: "📦 Build Check"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # ✅ غير حرج — لا يوقف الـ PR إذا فشل
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          CI: "false"
          GENERATE_SOURCEMAP: "false"
          REACT_APP_API_URL: /api

      - name: Bundle info
        working-directory: frontend
        run: |
          echo "📦 Bundle: $(du -sh build/ | cut -f1)"
          echo "   JS:  $(du -sh build/static/js/ 2>/dev/null | cut -f1 || echo N/A)"
          echo "   CSS: $(du -sh build/static/css/ 2>/dev/null | cut -f1 || echo N/A)"
