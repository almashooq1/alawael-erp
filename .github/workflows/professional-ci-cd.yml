# ═══════════════════════════════════════════════════════════════════════════
# AlAwael ERP — Professional Unified CI/CD Pipeline
# Replaces fragmented workflows with a single comprehensive pipeline
# ═══════════════════════════════════════════════════════════════════════════
name: AlAwael ERP Professional CI/CD

on:
  push:
    branches: [main, develop, "release/**"]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "18"
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # ═══ Lint & Format ═════════════════════════════════════════════════════════
  lint:
    name: "Lint & Format"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: ESLint
        working-directory: backend
        run: npm run lint -- --max-warnings 0 || true

      - name: Format check
        working-directory: backend
        run: npm run format -- --check || true

  # ═══ Backend Tests ═════════════════════════════════════════════════════════
  test-backend:
    name: "Backend Tests"
    runs-on: ubuntu-latest
    needs: lint
    services:
      mongodb:
        image: mongo:7.0
        ports: ["27017:27017"]
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      MONGODB_URI: mongodb://localhost:27017/alawael_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret
      USE_MOCK_DB: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
        working-directory: backend

      - name: Run tests
        working-directory: backend
        run: npm test -- --coverage --passWithNoTests --no-cache --forceExit

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 7

  # ═══ Frontend Tests ════════════════════════════════════════════════════════
  test-frontend:
    name: "Frontend Tests"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
        working-directory: frontend

      - name: Run tests
        working-directory: frontend
        run: npm test -- --passWithNoTests --watchAll=false --ci
        env:
          CI: true

  # ═══ Build Frontend ════════════════════════════════════════════════════════
  build-frontend:
    name: "Build Frontend"
    runs-on: ubuntu-latest
    needs: test-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
        working-directory: frontend

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          CI: true
          GENERATE_SOURCEMAP: false
          REACT_APP_API_URL: /api

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/
          retention-days: 3

  # ═══ SCM Module Tests ══════════════════════════════════════════════════════
  test-scm:
    name: "SCM Tests"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Test SCM Frontend
        working-directory: supply-chain-management/frontend
        run: |
          npm ci || npm install --legacy-peer-deps
          npm test -- --passWithNoTests --watchAll=false --ci || true
        env:
          CI: true

  # ═══ Security Audit ════════════════════════════════════════════════════════
  security:
    name: "Security Audit"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Audit backend
        working-directory: backend
        run: npm audit --audit-level=high || true

      - name: Audit frontend
        working-directory: frontend
        run: npm audit --audit-level=high || true

  # ═══ Docker Build ══════════════════════════════════════════════════════════
  docker:
    name: "Docker: ${{ matrix.service.name }}"
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - { name: backend,  context: ./backend,  dockerfile: ./backend/Dockerfile }
          - { name: frontend, context: .,           dockerfile: ./Dockerfile }
          - { name: gateway,  context: ./gateway,   dockerfile: ./gateway/Dockerfile }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=semver,pattern={{version}}

      - uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ═══ Deploy Staging ════════════════════════════════════════════════════════
  deploy-staging:
    name: "Deploy Staging"
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/develop'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Deploy
        run: echo "Staging deployment placeholder"

  # ═══ Deploy Production ═════════════════════════════════════════════════════
  deploy-production:
    name: "Deploy Production"
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Deploy
        run: echo "Production deployment placeholder"
