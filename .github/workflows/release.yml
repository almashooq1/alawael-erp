# ════════════════════════════════════════════════════════════════════
#  Al-Awael ERP — Release Automation
#  أتمتة الإصدارات: وسم ← سجل التغييرات ← إصدار GitHub
# ════════════════════════════════════════════════════════════════════
name: "📋 Release"

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "رقم الإصدار (مثل: 1.2.0)"
        required: true
        type: string
      prerelease:
        description: "إصدار تجريبي؟"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    name: "📋 Create Release"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="v${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Release version: $VERSION"

      - name: Generate changelog
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            echo "📝 Changes since: $PREV_TAG"
            RANGE="$PREV_TAG..HEAD"
          fi

          echo "## 📋 Changelog — $VERSION" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "**Release Date:** $(date -u '+%Y-%m-%d')" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md

          FEATS=$(git log --pretty=format:"- %s (%h)" $RANGE --grep="^feat" 2>/dev/null || true)
          FIXES=$(git log --pretty=format:"- %s (%h)" $RANGE --grep="^fix" 2>/dev/null || true)
          DESIGNS=$(git log --pretty=format:"- %s (%h)" $RANGE --grep="^design" 2>/dev/null || true)
          OTHERS=$(git log --pretty=format:"- %s (%h)" $RANGE --grep="^chore\|^refactor\|^style\|^ci\|^build\|^perf" 2>/dev/null || true)

          [ -n "$FEATS" ]   && echo "### ✨ Features"     >> RELEASE_NOTES.md && echo "$FEATS"   >> RELEASE_NOTES.md && echo "" >> RELEASE_NOTES.md
          [ -n "$FIXES" ]   && echo "### 🐛 Bug Fixes"    >> RELEASE_NOTES.md && echo "$FIXES"   >> RELEASE_NOTES.md && echo "" >> RELEASE_NOTES.md
          [ -n "$DESIGNS" ] && echo "### 🎨 Design"       >> RELEASE_NOTES.md && echo "$DESIGNS" >> RELEASE_NOTES.md && echo "" >> RELEASE_NOTES.md
          [ -n "$OTHERS" ]  && echo "### 🔧 Maintenance"  >> RELEASE_NOTES.md && echo "$OTHERS"  >> RELEASE_NOTES.md && echo "" >> RELEASE_NOTES.md

          TOTAL=$(git rev-list --count $RANGE 2>/dev/null || echo "?")
          echo "---" >> RELEASE_NOTES.md
          echo "**Total Commits:** $TOTAL" >> RELEASE_NOTES.md

          cat RELEASE_NOTES.md

      - name: Create GitHub release
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const version = '${{ steps.version.outputs.version }}';
            const body = fs.readFileSync('RELEASE_NOTES.md', 'utf8');
            const prerelease = ${{ github.event.inputs.prerelease || false }};

            try {
              const release = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: version,
                name: `Al-Awael ERP ${version}`,
                body: body,
                draft: false,
                prerelease: prerelease,
                generate_release_notes: false,
              });
              console.log(`✅ Release created: ${release.data.html_url}`);
            } catch (e) {
              console.log(`⚠️ Release creation: ${e.message}`);
            }
