# ════════════════════════════════════════════════════════════════════
#  Sprint tests — hard gate for the 2026-04-17/18 module suite.
#
#  Runs the 182 deterministic tests across 7 suites that lock in:
#    • 10 Saudi gov-adapter state machines + ZATCA XAdES signer
#    • 15 admin routes (mount + auth + happy-path + CSV + Prometheus)
#    • 4.0.1–4.0.3 ops subsystems (rate limits, circuit breakers,
#      metrics registry) including a live-path integration test that
#      proves the breaker trips correctly in Absher/NPHIES/Fatoora.
#
#  Unlike ci.yml, this workflow FAILS the build on regression — no
#  `|| echo warning` escape. A broken state machine or a route that
#  stops mounting blocks the PR until fixed.
# ════════════════════════════════════════════════════════════════════
