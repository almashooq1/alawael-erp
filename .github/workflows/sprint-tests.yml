# ════════════════════════════════════════════════════════════════════
#  Sprint tests — hard gate for the 2026-04-17/18 module suite.
#
#  Runs the 182 deterministic tests across 7 suites that lock in:
#    • 10 Saudi gov-adapter state machines + ZATCA XAdES signer
#    • 15 admin routes (mount + auth + happy-path + CSV + Prometheus)
#    • 4.0.1–4.0.3 ops subsystems (rate limits, circuit breakers,
#      metrics registry) including a live-path integration test that
#      proves the breaker trips correctly in Absher/NPHIES/Fatoora.
#
#  Unlike ci.yml, this workflow FAILS the build on regression — no
#  `|| echo warning` escape. A broken state machine or a route that
#  stops mounting blocks the PR until fixed.
# ════════════════════════════════════════════════════════════════════
name: "🧪 Sprint Tests"

on:
  # NOTE: GitHub Actions doesn't expand YAML anchors inside `paths:` lists,
  # so push and pull_request keep identical literal lists. If you add a
  # path to one, add it to the other — the ci-path-triggers-exist drift
  # test catches stale entries but won't catch this asymmetry.
  push:
    branches: [main, develop]
    paths: &sprint_paths
      - 'backend/services/**'
      - 'backend/routes/**'
      - 'backend/models/**'
      - 'backend/utils/safeError.js'
      - 'backend/utils/arabicSearch.js'
      - 'backend/middleware/auth.js'
      - 'backend/middleware/requestId.middleware.js'
      - 'backend/__tests__/gov-adapters.e2e.test.js'
      - 'backend/__tests__/new-admin-routes.api.test.js'
      - 'backend/__tests__/zatca-xml-signer.e2e.test.js'
      - 'backend/__tests__/zatca-envelope.test.js'
      - 'backend/__tests__/safe-error.test.js'
      - 'backend/__tests__/arabic-search.test.js'
      - 'backend/__tests__/adapter-rate-limiter.test.js'
      - 'backend/__tests__/adapter-circuit-breaker.test.js'
      - 'backend/__tests__/adapter-circuit-live-path.test.js'
      - 'backend/__tests__/adapter-metrics-registry.test.js'
      - 'backend/__tests__/ops-artifacts.test.js'
      - 'backend/__tests__/preflight-script.test.js'
      - 'backend/__tests__/dsar-hash-script.test.js'
      - 'backend/__tests__/build-info-internals.test.js'
      - 'backend/__tests__/rate-limit-to-429.test.js'
      - 'backend/__tests__/request-id-contract.test.js'
      - 'backend/__tests__/provider-registry-consistency.test.js'
      - 'backend/__tests__/doc-test-count-consistency.test.js'
      - 'backend/__tests__/cpe-service.test.js'
      - 'backend/__tests__/cpe-attention-script.test.js'
      - 'backend/__tests__/cpe-minimums-consistency.test.js'
      - 'backend/__tests__/admin-routes-auth-wiring.test.js'
      - 'backend/__tests__/attendance-service.test.js'
      - 'backend/__tests__/adapter-audit-ttl-guard.test.js'
      - 'backend/__tests__/adapter-public-interface.test.js'
      - 'backend/__tests__/admin-pages-routed.test.js'
      - 'backend/__tests__/changelog-structure.test.js'
      - 'backend/__tests__/ci-path-triggers-exist.test.js'
      - 'backend/__tests__/docs-links-exist.test.js'
      - 'backend/__tests__/engines-aligned.test.js'
      - 'backend/__tests__/makefile-npm-script-refs.test.js'
      - 'backend/__tests__/no-beneficiary-eager-fetch.test.js'
      - 'backend/__tests__/no-it-only-or-skip.test.js'
      - 'backend/__tests__/root-proxy-scripts.test.js'
      - 'backend/__tests__/runbooks-referenced.test.js'
      - 'backend/__tests__/sidebar-paths-routed.test.js'
      - 'backend/__tests__/sprint-test-files-exist.test.js'
      - 'backend/__tests__/test-files-have-describe.test.js'
      - 'backend/__tests__/test-script-dedupe.test.js'
      - 'backend/scripts/preflight.js'
      - 'backend/scripts/gov-status.js'
      - 'backend/scripts/dsar-hash.js'
      - 'backend/scripts/cpe-attention.js'
      - 'backend/services/zatcaEnvelope.js'
      - 'backend/routes/build-info.routes.js'
      - 'docs/dashboards/**'
      - 'docs/alerts/**'
      - 'docs/runbooks/**'
      - 'backend/package.json'
      - '.github/workflows/sprint-tests.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/services/**'
      - 'backend/routes/**'
      - 'backend/models/**'
      - 'backend/utils/safeError.js'
      - 'backend/utils/arabicSearch.js'
      - 'backend/middleware/auth.js'
      - 'backend/middleware/requestId.middleware.js'
      - 'backend/__tests__/gov-adapters.e2e.test.js'
      - 'backend/__tests__/new-admin-routes.api.test.js'
      - 'backend/__tests__/zatca-xml-signer.e2e.test.js'
      - 'backend/__tests__/zatca-envelope.test.js'
      - 'backend/__tests__/safe-error.test.js'
      - 'backend/__tests__/arabic-search.test.js'
      - 'backend/__tests__/adapter-rate-limiter.test.js'
      - 'backend/__tests__/adapter-circuit-breaker.test.js'
      - 'backend/__tests__/adapter-circuit-live-path.test.js'
      - 'backend/__tests__/adapter-metrics-registry.test.js'
      - 'backend/__tests__/ops-artifacts.test.js'
      - 'backend/__tests__/preflight-script.test.js'
      - 'backend/__tests__/dsar-hash-script.test.js'
      - 'backend/__tests__/build-info-internals.test.js'
      - 'backend/__tests__/rate-limit-to-429.test.js'
      - 'backend/__tests__/request-id-contract.test.js'
      - 'backend/__tests__/provider-registry-consistency.test.js'
      - 'backend/__tests__/doc-test-count-consistency.test.js'
      - 'backend/__tests__/cpe-service.test.js'
      - 'backend/__tests__/cpe-attention-script.test.js'
      - 'backend/__tests__/cpe-minimums-consistency.test.js'
      - 'backend/__tests__/admin-routes-auth-wiring.test.js'
      - 'backend/__tests__/attendance-service.test.js'
      - 'backend/__tests__/adapter-audit-ttl-guard.test.js'
      - 'backend/__tests__/adapter-public-interface.test.js'
      - 'backend/__tests__/admin-pages-routed.test.js'
      - 'backend/__tests__/changelog-structure.test.js'
      - 'backend/__tests__/ci-path-triggers-exist.test.js'
      - 'backend/__tests__/docs-links-exist.test.js'
      - 'backend/__tests__/engines-aligned.test.js'
      - 'backend/__tests__/makefile-npm-script-refs.test.js'
      - 'backend/__tests__/no-beneficiary-eager-fetch.test.js'
      - 'backend/__tests__/no-it-only-or-skip.test.js'
      - 'backend/__tests__/root-proxy-scripts.test.js'
      - 'backend/__tests__/runbooks-referenced.test.js'
      - 'backend/__tests__/sidebar-paths-routed.test.js'
      - 'backend/__tests__/sprint-test-files-exist.test.js'
      - 'backend/__tests__/test-files-have-describe.test.js'
      - 'backend/__tests__/test-script-dedupe.test.js'
      - 'backend/scripts/preflight.js'
      - 'backend/scripts/gov-status.js'
      - 'backend/scripts/dsar-hash.js'
      - 'backend/scripts/cpe-attention.js'
      - 'backend/services/zatcaEnvelope.js'
      - 'backend/routes/build-info.routes.js'
      - 'docs/dashboards/**'
      - 'docs/alerts/**'
      - 'docs/runbooks/**'
      - 'backend/package.json'
      - '.github/workflows/sprint-tests.yml'
  workflow_dispatch:

# Cancel in-progress runs on the same ref when a newer commit arrives.
# Saves CI minutes on rapid pushes + keeps the status check tracking
# the latest commit (not a stale in-flight run).
concurrency:
  group: sprint-tests-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  signer-tests:
    name: "✍️ ZATCA XAdES signer (17 tests)"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci --legacy-peer-deps
      - name: Run signer tests
        working-directory: backend
        run: npm run test:zatca-signer
        env:
          NODE_ENV: test
          JWT_SECRET: ci-secret-at-least-sixteen-chars-long-for-validator

  adapter-tests:
    name: "🇸🇦 Gov Adapters (74 tests)"
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci --legacy-peer-deps

      - name: Run adapter state-machine tests
        working-directory: backend
        run: npm run test:gov-adapters
        env:
          NODE_ENV: test
          # All adapters force-forced to mock via the test file itself,
          # so no external network or credentials are needed.
          JWT_SECRET: ci-secret-at-least-sixteen-chars-long-for-validator

  api-tests:
    name: "🌐 Admin API Smoke (26 tests)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci --legacy-peer-deps

      - name: Run admin API smoke tests
        working-directory: backend
        run: npm run test:admin-api
        env:
          NODE_ENV: test
          USE_MOCK_DB: 'true'
          JWT_SECRET: ci-secret-at-least-sixteen-chars-long-for-validator
          CSRF_DISABLE: 'true'

  ops-subsystems-tests:
    name: "🛡️ Ops Subsystems (102 tests — rate/circuit/metrics/artifacts/preflight/dsar/buildinfo/envelope/safeerror)"
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci --legacy-peer-deps

      - name: Run ops-subsystem tests (rate limiter, circuit breaker, metrics registry)
        working-directory: backend
        run: npm run test:ops-subsystems
        env:
          NODE_ENV: test
          JWT_SECRET: ci-secret-at-least-sixteen-chars-long-for-validator

  demo-seed-dryrun:
    name: "🌱 Demo seed loads"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci --legacy-peer-deps

      - name: Dry-run demo seed (verify script loads + adapters resolve)
        working-directory: backend
        run: npm run seed:demo:dry
        env:
          NODE_ENV: test
          JWT_SECRET: ci-secret-at-least-sixteen-chars-long-for-validator

  summary:
    name: "✅ Sprint coverage"
    runs-on: ubuntu-latest
    needs: [signer-tests, adapter-tests, api-tests, ops-subsystems-tests, demo-seed-dryrun]
    if: always()
    steps:
      - name: Report
        run: |
          echo "═══════════════════════════════════════════════════"
          echo "  Sprint Test Matrix"
          echo "═══════════════════════════════════════════════════"
          echo "  • ZATCA XAdES signer (17 tests):       ${{ needs.signer-tests.result }}"
          echo "  • Gov adapters (10 × state machines):  ${{ needs.adapter-tests.result }}"
          echo "  • Admin API smoke (49 tests):          ${{ needs.api-tests.result }}"
          echo "  • Ops subsystems (102 tests):          ${{ needs.ops-subsystems-tests.result }}"
          echo "  • Demo seed loads:                     ${{ needs.demo-seed-dryrun.result }}"
          echo "═══════════════════════════════════════════════════"
          if [[ "${{ needs.signer-tests.result }}"       != "success" ]] || \
             [[ "${{ needs.adapter-tests.result }}"      != "success" ]] || \
             [[ "${{ needs.api-tests.result }}"          != "success" ]] || \
             [[ "${{ needs.ops-subsystems-tests.result }}" != "success" ]] || \
             [[ "${{ needs.demo-seed-dryrun.result }}"   != "success" ]]; then
            echo "::error::Sprint test gate failed — see individual job logs."
            exit 1
          fi
          echo "All 548 sprint tests green."
