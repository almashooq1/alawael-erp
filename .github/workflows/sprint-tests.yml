# Cancel in-progress runs on the same ref when a newer commit arrives.
# Saves CI minutes on rapid pushes + keeps the status check tracking
# the latest commit (not a stale in-flight run).
concurrency:
  group: sprint-tests-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  signer-tests:
    name: "✍️ ZATCA XAdES signer (17 tests)"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci --legacy-peer-deps
      - name: Run signer tests
        working-directory: backend
        run: npm run test:zatca-signer
        env:
          NODE_ENV: test
          JWT_SECRET: ci-secret-at-least-sixteen-chars-long-for-validator

  adapter-tests:
    name: "🇸🇦 Gov Adapters (74 tests)"
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci --legacy-peer-deps

      - name: Run adapter state-machine tests
        working-directory: backend
        run: npm run test:gov-adapters
        env:
          NODE_ENV: test
          # All adapters force-forced to mock via the test file itself,
          # so no external network or credentials are needed.
          JWT_SECRET: ci-secret-at-least-sixteen-chars-long-for-validator

  api-tests:
    name: "🌐 Admin API Smoke (26 tests)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci --legacy-peer-deps

      - name: Run admin API smoke tests
        working-directory: backend
        run: npm run test:admin-api
        env:
          NODE_ENV: test
          USE_MOCK_DB: 'true'
          JWT_SECRET: ci-secret-at-least-sixteen-chars-long-for-validator
          CSRF_DISABLE: 'true'

  ops-subsystems-tests:
    name: "🛡️ Ops Subsystems (102 tests — rate/circuit/metrics/artifacts/preflight/dsar/buildinfo/envelope/safeerror)"
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci --legacy-peer-deps

      - name: Run ops-subsystem tests (rate limiter, circuit breaker, metrics registry)
        working-directory: backend
        run: npm run test:ops-subsystems
        env:
          NODE_ENV: test
          JWT_SECRET: ci-secret-at-least-sixteen-chars-long-for-validator

  demo-seed-dryrun:
    name: "🌱 Demo seed loads"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci --legacy-peer-deps

      - name: Dry-run demo seed (verify script loads + adapters resolve)
        working-directory: backend
        run: npm run seed:demo:dry
        env:
          NODE_ENV: test
          JWT_SECRET: ci-secret-at-least-sixteen-chars-long-for-validator

  summary:
    name: "✅ Sprint coverage"
    runs-on: ubuntu-latest
    needs: [signer-tests, adapter-tests, api-tests, ops-subsystems-tests, demo-seed-dryrun]
    if: always()
    steps:
      - name: Report
        run: |
          echo "═══════════════════════════════════════════════════"
          echo "  Sprint Test Matrix"
          echo "═══════════════════════════════════════════════════"
          echo "  • ZATCA XAdES signer (17 tests):       ${{ needs.signer-tests.result }}"
          echo "  • Gov adapters (10 × state machines):  ${{ needs.adapter-tests.result }}"
          echo "  • Admin API smoke (49 tests):          ${{ needs.api-tests.result }}"
          echo "  • Ops subsystems (102 tests):          ${{ needs.ops-subsystems-tests.result }}"
          echo "  • Demo seed loads:                     ${{ needs.demo-seed-dryrun.result }}"
          echo "═══════════════════════════════════════════════════"
          if [[ "${{ needs.signer-tests.result }}"       != "success" ]] || \
             [[ "${{ needs.adapter-tests.result }}"      != "success" ]] || \
             [[ "${{ needs.api-tests.result }}"          != "success" ]] || \
             [[ "${{ needs.ops-subsystems-tests.result }}" != "success" ]] || \
             [[ "${{ needs.demo-seed-dryrun.result }}"   != "success" ]]; then
            echo "::error::Sprint test gate failed — see individual job logs."
            exit 1
          fi
          echo "All 1553 sprint tests green."
