name: CD Pipeline - Al-Awael ERP

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/alawael

jobs:
  # ─────────────────────────────────────────────
  # Deploy to Staging
  # ─────────────────────────────────────────────
  deploy-staging:
    name: 🚀 Deploy Staging
    runs-on: ubuntu-latest
    if: github.event.inputs.environment == 'staging' || startsWith(github.ref, 'refs/tags/v')
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Configure kubeconfig
        run: echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > $HOME/.kube/config

      - name: Deploy to staging
        run: |
          export IMAGE_TAG=${{ github.sha }}
          envsubst < k8s/staging/deployment.yml | kubectl apply -f -
          kubectl rollout status deployment/alawael-backend -n alawael-staging --timeout=300s
          kubectl rollout status deployment/alawael-api-gateway -n alawael-staging --timeout=300s

      - name: Verify deployment
        run: |
          kubectl get pods -n alawael-staging
          echo "Checking health endpoints..."
          sleep 30
          kubectl port-forward svc/alawael-api-gateway 8080:3600 -n alawael-staging &
          sleep 5
          curl -sf http://localhost:8080/health || echo "Gateway health check pending"

      - name: Staging Summary
        run: |
          echo "## Staging Deployment" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image Tag**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────
  # Deploy to Production
  # ─────────────────────────────────────────────
  deploy-production:
    name: 🏭 Deploy Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.event.inputs.environment == 'production' || startsWith(github.ref, 'refs/tags/v')
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Configure kubeconfig
        run: echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > $HOME/.kube/config

      - name: Blue-Green Deploy
        run: |
          export IMAGE_TAG=${{ github.sha }}
          export DEPLOY_COLOR=$(date +%s | md5sum | head -c 6)

          # Deploy new version (green)
          envsubst < k8s/production/deployment.yml | kubectl apply -f -

          # Wait for rollout
          kubectl rollout status deployment/alawael-backend -n alawael-prod --timeout=600s
          kubectl rollout status deployment/alawael-api-gateway -n alawael-prod --timeout=600s

      - name: Smoke tests
        run: |
          sleep 30
          kubectl port-forward svc/alawael-api-gateway 8080:3600 -n alawael-prod &
          sleep 5
          # Health checks
          curl -sf http://localhost:8080/health
          curl -sf http://localhost:8080/api/gateway/status
          echo "✅ Smoke tests passed"

      - name: Production Summary
        run: |
          echo "## Production Deployment ✅" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed**: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────
  # Post-Deploy Monitoring
  # ─────────────────────────────────────────────
  monitor:
    name: 📊 Post-Deploy Monitor
    runs-on: ubuntu-latest
    needs: deploy-production
    if: always() && needs.deploy-production.result == 'success'
    steps:
      - name: Monitor for 5 minutes
        run: |
          echo "Monitoring deployment for 5 minutes..."
          for i in $(seq 1 5); do
            sleep 60
            echo "Minute $i/5 - checking services..."
          done
          echo "✅ Monitoring complete"
