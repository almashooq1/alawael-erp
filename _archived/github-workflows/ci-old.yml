name: CI Pipeline - Al-Awael ERP

on:
  push:
    branches: [main, develop, 'release/**']
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/alawael

jobs:
  # ─────────────────────────────────────────────
  # Lint & Format Check
  # ─────────────────────────────────────────────
  lint:
    name: 🔍 Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        run: cd backend && npm ci
      - name: ESLint
        run: cd backend && npm run lint || true
      - name: Prettier check
        run: cd backend && npm run format:check || true

  # ─────────────────────────────────────────────
  # Backend Tests
  # ─────────────────────────────────────────────
  test-backend:
    name: 🧪 Backend Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      mongodb:
        image: mongo:7
        ports: ['27017:27017']
        env:
          MONGO_INITDB_ROOT_USERNAME: admin
          MONGO_INITDB_ROOT_PASSWORD: testpassword
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      MONGODB_URI: mongodb://admin:testpassword@localhost:27017/alawael_test?authSource=admin
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-jwt-secret
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        run: cd backend && npm ci
      - name: Run tests
        run: cd backend && npm test -- --passWithNoTests --no-coverage
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: backend/coverage/

  # ─────────────────────────────────────────────
  # Security Scan
  # ─────────────────────────────────────────────
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Audit backend
        run: cd backend && npm audit --audit-level=high || true
      - name: Audit services
        run: |
          for dir in services/*/; do
            if [ -f "$dir/package.json" ]; then
              echo "🔍 Auditing $dir"
              cd "$dir" && npm audit --audit-level=high || true
              cd ../..
            fi
          done

  # ─────────────────────────────────────────────
  # Build Docker Images
  # ─────────────────────────────────────────────
  build:
    name: 🐳 Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, security]
    if: github.event_name == 'push'
    strategy:
      matrix:
        service:
          - backend
          - api-gateway
          - security-auth-service
          - smart-reports-service
          - service-mesh-monitor
          - hr-payroll-service
          - crm-service
          - attendance-biometric-service
          - fleet-transport-service
          - document-management-service
          - workflow-engine-service
          - identity-service
          - analytics-bi-service
          - e-learning-service
          - parent-portal-service
          - rehabilitation-care-service
          - fee-billing-service
          - multi-tenant-service
          - realtime-collaboration-service
          - kitchen-laundry-facility-service
          - inventory-warehouse-service
          - academic-curriculum-service
          - student-health-medical-service
          - visitor-campus-security-service
          - crisis-safety-service
          - compliance-accreditation-service
          - events-activities-service
          - asset-equipment-service
          - staff-training-development-service
          - cms-announcements-service
          - forms-survey-service
          - budget-financial-planning-service
          - student-lifecycle-service
          - external-integration-hub-service
          - facility-space-management-service
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Determine context
        id: context
        run: |
          if [ "${{ matrix.service }}" = "backend" ]; then
            echo "path=./backend" >> $GITHUB_OUTPUT
          else
            echo "path=./services/${{ matrix.service }}" >> $GITHUB_OUTPUT
          fi
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ steps.context.outputs.path }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # Notify
  # ─────────────────────────────────────────────
  notify:
    name: 📢 Notify
    runs-on: ubuntu-latest
    needs: build
    if: always()
    steps:
      - name: CI Summary
        run: |
          echo "## Al-Awael ERP CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Status**: ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
