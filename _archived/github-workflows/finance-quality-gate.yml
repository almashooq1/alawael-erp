name: Finance Module Quality Gate

on:
  pull_request:
    branches: [main, master, develop]
    paths:
      - 'finance-module/**'
      - '.github/workflows/finance-quality-gate.yml'
  push:
    branches: [main, master]
    paths:
      - 'finance-module/**'
  workflow_dispatch:

concurrency:
  group: finance-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  finance-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    services:
      mongodb:
        image: mongo:7.0
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: finance-module/backend/package-lock.json

      - name: Install dependencies
        run: cd finance-module/backend && npm ci

      - name: Run Finance Quality Gate
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://localhost:27017/finance_test
        run: cd finance-module/backend && npm run quality

      - name: Upload coverage (optional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: finance-coverage
          path: finance-module/backend/coverage
          retention-days: 7
          if-no-files-found: ignore
