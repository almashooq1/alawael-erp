version: '3.9'

# ═══════════════════════════════════════════════════════════════
# ALAWAEL ERP - Full Stack Production Deployment
# Date: March 2, 2026
# Phase 3: Complete System Integration
# ═══════════════════════════════════════════════════════════════

networks:
  alawael-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/16

volumes:
  mongodb_data:
    driver: local
  postgresql_data:
    driver: local
  redis_data:
    driver: local
  backend_logs:
    driver: local

services:
  # ═══════════════════════════════════════════════════════════════
  # DATABASE SERVICES
  # ═══════════════════════════════════════════════════════════════

  postgres:
    image: postgres:15-alpine
    container_name: alawael-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-alawael_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-SecurePass2026!}
      POSTGRES_DB: ${POSTGRES_DB:-alawael_erp}
    ports:
      - "5432:5432"
    volumes:
      - postgresql_data:/var/lib/postgresql/data
    networks:
      - alawael-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-alawael_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7.0-alpine
    container_name: alawael-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS:-MongoSecure2026!}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - alawael-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: alawael-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASS:-RedisSecure2026!} --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - alawael-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══════════════════════════════════════════════════════════════
  # BACKEND SERVICES
  # ═══════════════════════════════════════════════════════════════

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: alawael-backend
    restart: unless-stopped
    depends_on:
      - postgres
      - mongodb
      - redis
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-alawael_user}:${POSTGRES_PASSWORD:-SecurePass2026!}@postgres:5432/${POSTGRES_DB:-alawael_erp}
      MONGODB_URI: mongodb://${MONGO_USER:-admin}:${MONGO_PASS:-MongoSecure2026!}@mongodb:27017/admin
      REDIS_URL: redis://:${REDIS_PASS:-RedisSecure2026!}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-JWTSecureKey2026ChangeThis}
    ports:
      - "3001:3001"
    volumes:
      - backend_logs:/app/logs
    networks:
      - alawael-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  scm-backend:
    build:
      context: ./supply-chain-management/backend
      dockerfile: Dockerfile
    container_name: alawael-scm-backend
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    environment:
      NODE_ENV: production
      PORT: 3002
      DATABASE_URL: postgresql://${POSTGRES_USER:-alawael_user}:${POSTGRES_PASSWORD:-SecurePass2026!}@postgres:5432/${POSTGRES_DB:-alawael_erp}
      REDIS_URL: redis://:${REDIS_PASS:-RedisSecure2026!}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-JWTSecureKey2026ChangeThis}
    ports:
      - "3002:3002"
    networks:
      - alawael-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3002/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ═══════════════════════════════════════════════════════════════
  # FRONTEND SERVICES
  # ═══════════════════════════════════════════════════════════════

  scm-frontend:
    build:
      context: ./supply-chain-management/frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: http://localhost:3002
    container_name: alawael-scm-frontend
    restart: unless-stopped
    depends_on:
      - scm-backend
    ports:
      - "3000:80"
    networks:
      - alawael-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

  dashboard-client:
    build:
      context: ./dashboard/client
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: http://localhost:3001
    container_name: alawael-dashboard-client
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3005:80"
    networks:
      - alawael-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ═══════════════════════════════════════════════════════════════
  # NGINX REVERSE PROXY
  # ═══════════════════════════════════════════════════════════════

  nginx:
    image: nginx:alpine
    container_name: alawael-nginx
    restart: unless-stopped
    depends_on:
      - backend
      - scm-backend
      - scm-frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - alawael-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

# ═══════════════════════════════════════════════════════════════
# QUICK START GUIDE
# ═══════════════════════════════════════════════════════════════
#
# 1. Start all services:
#    docker-compose -f docker-compose.fullstack.yml up -d
#
# 2. View logs:
#    docker-compose -f docker-compose.fullstack.yml logs -f
#
# 3. Check status:
#    docker-compose -f docker-compose.fullstack.yml ps
#
# 4. Stop all:
#    docker-compose -f docker-compose.fullstack.yml down
#
# 5. Rebuild:
#    docker-compose -f docker-compose.fullstack.yml up -d --build
#
# ═══════════════════════════════════════════════════════════════
# ACCESS POINTS
# ═══════════════════════════════════════════════════════════════
#
# Backend API:        http://localhost:3001
# SCM Backend:        http://localhost:3002
# SCM Frontend:       http://localhost:3000
# Dashboard:          http://localhost:3005
# Nginx:              http://localhost:80
#
# PostgreSQL:         localhost:5432
# MongoDB:            localhost:27017
# Redis:              localhost:6379
#
# ═══════════════════════════════════════════════════════════════
