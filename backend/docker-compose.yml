services:
  # Main backend application (development mode)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alawael-backend-dev
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      NODE_ENV: development
      USE_MOCK_DB: "true"
      SKIP_SOCKET_IO: "true"
      DISABLE_REDIS: "true"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    volumes:
      # Mount source for live development
      - ./:/app
      - /app/node_modules  # Prevent overwriting container node_modules
    networks:
      - alawael-network

networks:
  alawael-network:
    driver: bridge
