version: '3.8'

services:
  # PostgreSQL Primary Database
  postgres-primary:
    image: postgres:14-alpine
    container_name: alawael_postgres_primary
    environment:
      POSTGRES_DB: alawael_erp
      POSTGRES_USER: alawael_user
      POSTGRES_PASSWORD: alawael_secure_password
      POSTGRES_INITDB_ARGS: "-c max_connections=100 -c shared_buffers=256MB"
    ports:
      - "5432:5432"
    volumes:
      - postgres_primary_data:/var/lib/postgresql/data
      - ./server/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alawael_user -d alawael_erp"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - alawael-network
    command:
      - "postgres"
      - "-c"
      - "wal_level=replica"
      - "-c"
      - "max_wal_senders=3"

  # PostgreSQL Read Replica 1
  postgres-replica-1:
    image: postgres:14-alpine
    container_name: alawael_postgres_replica_1
    environment:
      POSTGRES_DB: alawael_erp
      POSTGRES_USER: alawael_user
      POSTGRES_PASSWORD: alawael_secure_password
      PGPASSWORD: alawael_secure_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_replica1_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alawael_user -d alawael_erp"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - alawael-network
    depends_on:
      postgres-primary:
        condition: service_healthy
    command: |
      bash -c "
      pg_basebackup -h postgres-primary -U alawael_user -v -P -W -D /var/lib/postgresql/data -R
      chmod 700 /var/lib/postgresql/data
      exec postgres
      "

  # PostgreSQL Read Replica 2
  postgres-replica-2:
    image: postgres:14-alpine
    container_name: alawael_postgres_replica_2
    environment:
      POSTGRES_DB: alawael_erp
      POSTGRES_USER: alawael_user
      POSTGRES_PASSWORD: alawael_secure_password
      PGPASSWORD: alawael_secure_password
    ports:
      - "5434:5432"
    volumes:
      - postgres_replica2_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alawael_user -d alawael_erp"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - alawael-network
    depends_on:
      postgres-primary:
        condition: service_healthy
    command: |
      bash -c "
      pg_basebackup -h postgres-primary -U alawael_user -v -P -W -D /var/lib/postgresql/data -R
      chmod 700 /var/lib/postgresql/data
      exec postgres
      "

  # Redis - Standalone Mode
  redis:
    image: redis:7-alpine
    container_name: alawael_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - alawael-network
    command: redis-server --appendonly yes

  # Redis Commander (Web UI for Redis)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: alawael_redis_commander
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - alawael-network

  # pgAdmin (Web UI for PostgreSQL)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: alawael_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@alawael.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    depends_on:
      - postgres-primary
    networks:
      - alawael-network

volumes:
  postgres_primary_data:
  postgres_replica1_data:
  postgres_replica2_data:
  redis_data:

networks:
  alawael-network:
    driver: bridge
