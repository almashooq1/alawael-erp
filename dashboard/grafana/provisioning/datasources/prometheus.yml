# yaml-language-server: $schema=https://raw.githubusercontent.com/grafana/grafana/main/conf/provisioning/datasources/schema.json
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: 15s
