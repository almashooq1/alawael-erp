version: "3.8"

# ═══════════════════════════════════════════════════════════════════════════
# Al-Awael ERP — Production Docker Compose Override
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ═══════════════════════════════════════════════════════════════════════════

services:
  backend:
    restart: always
    environment:
      NODE_ENV: production
      ALLOW_DEV_SECRETS: "0"
      USE_MOCK_DB: "false"
      DISABLE_REDIS: "false"
      REDIS_ENABLED: "true"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 512M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  mongodb:
    restart: always
    command: >
      mongod
        --auth
        --bind_ip_all
        --wiredTigerCacheSizeGB 0.5
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  redis:
    restart: always
    command: >
      redis-server
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
        --appendonly yes
        --requirepass ${REDIS_PASSWORD}
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # ─── Nginx Reverse Proxy (production) ─────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: alawael-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../frontend/build:/usr/share/nginx/html:ro
      - ../certs:/etc/nginx/ssl:ro
    depends_on:
      - backend
    networks:
      - alawael-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
