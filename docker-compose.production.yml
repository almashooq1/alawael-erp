###############################################################################
# Al-Awael ERP — Docker Compose Production Override
# نظام الأوائل ERP — إعدادات Docker Compose للإنتاج
#
# Usage:
#   docker compose -f docker-compose.professional.yml -f docker-compose.production.yml up -d
#
# Required env vars (fail-fast if missing):
#   REDIS_PASSWORD, JWT_SECRET, MONGODB_URI
###############################################################################

services:

  # ─── MongoDB (Production Hardened) ────────────────────────────────────────
  mongodb:
    restart: always
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
        reservations:
          memory: 2G
          cpus: "1.0"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ─── Redis (Production Hardened) ──────────────────────────────────────────
  redis:
    restart: always
    security_opt:
      - no-new-privileges:true
    command: >
      redis-server
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
        --appendonly yes
        --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
        --rename-command FLUSHALL ""
        --rename-command FLUSHDB ""
        --rename-command DEBUG ""
        --save 900 1
        --save 300 10
        --save 60 1000
        --tcp-keepalive 60
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.25"
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ─── Backend (Production) ────────────────────────────────────────────────
  backend:
    user: "node:node"
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - uploads_data:/app/uploads
    security_opt:
      - no-new-privileges:true
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    environment:
      NODE_ENV: production
      LOG_LEVEL: warn
      ENABLE_SWAGGER: "false"
      RATE_LIMIT_MAX_REQUESTS: 100
      SHUTDOWN_TIMEOUT: 30000
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 512M
          cpus: "0.5"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  # ─── Frontend (Production) ──────────────────────────────────────────────
  frontend:
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ─── Nginx Reverse Proxy (Production) ───────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: always
    security_opt:
      - no-new-privileges:true
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 64M
          cpus: "0.1"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

