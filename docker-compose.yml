    depends_on:
      - prometheus
    networks:
      - monitoring-net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

  # ─── Node Exporter (System Metrics) ─────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:latest
    container_name: alawael-node-exporter
    profiles: ["monitoring", "all"]
    <<: *restart-policy
    ports:
      - "${NODE_EXPORTER_PORT:-9100}:9100"
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - monitoring-net

  # ─── Redis Exporter ─────────────────────────────────────────────────────
