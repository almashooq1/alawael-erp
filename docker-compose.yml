  # ─── PostgreSQL 16 ──────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: alawael-postgres
    profiles: ["optional", "all"]
    <<: *restart-policy
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-PostgresPass2026!}
      POSTGRES_DB: ${POSTGRES_DB:-alawael_erp}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - alawael-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  # ─── Elasticsearch 8 ───────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: alawael-elasticsearch
    profiles: ["optional", "all"]
    <<: *restart-policy
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "${ELASTICSEARCH_PORT:-9200}:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - alawael-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -q '\"status\":\"[gy]'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"

  # ─── Kibana (Elasticsearch UI) ──────────────────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: alawael-kibana
    profiles: ["optional", "all"]
    <<: *restart-policy
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "${KIBANA_PORT:-5601}:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - alawael-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5601/api/status | grep -q '\"overall\"'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "0.5"

  # ╔═════════════════════════════════════════════════════════════════════════╗
  # ║  أدوات التطوير — DEV TOOLS (--profile dev)                           ║
  # ╚═════════════════════════════════════════════════════════════════════════╝

  # ─── Mongo Express (DB Admin UI) ────────────────────────────────────────
  mongo-express:
    image: mongo-express:1.0
    container_name: alawael-mongo-express
    profiles: ["dev", "all"]
    <<: *restart-policy
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USER:-admin}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASSWORD}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD}@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_USER:-admin}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASSWORD:-admin123}
    ports:
      - "${MONGO_EXPRESS_PORT:-8081}:8081"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - alawael-net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

  # ─── MailHog (Email Testing) ─────────────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: alawael-mailhog
    profiles: ["dev", "all"]
    <<: *restart-policy
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"
      - "${MAILHOG_UI_PORT:-8025}:8025"
    networks:
      - alawael-net
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  # ─── Redis Commander (Redis Admin UI) ────────────────────────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: alawael-redis-commander
    profiles: ["dev", "all"]
    <<: *restart-policy
    environment:
      REDIS_HOSTS: "local:redis:6379:0:${REDIS_PASSWORD}"
    ports:
      - "${REDIS_COMMANDER_PORT:-8082}:8081"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - alawael-net
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
