###############################################################################
# Al-Awael ERP — Docker Compose الرئيسي لجميع خدمات المشروع
# نظام الأوائل ERP — Main Docker Compose for All Project Services
#
# ═══════════════════════════════════════════════════════════════════════════════
# الخدمات الأساسية (Core Infrastructure):
#   mongodb          : MongoDB 7.0            (port 27017)
#   redis            : Redis 7                (port 6379)
#   nats             : NATS Message Broker    (port 4222/8222)
#   minio            : MinIO Object Storage   (port 9000/9001)
#
# خدمات التطبيق (Application Services):
#   api-gateway      : API Gateway            (port 8080)
#   backend          : Main Express API       (port 3001)
#   frontend         : React SPA via Nginx    (port 3004)
#   graphql          : GraphQL Apollo Server  (port 4000)
#   nginx            : Reverse Proxy          (port 80/443)
#
# الوحدات التجارية (Business Modules):
#   finance-backend  : Finance Module         (port 3030)
#   scm-backend      : Supply Chain Backend   (port 3040)
#   scm-frontend     : Supply Chain Frontend  (port 3045)
#   dashboard-api    : Dashboard Backend      (port 3006)
#   dashboard-ui     : Dashboard Frontend     (port 3007)
#
# خدمات الذكاء الاصطناعي (AI Services):
#   intelligent-agent: AI Agent Service       (port 3020)
#   secretary-ai     : Smart Secretary Python (port 3050)
#   python-ml        : ML Prediction Service  (port 5001)
#
# خدمات التواصل (Communication):
#   whatsapp         : WhatsApp Service       (port 3010)
#   notification-svc : Notification Service   (port 3070)
#   communication-hub: Unified Messaging Hub  (port 3210)
#
# خدمات الخلفية (Background Workers):
#   queue-worker     : BullMQ Job Processor   (port 3080)
#   backup-service   : Automated Backups      (port 3090)
#   log-aggregator   : Centralized Logging    (port 3095)
#   report-worker    : PDF/Excel/CSV Reports  (port 3220)
#   webhook-worker   : Webhook Delivery       (port 3250)
#   scheduler        : Cron & Task Scheduling (port 3260)
#   file-processor   : Image/Doc Processing   (port 3270)
#
# خدمات الأعمال المتقدمة (Advanced Business Services):
#   payment-gateway  : Payment Processing     (port 3200)
#   audit-service    : Immutable Audit Trail  (port 3230)
#   search-service   : Elasticsearch Search   (port 3240)
#   saudi-gov-gateway: Saudi Gov Integrations (port 3280)
#   iot-gateway      : IoT & Biometric Hub    (port 3290)
#
# الخدمات المتخصصة — المرحلة 5 (Phase 5 Microservices):
#   hr-payroll-service          : HR & Payroll        (port 3300)
#   crm-service                 : CRM & Enrollment    (port 3310)
#   attendance-biometric-service: Biometric Attendance (port 3320)
#   fleet-transport-service     : Fleet & GPS          (port 3330)
#   document-management-service : DMS & e-Signatures   (port 3340)
#   workflow-engine-service     : Workflow & Approvals  (port 3350)
#   identity-service            : Auth & RBAC          (port 3360)
#   analytics-bi-service        : Analytics & BI       (port 3370)
#   e-learning-service          : LMS & Gamification   (port 3380)
#   parent-portal-service       : Parent Portal BFF    (port 3390)
#   rehabilitation-care-service : Rehab & Therapy      (port 3400)
#   fee-billing-service         : Fees & ZATCA         (port 3410)
#   multi-tenant-service        : Multi-Tenancy        (port 3420)
#   realtime-collaboration-svc  : WebSocket Gateway    (port 3430)
#   kitchen-laundry-facility-svc: Kitchen & Facility   (port 3440)
#
# المراقبة (Monitoring — profile: monitoring):
#   prometheus       : Metrics Collector      (port 9090)
#   grafana          : Dashboards             (port 3060)
#   loki             : Log Aggregation        (port 3100)
#   alertmanager     : Alert Manager          (port 9093)
#   node-exporter    : System Metrics         (port 9100)
#   redis-exporter   : Redis Metrics          (port 9121)
#   jaeger           : Distributed Tracing    (port 16686)
#
# بنية تحتية اختيارية (Optional — profile: optional):
#   postgres         : PostgreSQL 16          (port 5432)
#   elasticsearch    : Elasticsearch 8        (port 9200)
#   kibana           : Elasticsearch UI       (port 5601)
#
# أدوات التطوير (Dev Tools — profile: dev):
#   mongo-express    : MongoDB Admin UI       (port 8081)
#   mailhog          : Email Test Server      (port 1025/8025)
#   redis-commander  : Redis Admin UI         (port 8082)
#
# ═══════════════════════════════════════════════════════════════════════════════
# الاستخدام (Usage):
#   docker compose up -d                          # تشغيل الخدمات الأساسية
#   docker compose up backend frontend -d         # تشغيل خدمات محددة
#   docker compose --profile monitoring up -d     # تشغيل مع المراقبة
#   docker compose --profile optional up -d       # تشغيل مع الخدمات الاختيارية
#   docker compose --profile dev up -d            # تشغيل مع أدوات التطوير
#   docker compose --profile all up -d            # تشغيل الكل
#   docker compose logs -f backend                # متابعة سجلات الخلفية
#   docker compose down                           # إيقاف جميع الخدمات
###############################################################################

# ─── Shared Configuration ─────────────────────────────────────────────────────
x-common-env: &common-env
  NODE_ENV: ${NODE_ENV:-development}
  TZ: Asia/Riyadh
  LOG_LEVEL: ${LOG_LEVEL:-info}

x-healthcheck-defaults: &healthcheck-defaults
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 40s

x-restart-policy: &restart-policy
  restart: unless-stopped

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  alawael-net:
    driver: bridge
    name: alawael-network
  monitoring-net:
    driver: bridge
    name: monitoring-network

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  mongodb-data:
    name: alawael-mongodb-data
  redis-data:
    name: alawael-redis-data
  postgres-data:
    name: alawael-postgres-data
  elasticsearch-data:
    name: alawael-elasticsearch-data
  upload-data:
    name: alawael-uploads
  logs-data:
    name: alawael-logs
  prometheus-data:
    name: alawael-prometheus-data
  grafana-data:
    name: alawael-grafana-data
  alertmanager-data:
    name: alawael-alertmanager-data
  minio-data:
    name: alawael-minio-data
  nats-data:
    name: alawael-nats-data
  backup-data:
    name: alawael-backup-data
  file-processor-data:
    name: alawael-file-processor-data
  file-uploads:
    name: alawael-file-uploads
  report-exports:
    name: alawael-report-exports

# ═══════════════════════════════════════════════════════════════════════════════
#  الخدمات — SERVICES
# ═══════════════════════════════════════════════════════════════════════════════
services:

  # ╔═════════════════════════════════════════════════════════════════════════╗
  # ║  البنية التحتية الأساسية — CORE INFRASTRUCTURE                       ║
  # ╚═════════════════════════════════════════════════════════════════════════╝

  # ─── MongoDB 7.0 ─────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: alawael-mongodb
    <<: *restart-policy
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:?Set MONGO_ROOT_PASSWORD in .env}
      MONGO_INITDB_DATABASE: alawael_erp
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongodb-data:/data/db
      - ./docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d:ro
    networks:
      - alawael-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      <<: *healthcheck-defaults
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.5"

  # ─── Redis 7 ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: alawael-redis
    <<: *restart-policy
    command: >
      redis-server
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --appendonly yes
        --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - alawael-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      <<: *healthcheck-defaults
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # ─── NATS Message Broker ─────────────────────────────────────────────────
  nats:
    image: nats:2.10-alpine
    container_name: alawael-nats
    <<: *restart-policy
    command: >
      --jetstream
      --store_dir=/data
      --http_port=8222
      --max_payload=8MB
    ports:
      - "${NATS_PORT:-4222}:4222"
      - "${NATS_MONITOR_PORT:-8222}:8222"
    volumes:
      - nats-data:/data
    networks:
      - alawael-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8222/healthz"]
      <<: *healthcheck-defaults
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  # ─── MinIO Object Storage ───────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: alawael-minio
    <<: *restart-policy
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    networks:
      - alawael-net
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # ╔═════════════════════════════════════════════════════════════════════════╗
  # ║  خدمات التطبيق الأساسية — CORE APPLICATION SERVICES                  ║
  # ╚═════════════════════════════════════════════════════════════════════════╝

  # ─── API Gateway ─────────────────────────────────────────────────────────
  api-gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: alawael-gateway
    <<: *restart-policy
    environment:
      <<: *common-env
      GATEWAY_PORT: 8080
      AUTH_SERVICE_URL: http://backend:3001
      HR_SERVICE_URL: http://backend:3001
      FINANCE_SERVICE_URL: http://finance-backend:3030
      REPORTS_SERVICE_URL: http://backend:3001
      NOTIFICATIONS_SERVICE_URL: http://backend:3001
      SCM_SERVICE_URL: http://scm-backend:3040
      WHATSAPP_SERVICE_URL: http://whatsapp:3010
      INTELLIGENT_AGENT_URL: http://intelligent-agent:3020
      GRAPHQL_SERVICE_URL: http://graphql:4000
      PYTHON_ML_URL: http://python-ml:5001
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - alawael-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      <<: *healthcheck-defaults
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  # ─── Backend (Main API) ──────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        NODE_ENV: ${NODE_ENV:-development}
    container_name: alawael-backend
    <<: *restart-policy
    environment:
      <<: *common-env
      PORT: 3001
      MONGODB_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD}@mongodb:27017/alawael_erp?authSource=admin
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      REDIS_ENABLED: "true"
      DISABLE_REDIS: "false"
      USE_MOCK_DB: "false"
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      JWT_EXPIRE: ${JWT_EXPIRE:-7d}
      FRONTEND_URL: http://localhost:${FRONTEND_PORT:-3004}
      CORS_ORIGINS: http://localhost:3004,http://localhost:3000,http://localhost:8080
      ENABLE_AUTO_BACKUP: "true"
      GRAPHQL_URL: http://graphql:4000
      PYTHON_ML_URL: http://python-ml:5001
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    volumes:
      - upload-data:/app/uploads
      - logs-data:/app/logs
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - alawael-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3001/health"]
      <<: *healthcheck-defaults
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  # ─── Frontend (React SPA) ────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:8080/api}
    container_name: alawael-frontend
    <<: *restart-policy
    environment:
      REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:8080/api}
    ports:
      - "${FRONTEND_PORT:-3004}:80"
    depends_on:
      - api-gateway
    networks:
      - alawael-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80"]
      <<: *healthcheck-defaults
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

  # ─── GraphQL Server (Apollo) ─────────────────────────────────────────────
  graphql:
    build:
      context: ./graphql
      dockerfile: Dockerfile
    container_name: alawael-graphql
    <<: *restart-policy
    environment:
      <<: *common-env
      GRAPHQL_PORT: 4000
      MONGODB_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD}@mongodb:27017/alawael_erp?authSource=admin
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      GRAPHQL_PLAYGROUND: ${GRAPHQL_PLAYGROUND:-false}
      GRAPHQL_INTROSPECTION: ${GRAPHQL_INTROSPECTION:-false}
    ports:
      - "${GRAPHQL_PORT:-4000}:4000"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - alawael-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4000/.well-known/apollo/server-health"]
      <<: *healthcheck-defaults
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # ─── Nginx Reverse Proxy ────────────────────────────────────────────────
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: alawael-nginx
    <<: *restart-policy
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./certs:/etc/nginx/ssl:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - alawael-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      <<: *healthcheck-defaults
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  # ╔═════════════════════════════════════════════════════════════════════════╗
  # ║  الوحدات التجارية — BUSINESS MODULES                                 ║
  # ╚═════════════════════════════════════════════════════════════════════════╝

  # ─── Finance Module ──────────────────────────────────────────────────────
  finance-backend:
    build:
      context: .
      dockerfile: ./finance-module/Dockerfile.finance
    container_name: alawael-finance
    <<: *restart-policy
    environment:
      <<: *common-env
      PORT: 3030
      MONGODB_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD}@mongodb:27017/alawael_finance?authSource=admin
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      BACKEND_URL: http://backend:3001
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "${FINANCE_PORT:-3030}:3030"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - alawael-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3030/health"]
      <<: *healthcheck-defaults
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # ─── Supply Chain Backend ────────────────────────────────────────────────
  scm-backend:
    build:
      context: ./supply-chain-management/backend
      dockerfile: Dockerfile
    container_name: alawael-scm-backend
    <<: *restart-policy
    environment:
      <<: *common-env
      PORT: 3040
      MONGODB_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD}@mongodb:27017/alawael_scm?authSource=admin
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      BACKEND_URL: http://backend:3001
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "${SCM_BACKEND_PORT:-3040}:3040"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - alawael-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3040/health"]
      <<: *healthcheck-defaults
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # ─── Supply Chain Frontend ───────────────────────────────────────────────
  scm-frontend:
    build:
      context: ./supply-chain-management/frontend
      dockerfile: Dockerfile
    container_name: alawael-scm-frontend
    <<: *restart-policy
    environment:
      REACT_APP_API_URL: http://scm-backend:3040
    ports:
      - "${SCM_FRONTEND_PORT:-3045}:3000"
    depends_on:
      - scm-backend
    networks:
      - alawael-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      <<: *healthcheck-defaults
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

  # ─── Dashboard API ──────────────────────────────────────────────────────
  dashboard-api:
    build:
      context: .
      dockerfile: ./dashboard/server/Dockerfile
    container_name: alawael-dashboard-api
    <<: *restart-policy
    environment:
      <<: *common-env
      PORT: 3006
      DB_HOST: mongodb
      DB_PORT: 27017
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      BACKEND_URL: http://backend:3001
      CORS_ALLOWED_ORIGINS: http://localhost:3007,http://dashboard-ui
    ports:
      - "${DASHBOARD_API_PORT:-3006}:3006"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - alawael-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3006/health || exit 1"]
      <<: *healthcheck-defaults
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # ─── Dashboard UI ───────────────────────────────────────────────────────
  dashboard-ui:
    build:
      context: .
      dockerfile: ./dashboard/client/Dockerfile
    container_name: alawael-dashboard-ui
    <<: *restart-policy
    ports:
      - "${DASHBOARD_UI_PORT:-3007}:80"
    depends_on:
      - dashboard-api
    networks:
      - alawael-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80"]
      <<: *healthcheck-defaults
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

  # ╔═════════════════════════════════════════════════════════════════════════╗
  # ║  خدمات الذكاء الاصطناعي — AI / ML SERVICES                          ║
  # ╚═════════════════════════════════════════════════════════════════════════╝

  # ─── Intelligent Agent (Node.js) ─────────────────────────────────────────
  intelligent-agent:
    build:
      context: ./intelligent-agent
      dockerfile: Dockerfile
    container_name: alawael-intelligent-agent
    <<: *restart-policy
    environment:
      <<: *common-env
      PORT: 3020
      MONGODB_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD}@mongodb:27017/alawael_agent?authSource=admin
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      BACKEND_URL: http://backend:3001
    ports:
      - "${AGENT_PORT:-3020}:3020"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - alawael-net
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"

  # ─── Secretary AI (Python) ──────────────────────────────────────────────
  secretary-ai:
    build:
      context: ./secretary_ai
      dockerfile: Dockerfile
    container_name: alawael-secretary-ai
    <<: *restart-policy
    environment:
      PORT: 3050
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      BACKEND_URL: http://backend:3001
      MONGODB_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD}@mongodb:27017/alawael_secretary?authSource=admin
    ports:
      - "${SECRETARY_PORT:-3050}:3050"
    depends_on:
      - backend
    networks:
      - alawael-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3050/health || exit 1"]
      <<: *healthcheck-defaults
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "0.5"

  # ─── Python ML Service (Flask) ──────────────────────────────────────────
  python-ml:
    build:
      context: ./services/python-ml
      dockerfile: Dockerfile
    container_name: alawael-python-ml
    <<: *restart-policy
    environment:
      PYTHON_ML_PORT: 5001
      MONGODB_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD}@mongodb:27017/alawael_ml?authSource=admin
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      CORS_ORIGINS: http://backend:3001,http://localhost:3001
      BACKEND_URL: http://backend:3001
    ports:
      - "${PYTHON_ML_PORT:-5001}:5001"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - alawael-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5001/health || exit 1"]
      <<: *healthcheck-defaults
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

