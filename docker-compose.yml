# ═══════════════════════════════════════════════════════════════════════════════
# Al-Awael ERP — Production Docker Compose (Backend + MongoDB + Redis + NGINX)
# ═══════════════════════════════════════════════════════════════════════════════
#
# Services:
#   mongodb  : MongoDB 7.0          (port 27017)
#   redis    : Redis 7-alpine       (port 6379)
#   backend  : Express API (Node 20) (port 3001)
#   nginx    : Reverse proxy        (port 80 / 443)
#
# Usage:
#   cp backend/.env.example .env        # Fill in secrets
#   docker compose up -d --build        # Start all services
#   docker compose logs -f backend      # Tail backend logs
#   docker compose down                 # Stop all services
#   docker compose down -v              # Stop + remove volumes (⚠️ data loss)
#
# Health endpoints:
#   http://localhost/health
#   http://localhost/api/health
#   http://localhost:3001/health
# ═══════════════════════════════════════════════════════════════════════════════

# ─── Shared YAML Anchors ──────────────────────────────────────────────────────
x-healthcheck-defaults: &healthcheck-defaults
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 40s

x-restart-policy: &restart-policy
  restart: unless-stopped

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  alawael-net:
    driver: bridge
    name: alawael-network

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  mongodb-data:
    name: alawael-mongodb-prod-data
  redis-data:
    name: alawael-redis-prod-data
  uploads-data:
    name: alawael-uploads-prod-data
  logs-data:
    name: alawael-logs-prod-data

# ─── Services ─────────────────────────────────────────────────────────────────
services:

  # ═══════════════════════════════════════════════════════════════════════════
  # MongoDB 7.0 — Primary Database
  # ═══════════════════════════════════════════════════════════════════════════
  mongodb:
    image: mongo:7.0
    container_name: alawael-mongodb
    <<: *restart-policy
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:?Set MONGO_ROOT_PASSWORD in .env}
      MONGO_INITDB_DATABASE: alawael-erp
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    networks:
      - alawael-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      <<: *healthcheck-defaults
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.5"

  # ═══════════════════════════════════════════════════════════════════════════
  # Redis 7 — Cache & Session Store
  # ═══════════════════════════════════════════════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: alawael-redis
    <<: *restart-policy
    command: >
      redis-server
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - alawael-net
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      <<: *healthcheck-defaults
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # ═══════════════════════════════════════════════════════════════════════════
  # Backend — Express API (Node 20+)
  # ═══════════════════════════════════════════════════════════════════════════
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    container_name: alawael-backend
    <<: *restart-policy
    environment:
      NODE_ENV: production
      TZ: Asia/Riyadh
      PORT: 3001
      MONGODB_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD}@mongodb:27017/alawael-erp?authSource=admin&directConnection=true
      REDIS_URL: redis://redis:6379
      REDIS_ENABLED: "true"
      DISABLE_REDIS: "false"
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?Set JWT_REFRESH_SECRET in .env}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      SETUP_SECRET_KEY: ${SETUP_SECRET_KEY:?Set SETUP_SECRET_KEY in .env}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@alawael.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,https://alawael.org,https://alaweal.org}
      USE_MOCK_DB: "false"
    ports:
      - "3001:3001"
    volumes:
      - uploads-data:/app/uploads
      - logs-data:/app/logs
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - alawael-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3001/health || exit 1"]
      <<: *healthcheck-defaults
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  # ═══════════════════════════════════════════════════════════════════════════
  # NGINX — Reverse Proxy
  # ═══════════════════════════════════════════════════════════════════════════
  nginx:
    image: nginx:1.25-alpine
    container_name: alawael-nginx
    <<: *restart-policy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/backend-proxy.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/ssl:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - alawael-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/health || exit 1"]
      <<: *healthcheck-defaults
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
