    NotificationStatus:
      type: string
      enum: [PENDING, SENT, DELIVERED, FAILED, READ]

    NotificationChannel:
      type: string
      enum: [IN_APP, SMS, EMAIL, PUSH]

    Notification:
      type: object
      required: [id, userId, type, title, body, channel, status, sentAt, readAt, entityType, entityId, createdAt]
      properties:
        id:         { type: string }
        userId:     { type: string }
        type:       { $ref: '#/components/schemas/NotificationType' }
        title:      { type: string }
        body:       { type: string }
        channel:    { $ref: '#/components/schemas/NotificationChannel' }
        status:     { $ref: '#/components/schemas/NotificationStatus' }
        sentAt:     { type: string, format: date-time, nullable: true }
        readAt:     { type: string, format: date-time, nullable: true }
        entityType: { type: string, nullable: true }
        entityId:   { type: string, nullable: true }
        createdAt:  { type: string, format: date-time }

    NotificationListEnvelope:
      type: object
      required: [success, notifications, total]
      properties:
