    IncidentUpdateEnvelope:
      type: object
      required: [incident]
      properties:
        incident: { $ref: '#/components/schemas/QualityIncident' }
        message:  { type: string }

    # ─── Appointments ───────────────────────────────────────────────────────
    AppointmentStatus:
      type: string
      enum: [SCHEDULED, CONFIRMED, CANCELLED, COMPLETED, NO_SHOW]

    Appointment:
      type: object
      required:
        [id, beneficiaryId, branchId, therapistId, scheduledAt, durationMinutes, serviceType, status, cancellationReason, reminderSentAt, createdById, createdAt, updatedAt]
      properties:
        id:                 { type: string }
        beneficiaryId:      { type: string }
        branchId:           { type: string }
        therapistId:        { type: string }
        scheduledAt:        { type: string, format: date-time }
        durationMinutes:    { type: integer }
        serviceType:        { type: string }
        status:             { $ref: '#/components/schemas/AppointmentStatus' }
        cancellationReason: { type: string, nullable: true }
        reminderSentAt: { type: string, format: date-time, nullable: true }
        createdById: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        beneficiary:
          type: object
          required: [id, nameAr]
          properties:
            id:        { type: string }
            nameAr:    { type: string }
            nationalId: { type: string, nullable: true }
          nullable: true
        branch:
          type: object
          required: [id, nameAr]
          properties:
            id:     { type: string }
            nameAr: { type: string }
          nullable: true

    AppointmentCreate:
      type: object
      required: [beneficiaryId, therapistId, scheduledAt, durationMinutes, serviceType]
      properties:
        beneficiaryId:      { type: string }
        branchId:           { type: string }
        therapistId:        { type: string }
        scheduledAt:        { type: string, format: date-time }
        durationMinutes:    { type: integer }
        serviceType:        { type: string }
        status:             { $ref: '#/components/schemas/AppointmentStatus', nullable: true }
        notes:              { type: string, nullable: true }

    AppointmentReschedule:
      type: object
      required: [scheduledAt]
      properties:
        scheduledAt:     { type: string, format: date-time }
        durationMinutes: { type: integer, nullable: true }
        reason:          { type: string, nullable: true }

    AppointmentStatusUpdate:
      type: object
      required: [status]
      properties:
        status:            { $ref: '#/components/schemas/AppointmentStatus' }
        reason:            { type: string, nullable: true }
        cancellationReason: { type: string, nullable: true }

    AppointmentEnvelope:
      type: object
      required: [success, data]
      properties:
        success: { type: boolean }
        message: { type: string, nullable: true }
        data:    { $ref: '#/components/schemas/Appointment' }

    AppointmentListResponse:
      type: object
      required: [success, data, total, page, limit, pages]
      properties:
        success: { type: boolean }
        data:    { type: array, items: { $ref: '#/components/schemas/Appointment' } }
        total:   { type: integer }
        page:    { type: integer }
        limit:   { type: integer }
        pages:   { type: integer }

    NafathSigningStatus:
      type: string
      enum: [REQUESTED, PENDING, APPROVED, REJECTED, EXPIRED, CANCELLED, ERROR]

    NafathSigningCreate:
      type: object
      required: [documentType, documentId, documentHash, signerNationalId]
      properties:
        documentType:
          type: string
          enum: [IRP, Contract, Consent, Policy, Invoice, Generic]
        documentId:
          type: string
          description: Business identifier for the document being signed.
        documentHash:
          type: string
          minLength: 32
          description: Hex-encoded SHA-256 of the rendered document bytes.
        purpose:
          type: string
          enum: [sign, approve, acknowledge]
          default: sign
        signerNationalId:
          type: string
          pattern: '^[12]\\d{9}$'
          example: "1087654321"
        signerRole:
          type: string
          enum: [guardian, employee, manager, auditor]
          example: guardian

    NafathSigningRequestEnvelope:
      type: object
      properties:
        success:           { type: boolean }
        requestId:         { type: string }
        status:            { $ref: '#/components/schemas/NafathSigningStatus' }
        transactionId:     { type: string }
        randomNumber:      { type: string, example: "47" }
        expiresAt:         { type: string, format: date-time }
        mode:              { type: string, enum: [mock, live] }
        reused:            { type: boolean, description: 'true if fingerprint matched an in-flight request' }
        documentType:      { type: string }
        documentId:        { type: string }
        documentHash:      { type: string }
        signerNationalId:  { type: string }
        signerAttributes:
          type: object
          nullable: true
          properties:
            fullName:      { type: string }
            dateOfBirth:   { type: string }
            nationality:   { type: string }
        approvedAt:        { type: string, format: date-time, nullable: true }
        rejectedAt:        { type: string, format: date-time, nullable: true }
        cancelledAt:       { type: string, format: date-time, nullable: true }
        errorMessage:      { type: string, nullable: true }

    NafathVerifyResponse:
      type: object
      properties:
        success:   { type: boolean }
        verified:  { type: boolean }
        reason:    { type: string, nullable: true, example: NAFATH_JWS_DOCUMENT_HASH_MISMATCH }
        payload:   { type: object, nullable: true }
        header:    { type: object, nullable: true }

    NafathEvidencePackage:
      type: object
      properties:
        kind:        { type: string, example: nafath-signature-evidence }
        version:     { type: integer, example: 1 }
        generatedAt: { type: string, format: date-time }
        request:     { type: object }
        signer:      { type: object }
        transaction: { type: object }
        signature:
          type: object
          properties:
            jws:  { type: string }
            algo: { type: string }
        verification: { $ref: '#/components/schemas/NafathVerifyResponse' }
        auditContext: { type: object }

    YakeenVerifyRequest:
      type: object
      required: [nationalId]
      properties:
        nationalId:
          type: string
          pattern: '^[12]\\d{9}$'
        firstName_ar:       { type: string, description: Optional — enables name match. }
        dateOfBirthHijri:   { type: string, example: 1410/01/01 }
        context:
          type: string
          enum: [guardian_admission, employee_onboarding, beneficiary_consent_signer, nafath_signing, adhoc]
          default: adhoc
        contextEntityType:  { type: string, nullable: true }
        contextEntityId:    { type: string, nullable: true }
        forceRefresh:
          type: boolean
          default: false
          description: Bypass the 24h cache and hit the adapter again.

    YakeenVerifyResponse:
      type: object
      properties:
        success:          { type: boolean }
        cached:           { type: boolean }
        verificationId:   { type: string, nullable: true }
        result:           { type: string, enum: [match, mismatch, not_found, unknown] }
        attributes:       { $ref: '#/components/schemas/YakeenAttributes' }
        mode:             { type: string, enum: [mock, live] }
        message:          { type: string, nullable: true }
        circuitOpen:      { type: boolean, nullable: true }

    YakeenAttributes:
      type: object
      properties:
        fullName_ar:            { type: string }
        firstName_ar:           { type: string }
        lastName_ar:            { type: string }
        gender:                 { type: string, enum: [M, F] }
        dateOfBirthHijri:       { type: string }
        dateOfBirthGregorian:   { type: string, format: date }
        nationality:            { type: string, example: SAU }
        isAlive:                { type: boolean }

    YakeenVerificationRow:
      allOf:
        - $ref: '#/components/schemas/YakeenVerifyResponse'
        - type: object
          properties:
            _id:                { type: string }
            lastFour:           { type: string, example: "4321" }
            context:            { type: string }
            contextEntityType:  { type: string, nullable: true }
            contextEntityId:    { type: string, nullable: true }
            createdAt:          { type: string, format: date-time }

    WaselShortCodeResponse:
      type: object
      properties:
        success:           { type: boolean }
        status:            { type: string, enum: [match, not_found, invalid_format, unknown] }
        message:           { type: string, nullable: true }
        mode:              { type: string, enum: [mock, live] }
        address:           { type: string, nullable: true }
        city:              { type: string, nullable: true }
        district:          { type: string, nullable: true }
        postalCode:        { type: string, nullable: true }
        buildingNumber:    { type: string, nullable: true }
        additionalNumber:  { type: string, nullable: true }
        geo:
          type: object
          nullable: true
          properties:
            lat: { type: number }
            lng: { type: number }
        isDeliverable:     { type: boolean, nullable: true }

    WaselAddress:
      type: object
      properties:
        shortCode:        { type: string }
        address:          { type: string }
        city:             { type: string }
        district:         { type: string }
        postalCode:       { type: string }
        buildingNumber:   { type: string }
        additionalNumber: { type: string }

    NphiesWebhookPayload:
      type: object
      required: [claimReference, status]
      properties:
        claimReference:   { type: string, example: NPHIES-REF-99 }
        status:
          type: string
          enum: [APPROVED, ACCEPTED, REJECTED, DENIED, PENDING, PENDING_REVIEW, IN_REVIEW]
        reason:           { type: string, nullable: true }
        message:          { type: string, nullable: true }
        approvedAmount:   { type: number, nullable: true }
        remainingBalance: { type: number, nullable: true }
        mode:             { type: string, enum: [mock, live] }

    IntegrationHealthSnapshot:
      type: object
      properties:
        ok: { type: boolean }
        snapshot:
          type: object
          properties:
            generatedAt: { type: string, format: date-time }
            durationMs:  { type: integer }
            overall:
              type: string
              enum: [healthy, degraded, critical]
            headline:
              type: object
              properties:
                adaptersTotal:            { type: integer }
                adaptersLive:             { type: integer }
                adaptersMock:             { type: integer }
                adaptersUnconfiguredLive: { type: integer }
                openCircuits:             { type: integer }
                parkedNet:                { type: integer, description: 'parked - resolved - discarded' }
                dlqReplaySuccessRate:     { type: number, nullable: true, minimum: 0, maximum: 1 }
                idempotencyHitRate:       { type: number, nullable: true, minimum: 0, maximum: 1 }
            adapters:
              type: array
              items:
                type: object
                properties:
                  name:              { type: string }
                  mode:              { type: string, enum: [mock, live, unknown] }
                  configured:        { type: boolean }
                  missing:           { type: array, items: { type: string } }
                  circuitOpen:       { type: boolean }
                  circuitFailures:   { type: integer }
                  circuitCooldownMs: { type: integer }
                  error:             { type: string, nullable: true }
            dlq:
              type: object
              properties:
                totals:
                  type: object
                  properties:
                    parked:         { type: integer }
                    resolved:       { type: integer }
                    replay_success: { type: integer }
                    replay_fail:    { type: integer }
                    discarded:      { type: integer }
                byIntegration:
                  type: object
                  additionalProperties:
                    type: object
                    properties:
                      parked:         { type: integer }
                      resolved:       { type: integer }
                      replay_success: { type: integer }
                      replay_fail:    { type: integer }
                      discarded:      { type: integer }
            idempotency:
              type: object
              properties:
                totals:
                  type: object
                  properties:
                    hit:             { type: integer }
                    miss:            { type: integer }
                    pending_reject:  { type: integer }
                    invalid_key:     { type: integer }
                topRoutes:
                  type: array
                  items:
                    type: object
                    properties:
                      route:          { type: string }
                      hit:            { type: integer }
                      miss:           { type: integer }
                      pending_reject: { type: integer }
                      invalid_key:    { type: integer }

    DlqEntry:
      type: object
      properties:
        id:
          type: string
          description: UUID v4 generated at park time.
        status:          { type: string, enum: [parked, replaying, resolved, discarded] }
        createdAt:       { type: integer, description: Unix ms }
        updatedAt:       { type: integer, description: Unix ms }
        integration:     { type: string, example: nafath }
        operation:       { type: string, nullable: true, example: sign }
        method:          { type: string, nullable: true, example: POST }
        endpoint:        { type: string, nullable: true }
        idempotencyKey:  { type: string, nullable: true }
        correlationId:   { type: string, nullable: true }
        attempts:        { type: integer }
        replayCount:     { type: integer }
        lastError:
          type: object
          nullable: true
          properties:
            message: { type: string }
            code:    { type: string, nullable: true }
            status:  { type: integer, nullable: true }
            name:    { type: string, nullable: true }
        payload:
          type: object
          nullable: true
          description: Original request body with PII redacted.
        headers:
          type: object
          nullable: true
          description: Original request headers with Authorization + secrets redacted.
        resolvedAt:      { type: integer, nullable: true }
        discardedAt:     { type: integer, nullable: true }
        discardReason:   { type: string, nullable: true }
        meta:
          type: object
          description: Tenant / branch / user tags attached by the caller.

    PiiAccessRecord:
      type: object
      properties:
        _id:        { type: string }
        eventType:  { type: string, enum: ['pii.access.read'] }
        userId:     { type: string, description: ObjectId of the viewer. }
        action:     { type: string, example: read }
        method:     { type: string, example: GET }
        path:       { type: string, example: /api/admin/beneficiaries/65f1... }
        ip:         { type: string, nullable: true }
        userAgent:  { type: string, nullable: true }
        statusCode: { type: integer, example: 200 }
        metadata:
          type: object
          description: Caller-supplied tag set + the auto-derived target reference.
          properties:
            targetType: { type: string, example: Beneficiary }
            targetId:   { type: string }
            tenantId:   { type: string, nullable: true }
            branchId:   { type: string, nullable: true }
        createdAt:  { type: string, format: date-time }

    PiiAccessListResponse:
      type: object
      properties:
        success: { type: boolean }
        page:    { type: integer }
        limit:   { type: integer }
        total:   { type: integer }
        data:
          type: array
          items: { $ref: '#/components/schemas/PiiAccessRecord' }

    PiiAccessViewer:
      type: object
      properties:
        userId:    { type: string }
        count:     { type: integer, description: Reads attributed to this viewer in the window. }
        firstSeen: { type: string, format: date-time }
        lastSeen:  { type: string, format: date-time }

    PiiAccessByTargetResponse:
      type: object
      properties:
        success:        { type: boolean }
        target:
          type: object
          properties:
            type: { type: string }
            id:   { type: string }
        windowDays:     { type: integer }
        totalAccesses:  { type: integer }
        uniqueViewers:  { type: integer }
        viewers:
          type: array
          description: Distinct viewers, sorted by `count` descending.
          items: { $ref: '#/components/schemas/PiiAccessViewer' }
        recent:
          type: array
          description: Up to 50 most-recent raw rows for quick eyeballing.
          items: { $ref: '#/components/schemas/PiiAccessRecord' }

    DiagnosisCode:
      type: object
      properties:
        code:        { type: string, example: F84.0, description: ICD-10 code }
        description: { type: string, example: 'Childhood autism' }

    CptOverride:
      type: object
      description: |
        Forces a specific CPT mapping for this bridge run, bypassing the
        registry. Use sparingly — the registry is the auditable source of
        truth for session-type → CPT mapping.
      properties:
        code:        { type: string, example: 97530 }
        description: { type: string, example: Therapeutic activities }
        specialty:   { type: string, example: occupational_therapy }

    SessionToClaimRequest:
      type: object
      properties:
        unitPrice:
          type: number
          description: Override the tariff resolver. Plain currency value (e.g. 350.00).
        diagnosis:
          type: array
          minItems: 1
          items: { $ref: '#/components/schemas/DiagnosisCode' }
        cptOverride: { $ref: '#/components/schemas/CptOverride' }
        dryRun:
          type: boolean
          default: false

    SessionToClaimResponse:
      type: object
      properties:
        ok: { type: boolean, example: true }
        claim:
          type: object
          description: |
            The persisted (or, in dry-run, prospective) NphiesClaim draft.
            Schema overlaps `NphiesClaim` collection — refer to the model
            in `backend/models/NphiesClaim.js` for the canonical shape.
          properties:
            _id:           { type: string }
            sessionId:     { type: string }
            beneficiaryId: { type: string }
            cptCode:       { type: string, example: 97530 }
            unitPrice:     { type: number }
            diagnosis:
              type: array
              items: { $ref: '#/components/schemas/DiagnosisCode' }
            status:        { type: string, example: DRAFT }
        warnings:
          type: array
          description: Non-blocking findings the UI should highlight.
          items: { type: string }
        dryRun:           { type: boolean }

    SessionToClaimErrorResponse:
      type: object
      properties:
        ok:       { type: boolean, example: false }
        errors:
          type: array
          items: { type: string }
        warnings:
          type: array
          items: { type: string }

    BulkCreateClaimsRequest:
      type: object
      required: [from, to]
      properties:
        from:
          type: string
          format: date
          description: Inclusive lower bound on `serviceDate`.
        to:
          type: string
          format: date
          description: Inclusive upper bound (entire day).
        dryRun:
          type: boolean
          default: false
        maxBatch:
          type: integer
          maximum: 500
          description: Hard-cap override (default 500).

    BulkCreateClaimEntry:
      type: object
      properties:
        sessionId: { type: string }
        claimId:   { type: string, nullable: true, description: Null in dry-run mode. }

    BulkCreateClaimSkip:
      type: object
      properties:
        sessionId: { type: string }
        reason:
          type: string
          example: already_has_claim

    BulkCreateClaimFailure:
      type: object
      properties:
        sessionId: { type: string }
        errors:
          type: array
          items: { type: string }
        warnings:
          type: array
          items: { type: string }

    BulkCreateClaimsResponse:
      type: object
      properties:
        ok:             { type: boolean }
        candidateCount: { type: integer, description: Sessions found in the window. }
        created:
          type: array
          items: { $ref: '#/components/schemas/BulkCreateClaimEntry' }
        skipped:
          type: array
          items: { $ref: '#/components/schemas/BulkCreateClaimSkip' }
        failed:
          type: array
          items: { $ref: '#/components/schemas/BulkCreateClaimFailure' }
        durationMs:     { type: integer }
        dryRun:         { type: boolean }

    # ─── W211 — Interop Operations Center ─────────────────────────────────
    IntegrationAlert:
      type: object
      description: |
        Operator-visible alert fired by the integrationAlertEngine. One
        `open` alert per (integration, ruleCode); the engine bumps
        `observedCount` and `lastObservedAt` on re-fire instead of
        inserting duplicates.
      properties:
        _id:              { type: string }
        integration:
          type: string
          enum: [gosi, scfhs, absher, qiwa, nafath, fatoora, muqeem, nphies, wasel, balady, system]
        ruleCode:
          type: string
          enum:
            - CIRCUIT_OPEN
            - DLQ_BUILDUP
            - UNCONFIGURED_LIVE
            - HIGH_FAILURE_RATE
            - RATE_LIMIT_SATURATION
            - SCHEDULER_STALLED
        severity:         { type: string, enum: [info, warning, critical] }
        status:           { type: string, enum: [open, acknowledged, resolved] }
        title_ar:         { type: string }
        title_en:         { type: string }
        observed:         { type: object, description: Rule-specific snapshot at fire time. }
        threshold:        { type: object, description: Rule-specific threshold that was crossed. }
        firstObservedAt:  { type: string, format: date-time }
        lastObservedAt:   { type: string, format: date-time }
        acknowledgedAt:   { type: string, format: date-time, nullable: true }
        acknowledgedBy:   { type: string, nullable: true }
        resolvedAt:       { type: string, format: date-time, nullable: true }
        resolvedBy:       { type: string, nullable: true }
        resolvedReason:   { type: string, enum: [auto, manual], nullable: true }
        observedCount:
          type: integer
          description: How many evaluation ticks observed this rule while the alert was open.

    IntegrationTrendSample:
      type: object
      description: |
        One 5-minute bucket-aligned snapshot of a gov-adapter. Counter
        fields are PROCESS-CUMULATIVE — diff adjacent samples for the
        per-interval rate (Prometheus rate() semantics). Negative deltas
        indicate a process restart and should be treated as no-data.
      properties:
        capturedAt:                { type: string, format: date-time }
        mode:                      { type: string, enum: [live, mock, unknown] }
        configured:                { type: boolean }
        circuitOpen:               { type: boolean }
        circuitFailures:           { type: integer }
        callsSuccessCumul:         { type: integer }
        callsFailedCumul:          { type: integer }
        callsRateLimitedCumul:     { type: integer }
        latencyP50Ms:              { type: number, nullable: true }
        latencyP95Ms:              { type: number, nullable: true }
        latencyP99Ms:              { type: number, nullable: true }
        dlqParkedNet:              { type: integer }
        rateLimitUtilizationPct:   { type: number, nullable: true }
        # Server-computed per-bucket deltas (null on first sample of window)
        deltaSuccess:              { type: integer, nullable: true }
        deltaFailed:               { type: integer, nullable: true }
        deltaRateLimited:          { type: integer, nullable: true }
        deltaDlqParked:            { type: integer, nullable: true }

    IntegrationTrendSeries:
      type: object
      properties:
        ok:          { type: boolean }
        integration: { type: string }
        since:       { type: string, format: date-time }
        until:       { type: string, format: date-time }
        count:       { type: integer }
        series:
          type: array
          items: { $ref: '#/components/schemas/IntegrationTrendSample' }

    # ─── Branches ────────────────────────────────────────────────────────────
    Branch:
      type: object
      required: [id, code, name_ar, name_en]
      properties:
        _id:        { type: string }
        id:         { type: string }
        code:       { type: string }
        name_ar:    { type: string }
        name_en:    { type: string }
        short_name: { type: string, nullable: true }
        type:
          type: string
          enum: [hq, main, branch, satellite]
        status:
          type: string
          enum: [active, inactive, maintenance, opening_soon]
        is_hq:      { type: boolean }
        location:   { type: object, nullable: true }
        capacity:   { type: object, nullable: true }
        staff_count: { type: integer }
        manager_id:  { type: string, nullable: true }
        manager_name: { type: string, nullable: true }
        phone:      { type: string, nullable: true }
        email:      { type: string, nullable: true }
        createdAt:  { type: string, format: date-time }
        updatedAt:  { type: string, format: date-time }

    BranchListEnvelope:
      type: object
      required: [success, items, pagination]
      properties:
        success: { type: boolean }
        items:
          type: array
          items: { $ref: '#/components/schemas/Branch' }
        pagination:
          type: object
          required: [page, limit, total, pages]
          properties:
            page:  { type: integer }
            limit: { type: integer }
            total: { type: integer }
            pages: { type: integer }

    BranchDetailEnvelope:
      type: object
      required: [success, data]
      properties:
        success: { type: boolean }
        data:    { $ref: '#/components/schemas/Branch' }

    # ─── Complaints ───────────────────────────────────────────────────────────
    ComplaintSource:
      type: string
      enum: [employee, student, customer, parent, other]

    ComplaintStatus:
      type: string
      enum: [new, under_review, in_progress, escalated, resolved, closed, rejected]

    ComplaintPriority:
      type: string
      enum: [critical, high, medium, low]

    Complaint:
      type: object
      required: [id, type, source, category, subject, description, status, createdAt, updatedAt]
      properties:
        _id:           { type: string }
        id:            { type: string }
        complaintId:   { type: string }
        type:          { type: string, enum: [complaint, suggestion, grievance, feedback] }
        source:        { $ref: '#/components/schemas/ComplaintSource' }
        category:      { type: string }
        subject:       { type: string }
        description:   { type: string }
        priority:      { $ref: '#/components/schemas/ComplaintPriority' }
        status:        { $ref: '#/components/schemas/ComplaintStatus' }
        submittedBy:   { type: string, nullable: true }
        submitterName: { type: string, nullable: true }
        submitterEmail: { type: string, nullable: true }
        submitterPhone: { type: string, nullable: true }
        assignedTo:    { type: string, nullable: true }
        department:    { type: string, nullable: true }
        resolution:    { type: string, nullable: true }
        resolvedAt:    { type: string, format: date-time, nullable: true }
        rating:        { type: integer, nullable: true }
        isAnonymous:   { type: boolean }
        branchId:      { type: string, nullable: true }
        beneficiaryId: { type: string, nullable: true }
        createdBy:     { type: string, nullable: true }
        createdAt:     { type: string, format: date-time }
        updatedAt:     { type: string, format: date-time }

    ComplaintListEnvelope:
      type: object
      required: [success, data, pagination]
      properties:
        success: { type: boolean }
        data:
          type: array
          items: { $ref: '#/components/schemas/Complaint' }
        pagination:
          type: object
          required: [page, limit, total]
          properties:
            page:  { type: integer }
            limit: { type: integer }
            total: { type: integer }

    ComplaintDetailEnvelope:
      type: object
      required: [success, data]
      properties:
        success: { type: boolean }
        data:    { $ref: '#/components/schemas/Complaint' }

    ComplaintCreate:
      type: object
      required: [source, category, description]
      properties:
        source:
          type: string
          enum: [FAMILY, STAFF, EXTERNAL, ANONYMOUS]
        category:      { type: string }
        description:   { type: string }
        beneficiaryId: { type: string, nullable: true }
        type:          { type: string, enum: [complaint, suggestion, grievance, feedback], nullable: true }

    ComplaintCreateEnvelope:
      type: object
      required: [success, data]
      properties:
        success: { type: boolean }
        data:    { $ref: '#/components/schemas/Complaint' }
        message: { type: string }

    ComplaintUpdate:
      type: object
      required: [status]
      properties:
        status:        { $ref: '#/components/schemas/ComplaintStatus' }
        resolution:    { type: string, nullable: true }
        assignedTo:    { type: string, nullable: true }
        priority:      { $ref: '#/components/schemas/ComplaintPriority', nullable: true }

    ComplaintUpdateEnvelope:
      type: object
      required: [success, data]
      properties:
        success: { type: boolean }
        data:    { $ref: '#/components/schemas/Complaint' }
        message: { type: string }

    # ─── Vehicles ─────────────────────────────────────────────────────────────
    VehicleType:
      type: string
      enum: [van, minibus, bus, car, wheelchair_van]

    VehicleStatus:
      type: string
      enum: [active, maintenance, out_of_service, retired]

    Vehicle:
      type: object
      required: [id, license_plate, vehicle_type, status]
      properties:
        _id:                  { type: string }
        id:                   { type: string }
        vehicle_number:       { type: string, nullable: true }
        license_plate:        { type: string }
        branch_id:
          oneOf:
            - { type: string }
            - { $ref: '#/components/schemas/Branch' }
        make:                 { type: string, nullable: true }
        model:                { type: string, nullable: true }
        year:                 { type: integer, nullable: true }
        color:                { type: string, nullable: true }
        vehicle_type:         { $ref: '#/components/schemas/VehicleType' }
        capacity:             { type: integer }
        wheelchair_accessible: { type: boolean }
        wheelchair_capacity:  { type: integer }
        status:               { $ref: '#/components/schemas/VehicleStatus' }
        registration_number:  { type: string, nullable: true }
        registration_expiry:  { type: string, format: date-time, nullable: true }
        insurance_number:     { type: string, nullable: true }
        insurance_expiry:     { type: string, format: date-time, nullable: true }
        inspection_expiry:    { type: string, format: date-time, nullable: true }
        current_driver_id:
          oneOf:
            - { type: string }
            - { type: object, nullable: true }
