  /api/v1/wasel/address/health:
    get:
      tags: [Wasel Address]
      summary: Adapter health + mode snapshot
      responses:
        '200':
          description: Connection + config snapshot.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  connection:
                    type: object
                    properties:
                      ok:        { type: boolean }
                      mode:      { type: string, enum: [mock, live] }
                      latencyMs: { type: integer }
                  config:
                    type: object

  # ─── NPHIES webhook ─────────────────────────────────────────────────────
  /api/v1/webhooks/nphies:
    post:
      tags: [NPHIES Webhooks]
      summary: Async claim-status callback receiver
      description: |
        Provider-to-provider endpoint. Secured via HMAC — not JWT.
        Returns 200 on both "matched" and "unknown claimReference" so NPHIES
        doesn't retry. 401 on signature mismatch.
      security:
        - hmacSignature: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/NphiesWebhookPayload' }
      responses:
        '200':
          description: Accepted (matched or not).
          content:
            application/json:
              schema:
                type: object
                properties:
                  accepted:        { type: boolean }
                  matched:         { type: boolean }
                  claimId:         { type: string, nullable: true }
                  claimReference:  { type: string }
                  status:          { type: string, nullable: true }
        '401':
          description: Signature missing / mismatch.

  # ─── Admin Ops — DLQ ─────────────────────────────────────────────────────
  /api/v1/admin/ops/integration-health:
    get:
      tags: [Admin Ops — DLQ]
      summary: Mission-control snapshot of the entire integration subsystem
      description: |
        Aggregates adapter configs, circuit-breaker state, DLQ counters,
        and idempotency counters into a single payload that powers the
        operator dashboard. Cheap enough for 10s polling — no external
        network calls, no DB hits.
      responses:
        '200':
          description: Current integration subsystem state.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/IntegrationHealthSnapshot' }

  /api/v1/admin/ops/dlq:
    get:
      tags: [Admin Ops — DLQ]
      summary: List Dead Letter Queue entries
      parameters:
        - name: integration
          in: query
          schema: { type: string, example: nafath }
        - name: status
          in: query
          schema: { type: string, enum: [parked, replaying, resolved, discarded] }
        - name: limit
          in: query
          schema: { type: integer, default: 100, maximum: 500 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        '200':
          description: Paginated list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:    { type: boolean }
                  total: { type: integer }
                  rows:
                    type: array
                    items: { $ref: '#/components/schemas/DlqEntry' }

  /api/v1/admin/ops/dlq/{id}:
    get:
      tags: [Admin Ops — DLQ]
      summary: Inspect a single DLQ entry
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        '200':
          description: Full entry.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:    { type: boolean }
                  entry: { $ref: '#/components/schemas/DlqEntry' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/admin/ops/dlq/{id}/replay:
    post:
      tags: [Admin Ops — DLQ]
      summary: Replay a parked entry via its registered adapter
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        '200':
          description: Replay outcome.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:      { type: boolean }
                  outcome: { type: object }
        '404': { $ref: '#/components/responses/NotFound' }
        '501':
          description: No replay adapter registered for this integration.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:          { type: boolean, example: false }
                  error:       { type: string, example: NO_REPLAY_ADAPTER }
                  integration: { type: string }
                  message:     { type: string }

  /api/v1/admin/ops/dlq/{id}/discard:
    post:
      tags: [Admin Ops — DLQ]
      summary: Mark an entry as discarded (operator decision)
      parameters:
        - $ref: '#/components/parameters/PathId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string, example: duplicate-handled-by-support }
      responses:
        '200':
          description: Entry updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:    { type: boolean }
                  entry: { $ref: '#/components/schemas/DlqEntry' }

  # ─── W211 — Interop Operations Center: trends + alerts ──────────────────
  /api/v1/admin/ops/integration-health/trends/{integration}:
    get:
      tags: [Admin Ops — Interop Center]
      summary: Time-series trend samples for one Saudi gov-adapter
      description: |
        Returns up to `limit` IntegrationTrendSample rows (5-min buckets)
        between `since` and `until`, plus server-side per-bucket deltas
        for call counters and DLQ parking. Process restarts are detected
        via negative raw deltas and clamped to 0 (Prometheus resets()
        semantics). Retention: 30 days.
      parameters:
        - name: integration
          in: path
          required: true
          schema:
            type: string
            enum: [gosi, scfhs, absher, qiwa, nafath, fatoora, muqeem, nphies, wasel, balady]
        - name: since
          in: query
          description: |
            ISO timestamp OR shorthand `30m` / `24h` / `7d` / `30d`.
            Default: 24h ago.
          schema: { type: string, example: 24h }
        - name: until
          in: query
          schema: { type: string, format: date-time }
        - name: limit
          in: query
          schema: { type: integer, default: 288, maximum: 2000 }
      responses:
        '200':
          description: Time series + computed deltas.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/IntegrationTrendSeries' }

  /api/v1/admin/ops/integration-health/sample:
    post:
      tags: [Admin Ops — Interop Center]
      summary: Operator-triggered ad-hoc trend sample capture
      description: |
        Inserts one IntegrationTrendSample per adapter immediately,
        outside the scheduler tick. Useful for surfacing the very
        latest counters in the UI after a fix. Source is stamped
        `manual` for filtering.
      responses:
        '200':
          description: Capture summary.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:      { type: boolean }
                  summary:
                    type: object
                    properties:
                      capturedAt: { type: string, format: date-time }
                      written:    { type: integer }
                      deduped:    { type: integer }
                      errors:     { type: integer }

  /api/v1/admin/ops/integration-health/alerts:
    get:
      tags: [Admin Ops — Interop Center]
      summary: List integration alerts
      description: |
        Returns alerts in lifecycle `open` / `acknowledged` / `resolved`,
        sorted by `lastObservedAt` descending. Retention: 90 days.
      parameters:
        - name: status
          in: query
          schema: { type: string, enum: [open, acknowledged, resolved] }
        - name: integration
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 100, maximum: 500 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        '200':
          description: Paginated list of alerts.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:    { type: boolean }
                  total: { type: integer }
                  limit: { type: integer }
                  offset: { type: integer }
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/IntegrationAlert' }

  /api/v1/admin/ops/integration-health/alerts/{id}/ack:
    post:
      tags: [Admin Ops — Interop Center]
      summary: Acknowledge an open alert
      description: |
        Transitions an `open` alert to `acknowledged`. The alert remains
        active (eligible for auto-resolve) until either resolved manually
        or the engine's auto-resolve window (15 min of non-firing) elapses.
        Returns 404 if the alert is not currently `open`.
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        '200':
          description: Updated alert.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:    { type: boolean }
                  alert: { $ref: '#/components/schemas/IntegrationAlert' }
        '404':
          description: Alert not found OR no longer open.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:    { type: boolean, example: false }
                  error: { type: string, example: NOT_FOUND_OR_NOT_OPEN }

  /api/v1/admin/ops/integration-health/alerts/{id}/resolve:
    post:
      tags: [Admin Ops — Interop Center]
      summary: Manually resolve an alert
      description: |
        Transitions an `open` OR `acknowledged` alert to `resolved` with
        `resolvedReason='manual'`. Already-resolved alerts return 404.
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        '200':
          description: Updated alert.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:    { type: boolean }
                  alert: { $ref: '#/components/schemas/IntegrationAlert' }
        '404':
          description: Alert not found OR already resolved.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:    { type: boolean, example: false }
                  error: { type: string, example: NOT_FOUND_OR_RESOLVED }

  /api/v1/admin/ops/integration-health/alerts/evaluate:
    post:
      tags: [Admin Ops — Interop Center]
      summary: Trigger the alert engine immediately
      description: |
        Runs one alert-engine evaluation outside the scheduler tick. Useful
        for confirming alert state right after a fix is deployed, and in
        integration tests. Returns the evaluation summary.
      responses:
        '200':
          description: Engine summary.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:      { type: boolean }
                  summary:
                    type: object
                    properties:
                      ranAt:        { type: string, format: date-time }
                      evaluated:    { type: integer }
                      fired:        { type: integer }
                      opened:       { type: integer }
                      refreshed:    { type: integer }
                      autoResolved: { type: integer }
                      errors:       { type: integer }

  # ─── Phase 21 — Session→Claim Bridge ────────────────────────────────────
  /api/admin/therapy-sessions/{id}/create-claim:
    post:
      tags: [Session→Claim Bridge]
      summary: Build a draft NPHIES claim from a completed therapy session
      description: |
        Resolves the session's CPT code from the Arabic session-type
        registry, looks up the unit price in `InsuranceTariff`, and persists
        a draft `NphiesClaim` linked to the session. The draft is NOT
        submitted to NPHIES — that's a separate step at
        `POST /api/admin/nphies-claims/:id/submit`.

        Errors (`result.errors`) block creation outright (e.g. missing
        diagnosis, no insurance, no tariff). Warnings (`result.warnings`)
        surface for the billing UI to highlight but do not block.

        `dryRun: true` returns the same response shape with `claim` filled
        in but nothing written to Mongo — useful for previewing what the
        bridge will produce before committing.
      parameters:
        - $ref: '#/components/parameters/PathId'
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SessionToClaimRequest' }
      responses:
        '201':
          description: Draft claim persisted.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SessionToClaimResponse' }
        '200':
          description: Dry-run preview — same shape, no DB write.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SessionToClaimResponse' }
        '400':
          description: Invalid session ID.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422':
          description: |
            Bridge ran but produced blocking errors (missing diagnosis,
            uninsured beneficiary, no tariff for the resolved CPT, etc.).
            Body shape is the same as 201 except `ok: false` and warnings
            may also be present.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SessionToClaimErrorResponse' }

  /api/admin/therapy-sessions/bulk-create-claims:
    post:
      tags: [Session→Claim Bridge]
      summary: Month-end batch — bridge every COMPLETED session in a window
      description: |
        Finds COMPLETED sessions in the given date window, branch-scoped
        for non-HQ users. For each session without an existing `NphiesClaim`
        runs the same bridge as the per-session endpoint. Returns a
        partition-honest report with `created` / `skipped` / `failed`
        arrays so the caller can act on each bucket.

        Hard cap of 500 sessions per call — use multiple windows for
        larger ranges. Atomic per session (one failure does not roll back
        successful neighbours) and idempotent (re-running with the same
        window is a no-op for sessions already bridged).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BulkCreateClaimsRequest' }
      responses:
        '201':
          description: Bulk run completed (real, sessions written).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BulkCreateClaimsResponse' }
        '200':
          description: Dry-run preview — same shape, no DB writes.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BulkCreateClaimsResponse' }
        '400':
          description: '`from` or `to` missing, or hard cap exceeded.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  # ─── PDPL Article 13 — PII access audit ─────────────────────────────────
  /api/admin/pii-access-audit:
    get:
      tags: [PDPL Audit]
      summary: List PII access events (filterable feed)
      description: |
        Returns the `pii.access.read` AuditLog rows authored by
        `middleware/piiAccess.middleware.js` on every successful 2xx read of
        a sensitive resource. DPO + compliance can filter by target, viewer,
        and date range to satisfy a Subject Access Request.

        The middleware writes one row per successful disclosure; failed reads
        (4xx/5xx) are never logged here — they are not disclosures.
      parameters:
        - name: targetType
          in: query
          description: 'Resource model name (e.g. `Beneficiary`, `Invoice`, `NphiesClaim`).'
          schema: { type: string }
        - name: targetId
          in: query
          description: ObjectId of the viewed resource.
          schema: { type: string }
        - name: userId
          in: query
          description: Filter to a specific viewer.
          schema: { type: string }
        - name: fromDate
          in: query
          schema: { type: string, format: date }
        - name: toDate
          in: query
          schema: { type: string, format: date }
        - name: page
          in: query
          schema: { type: integer, default: 1, minimum: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 50, maximum: 500 }
      responses:
        '200':
          description: Paginated feed of PII read events.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PiiAccessListResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: Caller lacks DPO / compliance / admin role.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /api/admin/pii-access-audit/by-target:
    get:
      tags: [PDPL Audit]
      summary: 'Aggregator — "who viewed this record?" lookup'
      description: |
        Returns distinct viewers + per-viewer access counts within a time
        window. This is the shape the DPO actually wants when answering
        "who has looked at this beneficiary in the last 90 days?" — the
        list endpoint above gives raw rows.

        Window is capped at 365 days server-side regardless of `days` value.
      parameters:
        - name: targetType
          in: query
          required: true
          schema: { type: string, example: Beneficiary }
        - name: targetId
          in: query
          required: true
          schema: { type: string }
        - name: days
          in: query
          schema: { type: integer, default: 90, minimum: 1, maximum: 365 }
      responses:
        '200':
          description: Aggregated viewer report for the requested window.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PiiAccessByTargetResponse' }
        '400':
          description: targetType or targetId missing.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: Caller lacks DPO / compliance / admin role.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  # ─── Observability ──────────────────────────────────────────────────────
  /api/health/metrics/integrations:
    get:
      tags: [Observability]
      summary: Prometheus text-format metrics for integrations + hardening
      description: |
        No auth — intended for Prometheus scrapers. Includes:

        **Gov-adapter metrics:**
        - `gov_adapter_rate_limit_*` (capacity, available, utilization, active actors)
        - `gov_adapter_circuit_*` (open, failures, cooldown_ms)
        - `gov_adapter_calls_total{provider, status}`
        - `gov_adapter_call_latency_ms_bucket` (histogram)
        - `gov_adapter_configured{provider}`
        - `gov_adapter_mode{provider, mode}`

        **Hardening-layer counters (v4.0.96+):**
        - `integration_dlq_events_total{integration, outcome}` — outcomes:
          `parked` / `replay_success` / `replay_fail` / `resolved` / `discarded`
        - `idempotency_events_total{route, outcome}` — outcomes:
          `hit` / `miss` / `pending_reject` / `invalid_key`
      security: []
      responses:
        '200':
          description: Prometheus text format.
          content:
            text/plain:
              schema: { type: string }
              example: |
                # HELP integration_dlq_events_total Monotonic counter of DLQ lifecycle events.
                # TYPE integration_dlq_events_total counter
                integration_dlq_events_total{integration="nafath",outcome="parked"} 3
                integration_dlq_events_total{integration="nafath",outcome="replay_success"} 2

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        Standard user JWT issued by /api/v1/auth/login. Most endpoints
        require it; unauthenticated endpoints explicitly opt out via
        `security: []`.
    hmacSignature:
      type: apiKey
      in: header
      name: X-NPHIES-Signature
      description: >
        HMAC-SHA256 of the raw request body, encoded as hex, optionally
        prefixed with `sha256=`. The exact header name and prefix are
        configurable via NPHIES_WEBHOOK_HEADER / NPHIES_WEBHOOK_PREFIX.
        Timestamp replay protection supported via X-NPHIES-Timestamp
        (5-minute tolerance).

  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: >
        Client-generated unique key (8–255 chars). A retry with the same
        key returns the first successful response unchanged — with an
        `Idempotent-Replay: true` response header. Invalid keys return
        400. A second request while the first is still in flight returns
        409. Applied scope: `tenantId || branchId || user.id || 'global'`.
      schema:
        type: string
        minLength: 8
        maxLength: 255
      example: nafath-sign-lx2h-7yh9
    PathId:
      name: id
      in: path
      required: true
      schema: { type: string }

    BeneficiaryId:
      name: beneficiaryId
      in: path
      required: true
      schema: { type: string }

    SessionId:
      name: sessionId
      in: path
      required: true
      schema: { type: string }

    AssessmentId:
      name: assessmentId
      in: path
      required: true
      schema: { type: string }

  responses:
    BadRequest:
      description: Validation failure.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Unauthorized:
      description: Missing or invalid token.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    UnprocessableEntity:
      description: Business-rule violation (e.g. golden-thread gate).
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    IdempotentInProgress:
      description: >
        A request with this Idempotency-Key is still being processed
        on another worker. Retry after a short delay.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }

  schemas:
    ErrorResponse:
      type: object
      properties:
        success: { type: boolean, example: false }
        error:   { type: string, example: INVALID_IDEMPOTENCY_KEY }
        code:    { type: string, nullable: true }
        message: { type: string }

    # ─── Auth ───────────────────────────────────────────────────────────────
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: superadmin@alawael.com
        password:
          type: string
          format: password
          example: Admin@2025!

    UserSummary:
      type: object
      properties:
        id:       { type: string }
        email:    { type: string, format: email }
        fullName: { type: string }
        role:     { type: string }

    LoginResponse:
      type: object
      properties:
        success:    { type: boolean }
        statusCode: { type: integer }
        message:    { type: string }
        data:
          type: object
          properties:
            accessToken:  { type: string }
            refreshToken: { type: string }
            user:         { $ref: '#/components/schemas/UserSummary' }

    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
          description: A valid refresh token returned by /auth/login or /auth/refresh.

    RefreshResponse:
      type: object
      properties:
        success:    { type: boolean }
        statusCode: { type: integer }
        message:    { type: string }
        data:
          type: object
          properties:
            accessToken:  { type: string }
            refreshToken: { type: string }

    LogoutResponse:
      type: object
      properties:
        success:    { type: boolean }
        statusCode: { type: integer }
        message:    { type: string }

    # ─── Activity Library ───────────────────────────────────────────────────
    ActivityDiscipline:
      type: string
      enum: [speech, ot, pt, behavior, special_ed, psychology, aac, feeding, play, social_skills]

    ActivityDifficulty:
      type: string
      enum: [beginner, intermediate, advanced]

    Activity:
      type: object
      properties:
        _id:              { type: string }
        activity_code:    { type: string }
        name_ar:          { type: string }
        name_en:          { type: string, nullable: true }
        description_ar:   { type: string, nullable: true }
        discipline:       { $ref: '#/components/schemas/ActivityDiscipline' }
        target_domains:   { type: array, items: { type: string }, nullable: true }
        difficulty:       { $ref: '#/components/schemas/ActivityDifficulty' }
        age_range:
          type: object
          properties:
            min_months: { type: integer, nullable: true }
            max_months: { type: integer, nullable: true }
          nullable: true
        duration_minutes: { type: integer, nullable: true }
        materials:        { type: array, items: { type: string }, nullable: true }
        instructions_steps: { type: array, items: { type: string }, nullable: true }
        mastery_indicators: { type: array, items: { type: string }, nullable: true }
        family_carryover_ar: { type: string, nullable: true }
        adaptations:      { type: array, items: { type: object }, nullable: true }
        media:
          type: object
          properties:
            image_url: { type: string, nullable: true }
            video_url: { type: string, nullable: true }
            pdf_url:   { type: string, nullable: true }
          nullable: true
        progression_to:   { type: array, items: { type: string }, nullable: true }
        evidence_reference: { type: string, nullable: true }
        tags:             { type: array, items: { type: string }, nullable: true }
        is_built_in:      { type: boolean, nullable: true }
        is_active:        { type: boolean, nullable: true }
        usage_count:      { type: integer, nullable: true }
        avg_session_rating: { type: number, nullable: true }
        createdAt:        { type: string, format: date-time, nullable: true }
        updatedAt:        { type: string, format: date-time, nullable: true }

    ActivityCreate:
      type: object
      required: [name_ar, discipline]
      properties:
        name_ar:          { type: string }
        discipline:       { $ref: '#/components/schemas/ActivityDiscipline' }
        name_en:          { type: string, nullable: true }
        description_ar:   { type: string, nullable: true }
        target_domains:   { type: array, items: { type: string }, nullable: true }
        difficulty:       { $ref: '#/components/schemas/ActivityDifficulty', nullable: true }
        age_range:
          type: object
          properties:
            min_months: { type: integer, nullable: true }
            max_months: { type: integer, nullable: true }
          nullable: true
        duration_minutes: { type: integer, nullable: true }
        materials:        { type: array, items: { type: string }, nullable: true }
        instructions_steps: { type: array, items: { type: string }, nullable: true }
        mastery_indicators: { type: array, items: { type: string }, nullable: true }
        family_carryover_ar: { type: string, nullable: true }
        adaptations:      { type: array, items: { type: object }, nullable: true }
        media:
          type: object
          properties:
            image_url: { type: string, nullable: true }
            video_url: { type: string, nullable: true }
            pdf_url:   { type: string, nullable: true }
          nullable: true
        progression_to:   { type: array, items: { type: string }, nullable: true }
        evidence_reference: { type: string, nullable: true }
        tags:             { type: array, items: { type: string }, nullable: true }
        is_active:        { type: boolean, nullable: true }

    ActivityUpdate:
      type: object
      properties:
        name_ar:          { type: string }
        name_en:          { type: string, nullable: true }
        description_ar:   { type: string, nullable: true }
        target_domains:   { type: array, items: { type: string }, nullable: true }
        difficulty:       { $ref: '#/components/schemas/ActivityDifficulty', nullable: true }
        age_range:
          type: object
          properties:
            min_months: { type: integer, nullable: true }
            max_months: { type: integer, nullable: true }
          nullable: true
        duration_minutes: { type: integer, nullable: true }
        materials:        { type: array, items: { type: string }, nullable: true }
        instructions_steps: { type: array, items: { type: string }, nullable: true }
        mastery_indicators: { type: array, items: { type: string }, nullable: true }
        family_carryover_ar: { type: string, nullable: true }
        adaptations:      { type: array, items: { type: object }, nullable: true }
        media:
          type: object
          properties:
            image_url: { type: string, nullable: true }
            video_url: { type: string, nullable: true }
            pdf_url:   { type: string, nullable: true }
          nullable: true
        progression_to:   { type: array, items: { type: string }, nullable: true }
        evidence_reference: { type: string, nullable: true }
        tags:             { type: array, items: { type: string }, nullable: true }
        is_active:        { type: boolean, nullable: true }

    ActivityEnvelope:
      type: object
      properties:
        success: { type: boolean }
        message: { type: string, nullable: true }
        data:    { $ref: '#/components/schemas/Activity' }

    ActivityListResponse:
      type: object
      properties:
        success: { type: boolean }
        total:   { type: integer }
        page:    { type: integer }
        limit:   { type: integer }
        count:   { type: integer }
        data:    { type: array, items: { $ref: '#/components/schemas/Activity' } }

    DisciplineOption:
      type: object
      properties:
        value: { type: string }
        label: { type: string }

    DisciplineListResponse:
      type: object
      properties:
        success: { type: boolean }
        data:    { type: array, items: { $ref: '#/components/schemas/DisciplineOption' } }

    ActivityBucket:
      type: object
      properties:
        _id:   { type: string }
        count: { type: integer }

    ActivityStats:
      type: object
      properties:
        success: { type: boolean }
        data:
          type: object
          properties:
            total:        { type: integer }
            byDiscipline: { type: array, items: { $ref: '#/components/schemas/ActivityBucket' } }
            byDifficulty: { type: array, items: { $ref: '#/components/schemas/ActivityBucket' } }

    ActivitySeedResponse:
      type: object
      properties:
        success: { type: boolean }
        message: { type: string }
        data:
          type: object
          properties:
            inserted:       { type: integer }
            skipped:        { type: integer }
            total_built_in: { type: integer }

    ActivityUsageEnvelope:
      type: object
      properties:
        success: { type: boolean }
        data:
          type: object
          properties:
            usage_count: { type: integer }
            name_ar:     { type: string }

    # ─── Beneficiaries ──────────────────────────────────────────────────────
    BeneficiaryStatus:
      type: string
      enum:
        [REFERRED, PENDING, ACTIVE, ON_HOLD, DISCHARGED, DECEASED, DRAFT, TRANSFERRED]

    Gender:
      type: string
      enum: [MALE, FEMALE]

    DisabilityLevel:
      type: string
      enum: [MILD, MODERATE, SEVERE, PROFOUND]

    CalendarPreference:
      type: string
      enum: [GREGORIAN, HIJRI]

    PdplConsentMethod:
      type: string
      enum: [IN_PERSON_SIGNATURE, NAFATH, PARENT_PORTAL_OTP]

    Guardian:
      type: object
      properties:
        id: { type: string }
        nameAr: { type: string }
        nameEn: { type: string, nullable: true }
        nationalId: { type: string, nullable: true }
        phone: { type: string, nullable: true }
        email: { type: string, nullable: true }
        relationship: { type: string }
        isPrimary: { type: boolean }
        isPortalUser: { type: boolean }
      required: [id, nameAr, relationship, isPrimary, isPortalUser]

    BranchSummary:
      type: object
      properties:
        id: { type: string }
        nameAr: { type: string }
      required: [id, nameAr]

    NationalAddress:
      type: object
      properties:
        buildingNumber: { type: string }
        street: { type: string }
        district: { type: string }
        city: { type: string }
        postalCode: { type: string }
        additionalNumber: { type: string, nullable: true }
        country: { type: string }
      required: [buildingNumber, street, district, city, postalCode, country]

    Beneficiary:
      type: object
      properties:
        id: { type: string }
        branchId: { type: string }
        branch: { $ref: '#/components/schemas/BranchSummary', nullable: true }
        nationalId: { type: string }
        nameAr: { type: string }
        nameEn: { type: string, nullable: true }
        dateOfBirth: { type: string, format: date }
        gender: { $ref: '#/components/schemas/Gender' }
        status: { $ref: '#/components/schemas/BeneficiaryStatus' }
        disabilityType: { type: array, items: { type: string } }
        disabilityLevel: { $ref: '#/components/schemas/DisabilityLevel', nullable: true }
        primaryDiagnosis: { type: string, nullable: true }
        notes: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        guardians: { type: array, items: { $ref: '#/components/schemas/Guardian' }, nullable: true }
        calendarPreferred: { $ref: '#/components/schemas/CalendarPreference', nullable: true }
        pdplConsentAt: { type: string, format: date-time, nullable: true }
        pdplConsentMethod: { $ref: '#/components/schemas/PdplConsentMethod', nullable: true }
        pdplConsentRevokedAt: { type: string, format: date-time, nullable: true }
        primaryTherapistId: { type: string, nullable: true }
        secondaryTherapistIds: { type: array, items: { type: string }, nullable: true }
        retainUntil: { type: string, format: date-time, nullable: true }
        lastStatusChangeAt: { type: string, format: date-time, nullable: true }
        lastStatusChangeById: { type: string, nullable: true }
        lastStatusChangeNote: { type: string, nullable: true }
        transferredFromBranchId: { type: string, nullable: true }
        transferredAt: { type: string, format: date-time, nullable: true }
      required:
        [id, branchId, nationalId, nameAr, dateOfBirth, gender, status, disabilityType, createdAt, updatedAt]

    BeneficiaryCreate:
      type: object
      required: [nameAr, nationalId, dateOfBirth, gender, disabilityType, disabilityLevel]
      properties:
        nameAr: { type: string }
        nameEn: { type: string, nullable: true }
        nationalId: { type: string }
        dateOfBirth: { type: string, format: date }
        gender: { $ref: '#/components/schemas/Gender' }
        disabilityType: { type: array, items: { type: string } }
        disabilityLevel: { $ref: '#/components/schemas/DisabilityLevel' }
        primaryDiagnosis: { type: string, nullable: true }
        notes: { type: string, nullable: true }
        nationalAddress: { $ref: '#/components/schemas/NationalAddress', nullable: true }

    BeneficiaryUpdate:
      type: object
      properties:
        nameAr: { type: string }
        nameEn: { type: string, nullable: true }
        disabilityType: { type: array, items: { type: string } }
        disabilityLevel: { $ref: '#/components/schemas/DisabilityLevel', nullable: true }
        primaryDiagnosis: { type: string, nullable: true }
        notes: { type: string, nullable: true }
        nationalAddress: { $ref: '#/components/schemas/NationalAddress', nullable: true }

    BeneficiaryEnvelope:
      type: object
      properties:
        success: { type: boolean }
        message: { type: string, nullable: true }
        data: { $ref: '#/components/schemas/Beneficiary' }

    BeneficiaryListResponse:
      type: object
      properties:
        success: { type: boolean }
        data: { type: array, items: { $ref: '#/components/schemas/Beneficiary' } }
        total: { type: integer }
        page: { type: integer }
        limit: { type: integer }
        pages: { type: integer }

    # ─── Red Flags ───────────────────────────────────────────────────────────
    RedFlagSeverity:
      type: string
      enum: [critical, warning, info]

    RedFlagDomain:
      type: string
      enum: [clinical, behavioral, operational, attendance, compliance, safety, family, financial]

    ActiveRedFlag:
      type: object
      required: [beneficiaryId, flagId, severity, domain, blocking, raisedAt, lastObservedAt, observedValue]
      properties:
        beneficiaryId: { type: string }
        flagId: { type: string }
        severity: { $ref: '#/components/schemas/RedFlagSeverity' }
        domain: { $ref: '#/components/schemas/RedFlagDomain' }
        blocking: { type: boolean }
        raisedAt: { type: string, format: date-time }
        lastObservedAt: { type: string, format: date-time }
        observedValue: {}

    RedFlagsSummary:
      type: object
      required: [total, critical, warning, info, blocking]
      properties:
        total: { type: integer }
        critical: { type: integer }
        warning: { type: integer }
        info: { type: integer }
        blocking: { type: integer }

    RedFlagsListEnvelope:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [beneficiaryId, active, summary]
          properties:
            beneficiaryId: { type: string }
            active: { type: array, items: { $ref: '#/components/schemas/ActiveRedFlag' } }
            summary: { $ref: '#/components/schemas/RedFlagsSummary' }

    RedFlagsEvaluateRequest:
      type: object
      properties:
        domains: { oneOf: [{ $ref: '#/components/schemas/RedFlagDomain' }, { type: array, items: { $ref: '#/components/schemas/RedFlagDomain' } }] }
        severities: { oneOf: [{ $ref: '#/components/schemas/RedFlagSeverity' }, { type: array, items: { $ref: '#/components/schemas/RedFlagSeverity' } }] }
        flagIds: { type: array, items: { type: string } }

    RedFlagTransitions:
      type: object
      required: [beneficiaryId, evaluatedAt, newlyRaised, stillRaised, newlyResolved, stillClear, suppressedByCooldown, errored]
      properties:
        beneficiaryId: { type: string }
        evaluatedAt: { type: string, format: date-time }
        newlyRaised: { type: array, items: { $ref: '#/components/schemas/ActiveRedFlag' } }
        stillRaised: { type: array, items: { $ref: '#/components/schemas/ActiveRedFlag' } }
        newlyResolved: { type: array, items: { $ref: '#/components/schemas/ResolvedRedFlag' } }
        stillClear:
          type: array
          items:
            type: object
            required: [beneficiaryId, flagId, observedValue, evaluatedAt]
            properties:
              beneficiaryId: { type: string }
              flagId: { type: string }
              observedValue: {}
              evaluatedAt: { type: string, format: date-time }
        suppressedByCooldown:
          type: array
          items:
            type: object
            required: [beneficiaryId, flagId, observedValue, evaluatedAt, cooldownUntil]
            properties:
              beneficiaryId: { type: string }
              flagId: { type: string }
              observedValue: {}
              evaluatedAt: { type: string, format: date-time }
              cooldownUntil: { type: string, format: date-time }
        errored: { type: array, items: { type: object, properties: { flagId: { type: string }, reason: { type: string, nullable: true } }, required: [flagId] } }

    RedFlagsEvaluateEnvelope:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [beneficiaryId, evaluatedAt, flagsEvaluated, transitions]
          properties:
            beneficiaryId: { type: string }
            evaluatedAt: { type: string, format: date-time }
            flagsEvaluated: { type: integer }
            transitions: { $ref: '#/components/schemas/RedFlagTransitions' }

    ResolvedRedFlag:
      allOf:
        - { $ref: '#/components/schemas/ActiveRedFlag' }
        - type: object
          required: [resolvedAt, resolvedBy, resolution, cooldownUntil]
          properties:
            resolvedAt: { type: string, format: date-time }
            resolvedBy: { type: string }
            resolution: { type: string, nullable: true }
            cooldownUntil: { type: string, format: date-time }

    ResolvedRedFlagEnvelope:
      type: object
      required: [data]
      properties:
        data: { $ref: '#/components/schemas/ResolvedRedFlag' }

    ResolveFlagRequest:
      type: object
      required: [resolvedBy]
      properties:
        resolvedBy: { type: string }
        resolution: { type: string, nullable: true }

    SessionStartCheckEnvelope:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [allowed, blockingFlags, emergencyOverride]
          properties:
            allowed: { type: boolean }
            blockingFlags: { type: array, items: { $ref: '#/components/schemas/ActiveRedFlag' } }
            emergencyOverride: { type: boolean }

    RecordOverrideRequest:
      type: object
      required: [overriddenBy, reason]
      properties:
        overriddenBy: { type: string }
        reason: { type: string }
        blockingFlagIds: { type: array, items: { type: string } }
        context:
          type: object
          properties:
            sessionId: { type: string }
            therapistId: { type: string }
            scheduledStartTime: { type: string, format: date-time }
            branchId: { type: string }

    OverrideRecord:
      type: object
      required: [id, beneficiaryId, overriddenBy, reason, overriddenAt, blockingFlagIds, context]
      properties:
        id: { type: string }
        beneficiaryId: { type: string }
        overriddenBy: { type: string }
        reason: { type: string }
        overriddenAt: { type: string, format: date-time }
        blockingFlagIds: { type: array, items: { type: string } }
        context: { type: object }

    OverrideRecordEnvelope:
      type: object
      required: [data]
      properties:
        data: { $ref: '#/components/schemas/OverrideRecord' }

    OverrideRecordsEnvelope:
      type: object
      required: [data]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/OverrideRecord' } }

    RedFlagAggregateEnvelope:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [generatedAt, totals, bySeverity, byDomain, topBeneficiaries, overrides]
          properties:
            generatedAt: { type: string, format: date-time }
            totals:
              type: object
              required: [active, blocking]
              properties:
                active: { type: integer }
                blocking: { type: integer }
            bySeverity:
              type: object
              required: [critical, warning, info]
              properties:
                critical: { type: integer }
                warning: { type: integer }
                info: { type: integer }
            byDomain:
              type: object
              required: [clinical, behavioral, operational, attendance, compliance, safety, family, financial]
              properties:
                clinical: { type: integer }
                behavioral: { type: integer }
                operational: { type: integer }
                attendance: { type: integer }
                compliance: { type: integer }
                safety: { type: integer }
                family: { type: integer }
                financial: { type: integer }
            topBeneficiaries:
              type: array
              items:
                type: object
                required: [beneficiaryId, totalFlags, critical, blocking]
                properties:
                  beneficiaryId: { type: string }
                  totalFlags: { type: integer }
                  critical: { type: integer }
                  blocking: { type: integer }
            overrides:
              type: object
              required: [last7d, last30d]
              properties:
                last7d: { type: integer }
                last30d: { type: integer }

    # ─── Consents ────────────────────────────────────────────────────────────
    ConsentType:
      type: string
      enum: [treatment, photography, data_sharing, trip, research]

    ConsentRecord:
      type: object
      required: [id, beneficiaryId, type, grantedBy, grantedAt, expiresAt, revokedAt, revokedReason, signatureRef, documentRef, isActive]
      properties:
        id: { type: string }
        beneficiaryId: { type: string }
        type: { $ref: '#/components/schemas/ConsentType' }
        grantedBy: { type: string, nullable: true }
        grantedAt: { type: string, format: date-time, nullable: true }
        expiresAt: { type: string, format: date-time, nullable: true }
        revokedAt: { type: string, format: date-time, nullable: true }
        revokedReason: { type: string, nullable: true }
        signatureRef: { type: string, nullable: true }
        documentRef: { type: string, nullable: true }
        isActive: { type: boolean }

    ConsentRecordEnvelope:
      type: object
      required: [data]
      properties:
        data: { $ref: '#/components/schemas/ConsentRecord' }

    ConsentRecordsEnvelope:
      type: object
      required: [data]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/ConsentRecord' } }

    GrantConsentRequest:
      type: object
      required: [type]
      properties:
        type: { $ref: '#/components/schemas/ConsentType' }
        grantedBy: { type: string, nullable: true }
        grantedAt: { type: string, format: date-time, nullable: true }
        expiresAt: { type: string, format: date-time, nullable: true }
        signatureRef: { type: string, nullable: true }
        documentRef: { type: string, nullable: true }

    RevokeConsentRequest:
      type: object
      properties:
        reason: { type: string, nullable: true }

    ConsentTrackingState:
      type: object
      required: [beneficiaryId, consentTrackingEnabled]
      properties:
        beneficiaryId: { type: string }
        consentTrackingEnabled: { type: boolean }

    ConsentTrackingEnvelope:
      type: object
      required: [data]
      properties:
        data: { $ref: '#/components/schemas/ConsentTrackingState' }

    ConsentTrackingUpdateRequest:
      type: object
      required: [enabled]
      properties:
        enabled: { type: boolean }

    # ─── Care Plans ─────────────────────────────────────────────────────────
    CarePlanStatus:
      type: string
      enum: [DRAFT, PENDING_APPROVAL, ACTIVE, SUSPENDED, COMPLETED, ARCHIVED]

    CarePlanGoal:
      type: object
      required: [id, nameAr, status, priority, domain, targetDate]
      properties:
        id:              { type: string }
        nameAr:          { type: string }
        nameEn:          { type: string, nullable: true }
        status:          { type: string }
        priority:        { type: string }
        domain:          { type: string }
        targetDate:      { type: string, format: date }
        baselineNote:    { type: string, nullable: true }
        achievementNote: { type: string, nullable: true }
        assignedToId:    { type: string, nullable: true }
        createdAt:       { type: string, format: date-time }

    CarePlan:
      type: object
      required: [id, beneficiaryId, branchId, startDate, status, reviewCycle, createdAt, updatedAt]
      properties:
        id:            { type: string }
        beneficiaryId: { type: string }
        branchId:      { type: string }
        createdById:   { type: string, nullable: true }
        startDate:     { type: string, format: date }
        endDate:       { type: string, format: date, nullable: true }
        status:        { $ref: '#/components/schemas/CarePlanStatus' }
        reviewCycle:   { type: integer }
        nextReviewDate: { type: string, format: date-time, nullable: true }
        summary:       { type: string, nullable: true }
        approvedById:  { type: string, nullable: true }
        approvedAt:    { type: string, format: date-time, nullable: true }
        createdAt:     { type: string, format: date-time }
        updatedAt:     { type: string, format: date-time }
        beneficiary:
          type: object
          nullable: true
          properties:
            id:        { type: string }
            nameAr:    { type: string }
            nationalId: { type: string, nullable: true }
        goals:
          type: array
          items: { $ref: '#/components/schemas/CarePlanGoal' }

    CarePlanEnvelope:
      type: object
      required: [success, data]
      properties:
        success: { type: boolean }
        data:    { $ref: '#/components/schemas/CarePlan' }

    CarePlanListResponse:
      type: object
      required: [success, data, total]
      properties:
        success: { type: boolean }
        data:
          type: array
          items: { $ref: '#/components/schemas/CarePlan' }
        total:   { type: integer }
        skip:    { type: integer }
        limit:   { type: integer }

    CarePlanCreate:
      type: object
      required: [beneficiaryId, episodeId, startDate]
      properties:
        beneficiaryId: { type: string }
        episodeId:     { type: string }
        startDate:     { type: string, format: date }
        endDate:       { type: string, format: date }
        reviewCycle:   { type: integer, default: 90, minimum: 7 }
        summary:       { type: string }

    CarePlanUpdate:
      type: object
      properties:
        startDate:   { type: string, format: date }
        endDate:     { type: string, format: date }
        reviewCycle: { type: integer, minimum: 7 }
        summary:     { type: string }

    CarePlanLifecycleAction:
      type: object
      properties:
        reason: { type: string }

    CarePlanGoalCreate:
      type: object
      required: [carePlanId, assignedToId, domain, nameAr, targetDate]
      properties:
        carePlanId:    { type: string }
        assignedToId:  { type: string }
        domain:        { type: string }
        nameAr:        { type: string }
        nameEn:        { type: string }
        targetDate:    { type: string, format: date }
        priority:
          type: string
          enum: [LOW, MEDIUM, HIGH, CRITICAL]
        baselineNote:  { type: string }

    # ─── Therapy Sessions ─────────────────────────────────────────────────────
    SessionStatus:
      type: string
      enum:
        [scheduled, confirmed, in_progress, completed, cancelled, no_show, late_cancel, rescheduled]

    SessionType:
      type: string
      enum: [individual, group, family, consultation, evaluation, crisis, followup]

    SessionModality:
      type: string
      enum: [in_person, tele_rehab, home_visit, community, hybrid]

    SessionSpecialty:
      type: string
      enum:
        - speech_therapy
        - occupational_therapy
        - physical_therapy
        - behavioral_therapy
        - psychological
        - educational
        - social_work
        - nursing
        - vocational
        - recreational
        - multidisciplinary
        - other

    SessionGoalRating:
      type: string
      enum: [not_attempted, emerging, developing, achieved, maintained, regressed]

    SessionGoalProgress:
      type: object
      properties:
        goalId:       { type: string }
        goalTitle:    { type: string, nullable: true }
        progressBefore: { type: number, nullable: true }
        progressAfter:  { type: number, nullable: true }
        rating:       { $ref: '#/components/schemas/SessionGoalRating' }
        notes:        { type: string, nullable: true }
        trialData:
          type: object
          nullable: true
          properties:
            attempts:  { type: integer }
            successes: { type: integer }
            accuracy:  { type: number }

    SessionActivity:
      type: object
      required: [name]
      properties:
        name:            { type: string }
        name_ar:         { type: string, nullable: true }
        domain:          { type: string }
        durationMinutes: { type: integer }
        materials:       { type: array, items: { type: string } }
        instructions:    { type: string, nullable: true }
        response:        { type: string }
        assistanceLevel: { type: string }
        notes:           { type: string, nullable: true }

    SessionVitalSign:
      type: object
      properties:
        heartRate:      { type: integer }
        bloodPressure:
          type: object
          properties:
            systolic:   { type: integer }
            diastolic:  { type: integer }
        temperature:    { type: number }
        oxygenSaturation: { type: number }
        painLevel:      { type: integer, minimum: 0, maximum: 10 }
        recordedAt:     { type: string, format: date-time }

    SessionVitalSigns:
      type: object
      properties:
        pre:  { $ref: '#/components/schemas/SessionVitalSign', nullable: true }
        post: { $ref: '#/components/schemas/SessionVitalSign', nullable: true }

    SessionAttendance:
      type: object
      properties:
        status:          { type: string, enum: [present, absent, late, early_leave] }
        checkinTime:     { type: string, format: date-time, nullable: true }
        checkoutTime:    { type: string, format: date-time, nullable: true }
        absenceReason:   { type: string, nullable: true }
        excused:         { type: boolean }
        guardianPresent: { type: boolean, nullable: true }
        guardianName:    { type: string, nullable: true }

    SessionLocation:
      type: object
      properties:
        type:          { type: string, enum: [center, home, school, community, virtual] }
        room:          { type: string, nullable: true }
        building:      { type: string, nullable: true }
        address:       { type: string, nullable: true }
        teleRehabLink: { type: string, nullable: true }

    SessionCancellation:
      type: object
      properties:
        cancelledAt:     { type: string, format: date-time }
        cancelledBy:     { type: string, nullable: true }
        reason:          { type: string, nullable: true }
        rescheduledTo:   { type: string, format: date-time, nullable: true }

    SessionBilling:
      type: object
      properties:
        serviceCode:     { type: string, nullable: true }
        units:           { type: integer }
        amount:          { type: number }
        insuranceClaim:  { type: boolean }
        claimStatus:     { type: string, enum: [pending, submitted, approved, rejected] }

    SessionAttachment:
      type: object
      properties:
        title:    { type: string }
        fileUrl:  { type: string }
        fileType: { type: string }
        uploadedAt: { type: string, format: date-time }

    SessionHomeProgram:
      type: object
      properties:
        assigned:     { type: boolean }
        instructions: { type: string, nullable: true }
        compliance:   { type: string, enum: [not_assigned, not_done, partial, full] }

    SessionObservations:
      type: object
      properties:
        attention:      { type: string, enum: [poor, fair, good, excellent] }
        motivation:     { type: string, enum: [low, moderate, high] }
        cooperation:    { type: string, enum: [poor, fair, good, excellent] }
        fatigue:        { type: string, enum: [none, mild, moderate, severe] }
        emotionalState: { type: string, nullable: true }
        behaviorNotes:  { type: string, nullable: true }

    Session:
      type: object
      required:
        [id, beneficiaryId, episodeId, branchId, therapistId, scheduledDate, status, createdAt, updatedAt]
      properties:
        id:            { type: string }
        beneficiaryId: { type: string }
        episodeId:     { type: string }
        carePlanId:    { type: string, nullable: true }
        branchId:      { type: string }
        therapistId:   { type: string }
        sessionNumber: { type: string, nullable: true }
        sequenceInEpisode: { type: integer, nullable: true }
        type:          { $ref: '#/components/schemas/SessionType' }
        modality:      { $ref: '#/components/schemas/SessionModality' }
        specialty:     { $ref: '#/components/schemas/SessionSpecialty', nullable: true }
        status:        { $ref: '#/components/schemas/SessionStatus' }
        scheduledDate: { type: string, format: date-time }
        scheduledStartTime: { type: string, nullable: true }
        scheduledEndTime:   { type: string, nullable: true }
        scheduledDurationMinutes: { type: integer }
        actualStartTime: { type: string, format: date-time, nullable: true }
        actualEndTime:   { type: string, format: date-time, nullable: true }
        actualDurationMinutes: { type: integer, nullable: true }
        additionalTherapists: { type: array, items: { type: string } }
        location:      { $ref: '#/components/schemas/SessionLocation', nullable: true }
        activities:    { type: array, items: { $ref: '#/components/schemas/SessionActivity' } }
        goalProgress:  { type: array, items: { $ref: '#/components/schemas/SessionGoalProgress' } }
        subjective:    { type: string, nullable: true }
        objective:     { type: string, nullable: true }
        assessment:    { type: string, nullable: true }
        plan:          { type: string, nullable: true }
        soapNotes:     { type: string, nullable: true }
        observations:  { $ref: '#/components/schemas/SessionObservations', nullable: true }
        vitalSigns:    { $ref: '#/components/schemas/SessionVitalSigns', nullable: true }
        attendance:    { $ref: '#/components/schemas/SessionAttendance', nullable: true }
        homeProgram:   { $ref: '#/components/schemas/SessionHomeProgram', nullable: true }
        cancellation:  { $ref: '#/components/schemas/SessionCancellation', nullable: true }
        billing:       { $ref: '#/components/schemas/SessionBilling', nullable: true }
        attachments:   { type: array, items: { $ref: '#/components/schemas/SessionAttachment' } }
        tags:          { type: array, items: { type: string } }
        notes:         { type: string, nullable: true }
        createdBy:     { type: string, nullable: true }
        lastModifiedBy: { type: string, nullable: true }
        isDeleted:     { type: boolean }
        createdAt:     { type: string, format: date-time }
        updatedAt:     { type: string, format: date-time }
        beneficiary:
