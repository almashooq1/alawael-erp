openapi: 3.1.0
info:
  title: Al-Awael ERP — Integration APIs
  version: 4.0.97
  summary: |
    Integration-layer HTTP contract for the Al-Awael rehab/day-care ERP.
  description: |
    Covers every endpoint added in the integration hardening + external-adapter
    rollout (v4.0.93 → v4.0.97):

    - **Hardening layer** — idempotent mutations + Dead Letter Queue
      admin surface + Prometheus metrics.
    - **Nafath e-signature** — digital signing vertical (request → poll →
      verify → evidence download).
    - **Yakeen** — Saudi civil-registry identity verification with
      persistence + audit.
    - **Wasel** — Saudi National Address (SPL) verification.
    - **NPHIES** — health-insurance claim webhook receiver.

    Every mutating endpoint accepts an `Idempotency-Key` header
    (8–255 chars). Replays return the cached response with an
    `Idempotent-Replay: true` header.

    All external-adapter calls inherit retry + circuit-breaker + Dead
    Letter Queue + PII-redacted logging automatically (see the
    `/api/v1/admin/ops/dlq` surface).
  contact:
    name: Al-Awael Platform
    email: platform@alawael.sa
  license:
    name: Proprietary
servers:
  - url: http://localhost:3001
    description: Local development
  - url: https://staging.alawael.sa
    description: Staging
  - url: https://api.alawael.sa
    description: Production

tags:
  - name: Auth
    description: Authentication — login, token refresh, and logout.
  - name: Activity Library
    description: Rehabilitation activity catalogue (Phase 27).
  - name: Appointments
    description: Appointment booking and lifecycle management.
  - name: Beneficiaries
    description: Beneficiary intake, profile, and lifecycle management.
  - name: Red Flags
    description: Beneficiary risk flags — evaluation, resolution, and overrides.
  - name: Consents
    description: PDPL consent grants, revocation, and tracking per beneficiary.
  - name: Care Plans
    description: |
      Unified care plans (ADR-041 canonical). Covers plan lifecycle
      (draft → pending approval → active → suspended/completed) and goal
      attachment. The legacy CarePlanVersion engine is deprecated; these
      endpoints target UnifiedCarePlan.
  - name: Therapy Sessions
    description: |
      Clinical session scheduling, documentation, and lifecycle. The canonical
      model is ClinicalSession; reads/writes project into the legacy
      TherapySession analytics model for downstream dashboards.
  - name: Documents
    description: |
      Document metadata management. The core route supports both multipart
      uploads (`POST /upload`) and URL-linked metadata records (`POST /`).
  - name: Assessments
    description: |
      Clinical assessment lifecycle: draft → completed → reviewed → archived.
      Tracks beneficiary, tool, score, interpretation, and per-domain
      score breakdown.
  - name: Reports
    description: |
      Dashboard-level aggregates. Some endpoints are backed by dedicated
      aggregations; others fall back to count/list calls when the dedicated
      endpoint is not implemented on the running backend.
  - name: Notifications
    description: |
      User inbox, unread counts, and bulk read operations.
  - name: Incidents
    description: |
      Clinical quality incident reports (falls, medication errors, etc.)
      served by the quality-module router.
  - name: Branches
    description: |
      Rehabilitation-center branch network (HQ, main, branch, satellite).
  - name: Complaints
    description: |
      Customer/parent/staff complaints, suggestions, and grievances.
  - name: Vehicles
    description: |
      Transport fleet vehicles (vans, minibuses, buses, wheelchair vans).
  - name: Invoices
    description: |
      Accounting invoices served by the unified finance router.
  - name: Measures
    description: |
      Clinical measures library catalog (read-only list for dropdowns).
  - name: Measures Outcomes
    description: |
      Clinical measures outcome rollups and reports per beneficiary.
  - name: Purchase Orders
    description: |
      Inventory purchase orders (draft → approval → receipt).
  - name: Nafath Signing
    description: Digital signature via Nafath. Separate from the Nafath SSO/login flow.
  - name: Yakeen Verification
    description: Civil-registry identity verification.
  - name: Wasel Address
    description: Saudi National Address (SPL) verification.
  - name: NPHIES Webhooks
    description: Async insurance-claim callbacks from NPHIES.
  - name: Admin Ops — DLQ
    description: Dead Letter Queue inspection + replay + discard.
  - name: Observability
    description: Prometheus metrics for integrations + hardening layer.
  - name: PDPL Audit
    description: PDPL Article 13 — read access audit. DPO / compliance only.
  - name: Session→Claim Bridge
    description: |
      Phase 21 — bridges completed therapy sessions into NPHIES draft claims.
      Output is a draft only; submission to NPHIES still goes through
      `POST /api/admin/nphies-claims/:id/submit` (idempotent + real adapter).

security:
  - bearerAuth: []

paths:
  # ─── Auth ────────────────────────────────────────────────────────────────
  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Authenticate a user
      description: |
        Returns an access token, refresh token, and a minimal user object.
        No authentication is required for this endpoint.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: Login successful.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LoginResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      description: |
        Exchanges a valid refresh token for a new access/refresh pair.
        The old refresh token is blacklisted on the backend.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RefreshRequest' }
      responses:
        '200':
          description: Tokens refreshed successfully.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RefreshResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Log out the current user
      description: |
        Blacklists the current access token on the backend. Requires a valid
        Bearer token; the logout itself is best-effort on the client side.
      responses:
        '200':
          description: Logout acknowledged.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LogoutResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  # ─── Activity Library ────────────────────────────────────────────────────
  /api/v1/activity-library/activities:
    get:
      tags: [Activity Library]
      summary: List activities with filters and pagination
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1, minimum: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 50, minimum: 1, maximum: 200 }
        - name: discipline
          in: query
          schema: { type: string }
        - name: domain
          in: query
          schema: { type: string }
        - name: difficulty
          in: query
          schema: { type: string }
        - name: age_months
          in: query
          schema: { type: integer }
        - name: q
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Paginated list of activities.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ActivityListResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [Activity Library]
      summary: Create a custom activity
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ActivityCreate' }
      responses:
        '201':
          description: Activity created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ActivityEnvelope' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/activity-library/activities/disciplines:
    get:
      tags: [Activity Library]
      summary: List disciplines for UI dropdowns
      responses:
        '200':
          description: Discipline options.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DisciplineListResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/activity-library/activities/stats:
    get:
      tags: [Activity Library]
      summary: Activity aggregate stats
      responses:
        '200':
          description: Stats by discipline and difficulty.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ActivityStats' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/activity-library/activities/seed:
    post:
      tags: [Activity Library]
      summary: Seed built-in activities
      responses:
        '200':
          description: Seed result.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ActivitySeedResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/activity-library/activities/{id}:
    get:
      tags: [Activity Library]
      summary: Get activity by ID or code
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        '200':
          description: Activity details.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ActivityEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Activity Library]
      summary: Update an activity
      parameters:
        - $ref: '#/components/parameters/PathId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ActivityUpdate' }
      responses:
        '200':
          description: Activity updated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ActivityEnvelope' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/activity-library/activities/{id}/use:
    post:
      tags: [Activity Library]
      summary: Increment activity usage counter
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        '200':
          description: Usage counter incremented.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ActivityUsageEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ─── Appointments ────────────────────────────────────────────────────────
  /api/v1/appointments:
    get:
      tags: [Appointments]
      summary: List appointments
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
        - name: status
          in: query
          schema: { type: string }
        - name: beneficiaryId
          in: query
          schema: { type: string }
        - name: therapistId
          in: query
          schema: { type: string }
        - name: branchId
          in: query
          schema: { type: string }
        - name: from
          in: query
          schema: { type: string, format: date-time }
        - name: to
          in: query
          schema: { type: string, format: date-time }
      responses:
        '200':
          description: Paginated appointment list.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AppointmentListResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [Appointments]
      summary: Book a new appointment
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AppointmentCreate' }
      responses:
        '201':
          description: Appointment created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AppointmentEnvelope' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/appointments/{id}:
    get:
      tags: [Appointments]
      summary: Get appointment by ID
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        '200':
          description: Appointment details.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AppointmentEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/appointments/{id}/reschedule:
    patch:
      tags: [Appointments]
      summary: Reschedule an appointment
      parameters:
        - $ref: '#/components/parameters/PathId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AppointmentReschedule' }
      responses:
        '200':
          description: Appointment rescheduled.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AppointmentEnvelope' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/appointments/{id}/status:
    patch:
      tags: [Appointments]
      summary: Update appointment status
      parameters:
        - $ref: '#/components/parameters/PathId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AppointmentStatusUpdate' }
      responses:
        '200':
          description: Status updated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AppointmentEnvelope' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ─── Beneficiaries ───────────────────────────────────────────────────────
  /api/v1/beneficiaries:
    get:
      tags: [Beneficiaries]
      summary: List beneficiaries
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
        - name: status
          in: query
          schema: { type: string }
        - name: search
          in: query
          schema: { type: string }
        - name: branchId
          in: query
          schema: { type: string }
        - name: disabilityType
          in: query
          schema: { type: string }
        - name: sort
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Paginated beneficiary list.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BeneficiaryListResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [Beneficiaries]
      summary: Register a new beneficiary
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BeneficiaryCreate' }
      responses:
        '201':
          description: Beneficiary created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BeneficiaryEnvelope' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/beneficiaries/{id}:
    get:
      tags: [Beneficiaries]
      summary: Get beneficiary by ID
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        '200':
          description: Beneficiary details.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BeneficiaryEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Beneficiaries]
      summary: Update beneficiary profile
      parameters:
        - $ref: '#/components/parameters/PathId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BeneficiaryUpdate' }
      responses:
        '200':
          description: Profile updated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BeneficiaryEnvelope' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ─── Red Flags ───────────────────────────────────────────────────────────
  /api/v1/beneficiaries/{beneficiaryId}/red-flags:
    get:
      tags: [Red Flags]
      summary: List active red flags for a beneficiary
      parameters:
        - $ref: '#/components/parameters/BeneficiaryId'
      responses:
        '200':
          description: Active flags and summary.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RedFlagsListEnvelope' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/beneficiaries/{beneficiaryId}/red-flags/evaluate:
    post:
      tags: [Red Flags]
      summary: Evaluate red flags for a beneficiary
      parameters:
        - $ref: '#/components/parameters/BeneficiaryId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RedFlagsEvaluateRequest' }
      responses:
        '200':
          description: Evaluation transitions.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RedFlagsEvaluateEnvelope' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/beneficiaries/{beneficiaryId}/red-flags/{flagId}/resolve:
    post:
      tags: [Red Flags]
      summary: Manually resolve a red flag
      parameters:
        - $ref: '#/components/parameters/BeneficiaryId'
        - name: flagId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ResolveFlagRequest' }
      responses:
        '200':
          description: Resolved flag record.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ResolvedRedFlagEnvelope' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/beneficiaries/{beneficiaryId}/red-flags/session-start-check:
    get:
      tags: [Red Flags]
      summary: Pre-flight session start guard check
      parameters:
        - $ref: '#/components/parameters/BeneficiaryId'
        - name: emergency
          in: query
          schema: { type: boolean, default: false }
      responses:
        '200':
          description: Session may start.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SessionStartCheckEnvelope' }
        '409':
          description: Blocking flags prevent session start.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SessionStartCheckEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/beneficiaries/{beneficiaryId}/red-flags/override:
    post:
      tags: [Red Flags]
      summary: Record an emergency override of blocking flags
      parameters:
        - $ref: '#/components/parameters/BeneficiaryId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RecordOverrideRequest' }
      responses:
        '201':
          description: Override recorded.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OverrideRecordEnvelope' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '501':
          description: Override logging is not configured.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /api/v1/beneficiaries/{beneficiaryId}/red-flags/overrides:
    get:
      tags: [Red Flags]
      summary: List override records for a beneficiary
      parameters:
        - $ref: '#/components/parameters/BeneficiaryId'
        - name: limit
          in: query
          schema: { type: integer, default: 50, maximum: 200 }
      responses:
        '200':
          description: Override records.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OverrideRecordsEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '501':
          description: Override logging is not configured.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /api/v1/admin/red-flags/dashboard:
    get:
      tags: [Red Flags]
      summary: Cross-beneficiary red flag dashboard
      responses:
        '200':
          description: Aggregate summary.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RedFlagAggregateEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  # ─── Consents ────────────────────────────────────────────────────────────
  /api/v1/beneficiaries/{beneficiaryId}/consents:
    get:
      tags: [Consents]
      summary: List consent records for a beneficiary
      parameters:
        - $ref: '#/components/parameters/BeneficiaryId'
      responses:
        '200':
          description: Consent records.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ConsentRecordsEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [Consents]
      summary: Grant a new consent
      parameters:
        - $ref: '#/components/parameters/BeneficiaryId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/GrantConsentRequest' }
      responses:
        '201':
          description: Consent created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ConsentRecordEnvelope' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/beneficiaries/{beneficiaryId}/consents/{consentId}/revoke:
    post:
      tags: [Consents]
      summary: Revoke an active consent
      parameters:
        - $ref: '#/components/parameters/BeneficiaryId'
        - name: consentId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RevokeConsentRequest' }
      responses:
        '200':
          description: Consent revoked.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ConsentRecordEnvelope' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Consent already revoked.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /api/v1/beneficiaries/{beneficiaryId}/consent-tracking:
    get:
      tags: [Consents]
      summary: Get consent tracking state
      parameters:
        - $ref: '#/components/parameters/BeneficiaryId'
      responses:
        '200':
          description: Tracking state.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ConsentTrackingEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Consents]
      summary: Toggle consent tracking
      parameters:
        - $ref: '#/components/parameters/BeneficiaryId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ConsentTrackingUpdateRequest' }
      responses:
        '200':
          description: Tracking state updated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ConsentTrackingEnvelope' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ─── Care Plans ──────────────────────────────────────────────────────────
  /api/v1/care-plans:
    get:
      tags: [Care Plans]
      summary: List care plans
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1, minimum: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20, minimum: 1 }
        - name: beneficiaryId
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Paginated list of care plans.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CarePlanListResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [Care Plans]
