<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/logo.svg" type="image/svg+xml" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#667eea" />
    <meta name="description" content="نظام مراكز الأوائل للرعاية النهارية - نظام إدارة شامل ومتكامل | Al-Awael Day Care Centers System" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo.svg" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>نظام مراكز الأوائل للرعاية النهارية | Al-Awael Day Care Centers</title>
    <script>
      // Global error catcher — shows errors BEFORE React loads
      (function(){
        var errors = [];
        function show(err) {
          errors.push(err);
          var el = document.getElementById('__pre_react_errors');
          if (!el) {
            el = document.createElement('div');
            el.id = '__pre_react_errors';
            el.style.cssText = 'position:fixed;bottom:0;left:0;right:0;max-height:40vh;overflow:auto;background:#1e1e2e;color:#f8d7da;font:12px/1.6 monospace;padding:12px 16px;z-index:99999;direction:ltr;text-align:left;border-top:3px solid #dc3545;';
            document.body ? document.body.appendChild(el) : document.addEventListener('DOMContentLoaded', function(){ document.body.appendChild(el); });
          }
          el.innerHTML = '<b style="color:#ff6b6b;font-size:14px">🐛 JS Errors (debug):</b><br>' + errors.map(function(e,i){ return '<span style="color:#ffc078">#'+(i+1)+'</span> ' + e; }).join('<br>');
        }
        window.onerror = function(msg, src, line, col, err) {
          show(msg + ' at ' + (src||'?') + ':' + line + ':' + col + (err && err.stack ? '\\n' + err.stack.split('\\n').slice(0,3).join('\\n') : ''));
        };
        window.addEventListener('unhandledrejection', function(e) {
          var r = e.reason;
          show('UnhandledPromiseRejection: ' + (r && r.stack ? r.stack.split('\\n').slice(0,3).join('\\n') : String(r)));
        });
      })();
    </script>
  </head>
  <body>
    <noscript>يجب تفعيل JavaScript لتشغيل هذا التطبيق.</noscript>
    <div id="root"></div>
  </body>
</html>
