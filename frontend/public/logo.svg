<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38f9d7;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- الخلفية -->
  <circle cx="100" cy="100" r="95" fill="url(#grad1)"/>
  <circle cx="100" cy="100" r="88" fill="none" stroke="white" stroke-opacity="0.15" stroke-width="2"/>

  <!-- رمز الرعاية النهارية - أيدي تحمل شخص -->
  <g transform="translate(100, 85)" filter="url(#shadow)">
    <!-- اليد اليسرى -->
    <path d="M-40,10 C-45,0 -35,-15 -25,-10 C-20,-7 -15,0 -10,5"
          fill="none" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
    <!-- اليد اليمنى -->
    <path d="M40,10 C45,0 35,-15 25,-10 C20,-7 15,0 10,5"
          fill="none" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.9"/>

    <!-- شخص في المنتصف (رمز الرعاية) -->
    <circle cx="0" cy="-25" r="12" fill="white" opacity="0.95"/>
    <path d="M0,-12 C-8,-12 -14,-5 -14,5 L-14,15 C-14,18 -11,20 -8,20 L8,20 C11,20 14,18 14,15 L14,5 C14,-5 8,-12 0,-12 Z"
          fill="white" opacity="0.9"/>

    <!-- قلب صغير -->
    <path d="M0,-28 C-3,-32 -8,-30 -8,-26 C-8,-22 0,-18 0,-18 C0,-18 8,-22 8,-26 C8,-30 3,-32 0,-28 Z"
          fill="url(#grad2)" transform="scale(0.6) translate(0, -5)"/>
  </g>

  <!-- نجوم صغيرة للتميز -->
  <circle cx="45" cy="45" r="5" fill="url(#grad3)" opacity="0.8"/>
  <circle cx="155" cy="45" r="4" fill="url(#grad2)" opacity="0.7"/>
  <circle cx="40" cy="130" r="3" fill="white" opacity="0.4"/>
  <circle cx="160" cy="125" r="3.5" fill="white" opacity="0.3"/>

  <!-- النص -->
  <text x="100" y="158" font-family="Arial, sans-serif" font-size="16" font-weight="bold"
        text-anchor="middle" fill="white">مراكز الأوائل</text>
  <text x="100" y="178" font-family="Arial, sans-serif" font-size="12"
        text-anchor="middle" fill="white" opacity="0.85">للرعاية النهارية</text>
</svg>
