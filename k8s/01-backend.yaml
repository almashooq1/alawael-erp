---
# Backend Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: alawael
  labels:
    app: quality-dashboard

---
# ConfigMap for Backend Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: alawael
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  LOG_TO_FILE: "true"
  CACHE_ENABLED: "true"
  RATE_LIMIT_WINDOW_MS: "900000"
  RATE_LIMIT_MAX_REQUESTS: "100"
  CORS_ALLOWED_ORIGINS: "http://localhost,http://frontend,http://localhost:3000"
  PORT: "3001"

---
# Secret for Sensitive Data
apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: alawael
type: Opaque
stringData:
  DB_PASSWORD: "alawael_secure_pass_change_me"
  API_KEY: "your-secure-api-key-here"
  SLACK_WEBHOOK: ""

---
# PersistentVolumeClaim for Data
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backend-data-pvc
  namespace: alawael
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: standard

---
# PersistentVolumeClaim for Logs
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backend-logs-pvc
  namespace: alawael
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
  storageClassName: standard

---
# Backend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: alawael
  labels:
    app: backend
    version: v2.0.0
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
        version: v2.0.0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3001"
        prometheus.io/path: "/metrics/system"
    spec:
      serviceAccountName: default
      terminationGracePeriodSeconds: 30

      # Init Container (migrations/setup)
      initContainers:
        - name: setup
          image: busybox:latest
          command: ['sh', '-c', 'mkdir -p /data /logs && chmod 777 /data /logs']
          volumeMounts:
            - name: data
              mountPath: /data
            - name: logs
              mountPath: /logs

      containers:
        - name: backend
          image: alawael-backend:latest
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 3001
              protocol: TCP

          # Environment Variables
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secrets

          env:
            - name: DB_PATH
              value: "/data/quality.db"

          # Resource Requests & Limits
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

          # Liveness Probe
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          # Readiness Probe
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 2

          # Security Context
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          # Volume Mounts
          volumeMounts:
            - name: data
              mountPath: /data
            - name: logs
              mountPath: /logs
            - name: tmp
              mountPath: /tmp

      # Volumes
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: backend-data-pvc
        - name: logs
          persistentVolumeClaim:
            claimName: backend-logs-pvc
        - name: tmp
          emptyDir: {}

      # Pod Disruption Budget
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - backend
            topologyKey: kubernetes.io/hostname

---
# Backend Service
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: alawael
  labels:
    app: backend
spec:
  type: ClusterIP
  ports:
    - port: 3001
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: backend
  sessionAffinity: ClientIP

---
# Service Monitor for Prometheus
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: backend-monitor
  namespace: alawael
  labels:
    app: backend
spec:
  selector:
    matchLabels:
      app: backend
  endpoints:
    - port: http
      path: /metrics/system
      interval: 30s

---
# HorizontalPodAutoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: alawael
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 30
      selectPolicy: Max
