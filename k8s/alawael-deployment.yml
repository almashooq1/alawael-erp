apiVersion: apps/v1
kind: Deployment
metadata:
  name: alawael-api-gateway
  namespace: alawael
  labels:
    app: alawael
    component: api-gateway
    phase: "7"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: alawael
      component: api-gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: alawael
        component: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: ghcr.io/alawael/alawael-api-gateway:latest
          ports:
            - containerPort: 3600
          env:
            - name: PORT
              value: "3600"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: alawael-secrets
                  key: jwt-secret
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: alawael-config
                  key: redis-url
            - name: NODE_ENV
              value: production
            - name: RATE_LIMIT_PER_MIN
              value: "300"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3600
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3600
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: alawael-api-gateway
  namespace: alawael
spec:
  selector:
    app: alawael
    component: api-gateway
  ports:
    - protocol: TCP
      port: 3600
      targetPort: 3600
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: alawael-ingress
  namespace: alawael
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/rate-limit: "300"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.alawael.sa
      secretName: alawael-tls
  rules:
    - host: api.alawael.sa
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: alawael-api-gateway
                port:
                  number: 3600
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alawael-config
  namespace: alawael
data:
  mongodb-uri: "mongodb://mongodb:27017/alawael?authSource=admin"
  redis-url: "redis://redis:6379"
  node-env: "production"
---
apiVersion: v1
kind: Secret
metadata:
  name: alawael-secrets
  namespace: alawael
type: Opaque
stringData:
  jwt-secret: "CHANGE_ME_IN_PRODUCTION"
  mongo-root-password: "CHANGE_ME_IN_PRODUCTION"
  redis-password: "CHANGE_ME_IN_PRODUCTION"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: alawael-api-gateway-hpa
  namespace: alawael
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: alawael-api-gateway
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
