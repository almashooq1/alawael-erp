# 🔐 External Secrets - AlAwael ERP v3.0
# Requires: external-secrets-operator installed in the cluster
# helm install external-secrets external-secrets/external-secrets -n external-secrets-system --create-namespace
#
# Configure a SecretStore or ClusterSecretStore first pointing to your vault provider.

---
# ClusterSecretStore — connects to your secrets backend
# Uncomment ONE of the following blocks depending on your provider:

# ── AWS Secrets Manager ──
# apiVersion: external-secrets.io/v1beta1
# kind: ClusterSecretStore
# metadata:
#   name: aws-secrets-manager
# spec:
#   provider:
#     aws:
#       service: SecretsManager
#       region: me-south-1
#       auth:
#         jwt:
#           serviceAccountRef:
#             name: external-secrets-sa
#             namespace: external-secrets-system

# ── Azure Key Vault ──
# apiVersion: external-secrets.io/v1beta1
# kind: ClusterSecretStore
# metadata:
#   name: azure-key-vault
# spec:
#   provider:
#     azurekv:
#       tenantId: "<TENANT_ID>"
#       vaultUrl: "https://alawael-vault.vault.azure.net"
#       authType: ManagedIdentity

# ── HashiCorp Vault ──
# apiVersion: external-secrets.io/v1beta1
# kind: ClusterSecretStore
# metadata:
#   name: hashicorp-vault
# spec:
#   provider:
#     vault:
#       server: "https://vault.alawael.internal:8200"
#       path: "secret"
#       version: "v2"
#       auth:
#         kubernetes:
#           mountPath: "kubernetes"
#           role: "alawael-erp"

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: db-secrets
  namespace: alawael
  labels:
    app.kubernetes.io/part-of: alawael-erp
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager  # Change to match your ClusterSecretStore
    kind: ClusterSecretStore
  target:
    name: db-secrets
    creationPolicy: Owner
  data:
    - secretKey: mongodb-uri
      remoteRef:
        key: alawael/production/db
        property: mongodb-uri
    - secretKey: postgres-uri
      remoteRef:
        key: alawael/production/db
        property: postgres-uri

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cache-secrets
  namespace: alawael
  labels:
    app.kubernetes.io/part-of: alawael-erp
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: cache-secrets
    creationPolicy: Owner
  data:
    - secretKey: redis-url
      remoteRef:
        key: alawael/production/cache
        property: redis-url

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: auth-secrets
  namespace: alawael
  labels:
    app.kubernetes.io/part-of: alawael-erp
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: auth-secrets
    creationPolicy: Owner
  data:
    - secretKey: jwt-secret
      remoteRef:
        key: alawael/production/auth
        property: jwt-secret
    - secretKey: refresh-token-secret
      remoteRef:
        key: alawael/production/auth
        property: refresh-token-secret

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: mq-secrets
  namespace: alawael
  labels:
    app.kubernetes.io/part-of: alawael-erp
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: mq-secrets
    creationPolicy: Owner
  data:
    - secretKey: rabbitmq-url
      remoteRef:
        key: alawael/production/mq
        property: rabbitmq-url

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: aws-secrets
  namespace: alawael
  labels:
    app.kubernetes.io/part-of: alawael-erp
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: aws-secrets
    creationPolicy: Owner
  data:
    - secretKey: access-key-id
      remoteRef:
        key: alawael/production/aws
        property: access-key-id
    - secretKey: secret-access-key
      remoteRef:
        key: alawael/production/aws
        property: secret-access-key
    - secretKey: s3-bucket
      remoteRef:
        key: alawael/production/aws
        property: s3-bucket
