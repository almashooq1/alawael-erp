# 🔐 Kubernetes Secrets - AlAwael ERP v3.0
# ⚠️  DO NOT commit real secrets to version control!
#
# OPTION A: Use external-secrets-operator (RECOMMENDED for production)
#   - Store secrets in AWS Secrets Manager / Azure Key Vault / HashiCorp Vault
#   - See k8s/external-secrets.yaml for ExternalSecret CRDs
#
# OPTION B: Use Sealed Secrets (kubeseal)
#   kubeseal --format=yaml < secrets-raw.yaml > sealed-secrets.yaml
#
# OPTION C: Populate at deploy time via CI/CD
#   kubectl create secret generic db-secrets \
#     --from-literal=mongodb-uri="$MONGODB_URI" \
#     --from-literal=postgres-uri="$POSTGRES_URI" \
#     -n alawael --dry-run=client -o yaml | kubectl apply -f -

# ────────────────────────────────────────────
# TEMPLATE ONLY — values are placeholders
# Replace <BASE64_VALUE> at deploy time
# ────────────────────────────────────────────

---
apiVersion: v1
kind: Secret
metadata:
  name: db-secrets
  namespace: alawael
  labels:
    app.kubernetes.io/part-of: alawael-erp
    app.kubernetes.io/managed-by: ci-cd
type: Opaque
data:
  # echo -n "mongodb://user:pass@host:27017/alawael_db?authSource=admin" | base64
  mongodb-uri: <BASE64_MONGODB_URI>
  # echo -n "postgresql://user:pass@host:5432/alawael_finance" | base64
  postgres-uri: <BASE64_POSTGRES_URI>

---
apiVersion: v1
kind: Secret
metadata:
  name: cache-secrets
  namespace: alawael
  labels:
    app.kubernetes.io/part-of: alawael-erp
    app.kubernetes.io/managed-by: ci-cd
type: Opaque
data:
  # echo -n "redis://:strong_password@redis:6379" | base64
  redis-url: <BASE64_REDIS_URL>

---
apiVersion: v1
kind: Secret
metadata:
  name: auth-secrets
  namespace: alawael
  labels:
    app.kubernetes.io/part-of: alawael-erp
    app.kubernetes.io/managed-by: ci-cd
type: Opaque
data:
  # Generate: openssl rand -base64 64 | tr -d '\n' | base64
  jwt-secret: <BASE64_JWT_SECRET>
  refresh-token-secret: <BASE64_REFRESH_TOKEN_SECRET>

---
apiVersion: v1
kind: Secret
metadata:
  name: mq-secrets
  namespace: alawael
  labels:
    app.kubernetes.io/part-of: alawael-erp
    app.kubernetes.io/managed-by: ci-cd
type: Opaque
data:
  # echo -n "amqp://user:pass@rabbitmq:5672" | base64
  rabbitmq-url: <BASE64_RABBITMQ_URL>

---
apiVersion: v1
kind: Secret
metadata:
  name: aws-secrets
  namespace: alawael
  labels:
    app.kubernetes.io/part-of: alawael-erp
    app.kubernetes.io/managed-by: ci-cd
type: Opaque
data:
  access-key-id: <BASE64_AWS_ACCESS_KEY_ID>
  secret-access-key: <BASE64_AWS_SECRET_ACCESS_KEY>
  s3-bucket: <BASE64_S3_BUCKET_NAME>
