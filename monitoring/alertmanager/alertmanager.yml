global:
  resolve_timeout: 5m
  slack_api_url: '${SLACK_WEBHOOK_URL}'

# Templates for notifications
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# Route tree
route:
  receiver: 'default'
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h

  routes:
    # Critical alerts - immediate notification
    - match:
        severity: critical
      receiver: 'critical-alerts'
      group_wait: 0s
      group_interval: 5m
      repeat_interval: 4h

    # Quality alerts - send to quality team
    - match:
        category: quality
      receiver: 'quality-team'
      group_interval: 5m
      repeat_interval: 6h

    # Infrastructure alerts - send to ops team
    - match:
        category: infrastructure
      receiver: 'ops-team'
      group_interval: 10m
      repeat_interval: 12h

    # Performance alerts
    - match:
        category: performance
      receiver: 'performance-alerts'
      repeat_interval: 8h

# Inhibition rules
inhibit_rules:
  # Inhibit warning when critical alert is firing
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'cluster', 'service']

  # Don't alert about low coverage if tests are failing
  - source_match:
      alertname: 'HighTestFailureRate'
    target_match:
      alertname: 'LowTestCoverage'
    equal: ['service']

# Receivers configuration
receivers:
  - name: 'default'
    webhook_configs:
      - url: 'http://host.docker.internal:3001/api/alerts/webhook'
        send_resolved: true

  - name: 'critical-alerts'
    slack_configs:
      - channel: '#critical-alerts'
        title: '🚨 CRITICAL ALERT'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
        send_resolved: true
        color: 'danger'
    webhook_configs:
      - url: 'http://host.docker.internal:3001/api/alerts/webhook'
        send_resolved: true

  - name: 'quality-team'
    slack_configs:
      - channel: '#quality-alerts'
        title: '⚠️ Quality Alert'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
        send_resolved: true
        color: 'warning'
    email_configs:
      - to: 'quality-team@alawael.com'
        from: 'alertmanager@alawael.com'
        smarthost: 'smtp.gmail.com:587'
        auth_username: '${MAIL_USERNAME}'
        auth_password: '${MAIL_PASSWORD}'
        headers:
          Subject: 'Quality Alert: {{ .GroupLabels.alertname }}'

  - name: 'ops-team'
    slack_configs:
      - channel: '#ops-alerts'
        title: '🔧 Infrastructure Alert'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
        send_resolved: true
    email_configs:
      - to: 'ops-team@alawael.com'
        from: 'alertmanager@alawael.com'
        smarthost: 'smtp.gmail.com:587'
        auth_username: '${MAIL_USERNAME}'
        auth_password: '${MAIL_PASSWORD}'

  - name: 'performance-alerts'
    slack_configs:
      - channel: '#performance'
        title: '📊 Performance Alert'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
        send_resolved: true
        color: 'warning'
