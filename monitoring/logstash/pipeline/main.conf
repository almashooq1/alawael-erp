input {
  tcp {
    port => 5000
    type => "tcp-logs"
  }
  udp {
    port => 5000
    type => "udp-logs"
  }
  stdin {
    type => "stdin"
  }
  beats {
    port => 5044
  }
  http {
    port => 8888
    codec => json
  }
}

filter {
  if [type] == "tcp-logs" or [type] == "udp-logs" {
    grok {
      match => { "message" => "%{TIMESTAMP_ISO8601:timestamp} %{LOGLEVEL:level} \[%{DATA:logger}\] %{GREEDYDATA:message}" }
    }
    date {
      match => [ "timestamp", "ISO8601" ]
      remove_field => [ "timestamp" ]
    }
  }

  if [type] == "docker" {
    json {
      source => "message"
    }
    mutate {
      rename => { "msg" => "message" }
      remove_field => [ "@version", "host" ]
    }
  }

  if [http_status] {
    mutate {
      convert => { "http_status" => "integer" }
      convert => { "response_time" => "float" }
    }
  }

  # Add host and service information
  mutate {
    add_field => { "[@metadata][service]" => "alawael-erp" }
    add_field => { "[@metadata][environment]" => "production" }
  }

  # Parse JSON if message is JSON
  if [message] =~ /^\{/ {
    json {
      source => "message"
      target => "parsed"
    }
  }

  # Remove empty fields
  mutate {
    remove_field => [ "fields.log_processed_time" ]
  }
}

output {
  # Send to Elasticsearch
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "alawael-%{+YYYY.MM.dd}"
    codec => json
  }

  # Console output for debugging
  if [@metadata][debug] {
    stdout {
      codec => rubydebug
    }
  }

  # Send to file as fallback
  file {
    path => "/var/log/logstash/alawael-%{+YYYY.MM.dd}.log"
    codec => json
  }
}
