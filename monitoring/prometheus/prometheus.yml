global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'alawael-erp'
    environment: 'production'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Load rules once and periodically evaluate them
rule_files:
  - "alert.rules.yml"

# Scrape configurations
scrape_configs:
  # Dashboard API metrics
  - job_name: 'dashboard-api'
    static_configs:
      - targets: ['host.docker.internal:3001']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Backend service metrics
  - job_name: 'backend'
    static_configs:
      - targets: ['host.docker.internal:5000']
    metrics_path: '/metrics'
    scrape_interval: 15s

  # GraphQL service metrics
  - job_name: 'graphql'
    static_configs:
      - targets: ['host.docker.internal:4000']
    metrics_path: '/metrics'
    scrape_interval: 15s

  # Frontend metrics (if applicable)
  - job_name: 'frontend'
    static_configs:
      - targets: ['host.docker.internal:3002']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # Node exporter for system metrics
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 15s

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    scrape_interval: 10s

  # Quality metrics - custom metrics from test results
  - job_name: 'quality-metrics'
    static_configs:
      - targets: ['host.docker.internal:3001']
    metrics_path: '/api/metrics/prometheus'
    scrape_interval: 30s

# Remote write (optional - for long-term storage)
# remote_write:
#   - url: "http://your-remote-storage:9090/api/v1/write"
