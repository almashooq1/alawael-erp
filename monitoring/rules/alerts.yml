# ═══════════════════════════════════════════════════════════════════════════
# Prometheus Alert Rules — AlAwael ERP
# ═══════════════════════════════════════════════════════════════════════════

groups:
  # ─── Service Health ──────────────────────────────────────────────────────
  - name: service_health
    interval: 30s
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "{{ $labels.instance }} has been down for more than 1 minute."

      - alert: HighErrorRate
        expr: |
          rate(http_requests_total{status=~"5.."}[5m])
          / rate(http_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate on {{ $labels.job }}"
          description: "Error rate is above 5% for the last 5 minutes."

      - alert: HighLatency
        expr: |
          histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High p95 latency on {{ $labels.job }}"
          description: "95th percentile latency is above 2s."

  # ─── Resource Usage ─────────────────────────────────────────────────────
  - name: resource_usage
    interval: 60s
    rules:
      - alert: HighMemoryUsage
        expr: |
          process_resident_memory_bytes / (1024 * 1024) > 512
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on {{ $labels.job }}"
          description: "Memory usage is above 512 MB."

      - alert: HighCPUUsage
        expr: |
          rate(process_cpu_seconds_total[5m]) > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on {{ $labels.job }}"

      - alert: TooManyOpenConnections
        expr: |
          nodejs_active_handles_total > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Too many open handles on {{ $labels.job }}"

  # ─── Database ───────────────────────────────────────────────────────────
  - name: database
    interval: 60s
    rules:
      - alert: MongoDBDown
        expr: mongodb_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "MongoDB is down"

      - alert: RedisDown
        expr: redis_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis is down"

      - alert: MongoDBHighConnections
        expr: mongodb_connections{state="current"} > 500
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "MongoDB has high number of connections"

  # ─── Business Metrics ──────────────────────────────────────────────────
  - name: business
    interval: 5m
    rules:
      - alert: NoRequestsReceived
        expr: |
          rate(http_requests_total[10m]) == 0
        for: 15m
        labels:
          severity: info
        annotations:
          summary: "No requests received by {{ $labels.job }} for 15 minutes"
