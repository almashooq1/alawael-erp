    # [DISABLED] proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # [DISABLED] proxy_set_header X-Forwarded-Proto $scheme;
    # [DISABLED] proxy_set_header Connection "";
    # [DISABLED] proxy_request_buffering off;
    # [DISABLED] proxy_read_timeout 120s;
    # [DISABLED] }

    # Health check endpoint — internal only
    location /health {
      access_log off;
      proxy_pass http://api_backend/health;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_connect_timeout 5s;
      proxy_read_timeout 5s;
    }

    # Readiness probe
    location /readiness {
      access_log off;
      proxy_pass http://api_backend/health;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
    }

    # Custom error pages
    error_page 502 /502.html;
    error_page 503 /503.html;
    error_page 504 /504.html;
    location = /502.html {
      internal;
      default_type text/html;
      return 502 '<!DOCTYPE html><html dir="rtl" lang="ar"><head><meta charset="utf-8"><title>خطأ في الخادم</title></head><body style="text-align:center;font-family:sans-serif;padding:50px"><h1>502 - خطأ في البوابة</h1><p>الخادم الخلفي غير متاح مؤقتاً. يرجى المحاولة بعد لحظات.</p></body></html>';
    }
    location = /503.html {
      internal;
      default_type text/html;
      return 503 '<!DOCTYPE html><html dir="rtl" lang="ar"><head><meta charset="utf-8"><title>صيانة</title></head><body style="text-align:center;font-family:sans-serif;padding:50px"><h1>503 - جاري الصيانة</h1><p>النظام تحت الصيانة حالياً. يرجى المحاولة لاحقاً.</p></body></html>';
    }
    location = /504.html {
      internal;
      default_type text/html;
      return 504 '<!DOCTYPE html><html dir="rtl" lang="ar"><head><meta charset="utf-8"><title>انتهت المهلة</title></head><body style="text-align:center;font-family:sans-serif;padding:50px"><h1>504 - انتهت مهلة البوابة</h1><p>استغرقت العملية وقتاً طويلاً. يرجى المحاولة مرة أخرى.</p></body></html>';
    }

    # Deny access to sensitive files
    location ~ /\. {
      deny all;
      access_log off;
      log_not_found off;
    }

    location ~ ~$ {
      deny all;
      access_log off;
      log_not_found off;
    }

    # Block common exploit paths
    location ~* (\.php|\.asp|\.aspx|\.jsp|\.cgi|\.env)$ {
      deny all;
      access_log off;
      log_not_found off;
    }

    location ~* ^/(wp-admin|wp-login|xmlrpc|phpmyadmin|admin\.php) {
      deny all;
      access_log off;
      log_not_found off;
    }
  }
}
