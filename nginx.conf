user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 4096;
  multi_accept on;
  use epoll;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # Logging format — enhanced with timing and cache info
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for" '
                  'rt=$request_time urt=$upstream_response_time';

  # Conditional logging — skip health checks
  map $request_uri $loggable {
    ~*^/health  0;
    ~*^/readiness 0;
    default     1;
  }
  access_log /var/log/nginx/access.log main if=$loggable;

  # Performance optimizations
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  keepalive_requests 1000;
  types_hash_max_size 2048;
  server_tokens off;                  # Hide Nginx version
  client_max_body_size 50M;           # Allow larger file uploads
  client_body_buffer_size 128k;
  large_client_header_buffers 4 16k;

  # Open file cache — reduce disk I/O for static assets
  open_file_cache max=10000 inactive=60s;
  open_file_cache_valid 30s;
  open_file_cache_min_uses 2;
  open_file_cache_errors on;

  # Gzip compression — expanded types
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 256;
  gzip_buffers 16 8k;
  gzip_types text/plain text/css text/xml text/javascript
             application/json application/javascript application/xml+rss
             application/rss+xml application/atom+xml
             application/vnd.ms-fontobject
             font/truetype font/opentype
             image/svg+xml image/x-icon;

  # Security headers (applied globally)
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "0" always;  # Modern: CSP replaces X-XSS-Protection
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(self), camera=(self)" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; connect-src 'self' wss: ws: https:; font-src 'self' https://fonts.gstatic.com data:; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;

  # Cache settings — increased capacity
  proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=erp_cache:20m max_size=500m inactive=60m use_temp_path=off;
  proxy_cache_path /var/cache/nginx/api levels=1:2 keys_zone=api_cache:10m max_size=100m inactive=5m use_temp_path=off;

  # Rate limiting zones — tiered by endpoint sensitivity
  limit_req_zone $binary_remote_addr zone=general_limit:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=15r/s;
  limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
  limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=2r/s;
  limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

  # ═══════════════════════════════════════════════════════════════════════════════
  # Upstream Servers — All ERP Services
  # ═══════════════════════════════════════════════════════════════════════════════

