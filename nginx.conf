  # ─── HTTP: إعادة توجيه للـ domain الرسمي فقط — بقية الـ hosts تُخدَّم مباشرة ──
  server {
    listen 80;
    server_name alawael.org alaweal.org www.alawael.org www.alaweal.org;

    # Health check endpoint (for load balancers — no redirect)
    location /health {
      access_log off;
      return 200 "healthy\n";
      add_header Content-Type text/plain;
    }

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    # إعادة التوجيه لـ HTTPS فقط للـ domain الرسمي
    return 301 https://$host$request_uri;
  }

  # ─── HTTP: الوصول عبر IP أو localhost أو أي hostname آخر ─────────────────────
  # يعمل على الكمبيوتر والشبكة المحلية بدون SSL
  server {
    listen 80 default_server;
    server_name _;

    # Health check endpoint
    location /health {
      access_log off;
      return 200 "healthy\n";
      add_header Content-Type text/plain;
    }

    # ACME challenge
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    # Frontend — React SPA
    location / {
      limit_req zone=general_limit burst=30 nodelay;

      proxy_pass http://frontend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_connect_timeout 60s;
      proxy_send_timeout 60s;
      proxy_read_timeout 60s;

      # Static assets caching
      location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif|map)$ {
        proxy_pass http://frontend;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
      }

      # Service worker should never be cached
      location = /service-worker.js {
        proxy_pass http://frontend;
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
      }
    }

    # Socket.IO — WebSocket
    location /socket.io/ {
      proxy_pass http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_connect_timeout 1h;
      proxy_send_timeout 1h;
      proxy_read_timeout 1h;
      proxy_buffering off;
      proxy_cache off;
    }

    # Auth routes — strict rate limiting
    location ~ ^/api/auth/ {
      limit_req zone=auth_limit burst=3 nodelay;
      proxy_pass http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";
      proxy_no_cache 1;
      proxy_cache_bypass 1;
    }

    # API routes
    location /api/ {
      limit_req zone=api_limit burst=20 nodelay;

      proxy_pass http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";

      proxy_connect_timeout 30s;
      proxy_send_timeout 60s;
      proxy_read_timeout 60s;

      proxy_buffering on;
      proxy_buffer_size 8k;
      proxy_buffers 16 8k;
    }

    # Deny access to sensitive files
    location ~ /\. {
      deny all;
      access_log off;
      log_not_found off;
    }
  }

  # HTTPS server (ERP System)
  server {
    listen 443 ssl http2;
    server_name alawael.org alaweal.org *.alawael.org *.alaweal.org;

    # SSL certificates — aligned with docker-compose.production.yml volume mount
    ssl_certificate /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;
    ssl_trusted_certificate /etc/nginx/certs/chain.pem;

    # Modern TLS (A+ rating on SSL Labs)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;  # Let client pick (TLS 1.3 handles this)
    ssl_session_cache shared:SSL:20m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # HSTS — enforce HTTPS for 2 years
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Connection limits
    limit_conn conn_limit 50;

    # Frontend routes — React SPA
    location / {
      limit_req zone=general_limit burst=30 nodelay;

      proxy_pass http://frontend;
      proxy_http_version 1.1;

      # WebSocket support (React hot reload, Socket.IO)
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $request_id;

      proxy_connect_timeout 60s;
      proxy_send_timeout 60s;
      proxy_read_timeout 60s;

      # Static assets — cache aggressively with versioned hash busting
      location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif|map)$ {
        proxy_pass http://frontend;
        proxy_cache erp_cache;
        proxy_cache_valid 200 365d;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Cache-Status $upstream_cache_status;
        access_log off;
      }

      # Service worker should never be cached
      location = /service-worker.js {
        proxy_pass http://frontend;
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
      }
    }

    # Socket.IO — dedicated WebSocket location
    location /socket.io/ {
      proxy_pass http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_connect_timeout 1h;
      proxy_send_timeout 1h;
      proxy_read_timeout 1h;

      # Disable buffering for real-time
      proxy_buffering off;
      proxy_cache off;
    }

    # API routes  — general endpoints
    location /api/ {
      limit_req zone=api_limit burst=20 nodelay;

      proxy_pass http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $request_id;
      proxy_set_header Connection "";

      proxy_connect_timeout 30s;
      proxy_send_timeout 60s;
      proxy_read_timeout 60s;

      proxy_buffering on;
      proxy_buffer_size 8k;
      proxy_buffers 16 8k;
      proxy_busy_buffers_size 16k;

      # Short-lived API cache for repeated reads
      proxy_cache api_cache;
      proxy_cache_methods GET HEAD;
      proxy_cache_valid 200 30s;
      proxy_cache_bypass $http_authorization $cookie_token;
      proxy_no_cache $http_authorization $cookie_token;
      add_header X-Cache-Status $upstream_cache_status;
    }

    # API — long-running operations (reports, exports, bulk imports)
    location ~ ^/api/(reports|export|import|backup|bulk) {
      limit_req zone=upload_limit burst=5 nodelay;

      proxy_pass http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $request_id;
      proxy_set_header Connection "";

      # Extended timeouts for heavy operations
      proxy_connect_timeout 60s;
      proxy_send_timeout 300s;
      proxy_read_timeout 300s;

      # Larger buffers for big payloads
      proxy_buffering on;
      proxy_buffer_size 16k;
      proxy_buffers 32 16k;
      proxy_busy_buffers_size 64k;

      proxy_no_cache 1;
      proxy_cache_bypass 1;
    }

    # API — file uploads endpoint
    location ~ ^/api/(uploads|documents|attachments) {
      limit_req zone=upload_limit burst=5 nodelay;
      client_max_body_size 100M;   # Allow larger uploads for documents

      proxy_pass http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";

      proxy_connect_timeout 60s;
      proxy_send_timeout 120s;
      proxy_read_timeout 120s;

      proxy_request_buffering off;   # Stream uploads directly
      proxy_no_cache 1;
      proxy_cache_bypass 1;
    }

    # Auth routes — strict rate limiting
    location ~ ^/api/auth/ {
      limit_req zone=auth_limit burst=3 nodelay;

      proxy_pass http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";

      proxy_connect_timeout 10s;
      proxy_send_timeout 10s;
      proxy_read_timeout 10s;

      proxy_no_cache 1;
      proxy_cache_bypass 1;
    }

    # SSO routes (proxied to backend API)
    location /sso/ {
      limit_req zone=auth_limit burst=10 nodelay;

      proxy_pass http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";

      proxy_connect_timeout 30s;
      proxy_send_timeout 30s;
      proxy_read_timeout 30s;

      proxy_no_cache 1;
      proxy_cache_bypass 1;
    }

    # ═════════════════════════════════════════════════════════════════════════
    #  خدمات الـ Microservices — Service Proxies
    # ═════════════════════════════════════════════════════════════════════════

    # ─── API Gateway (DISABLED — gateway service removed) ───────────
    # location /gateway/ {
    #   limit_req zone=api_limit burst=20 nodelay;
    #   proxy_pass http://api_gateway/;
    #   proxy_http_version 1.1;
    #   proxy_set_header Host $host;
