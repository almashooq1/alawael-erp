user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 4096;
  multi_accept on;
  use epoll;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # Logging format — enhanced with timing and cache info
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for" '
                  'rt=$request_time urt=$upstream_response_time';

  # Conditional logging — skip health checks
  map $request_uri $loggable {
    ~*^/health  0;
    ~*^/readiness 0;
    default     1;
  }
  access_log /var/log/nginx/access.log main if=$loggable;

  # Performance optimizations
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  keepalive_requests 1000;
  types_hash_max_size 2048;
  server_tokens off;                  # Hide Nginx version
  client_max_body_size 50M;           # Allow larger file uploads
  client_body_buffer_size 128k;
  large_client_header_buffers 4 16k;

  # Open file cache — reduce disk I/O for static assets
  open_file_cache max=10000 inactive=60s;
  open_file_cache_valid 30s;
  open_file_cache_min_uses 2;
  open_file_cache_errors on;

  # Gzip compression — expanded types
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 256;
  gzip_buffers 16 8k;
  gzip_types text/plain text/css text/xml text/javascript
             application/json application/javascript application/xml+rss
             application/rss+xml application/atom+xml
             application/vnd.ms-fontobject
             font/truetype font/opentype
             image/svg+xml image/x-icon;

  # Security headers (applied globally)
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "0" always;  # Modern: CSP replaces X-XSS-Protection
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

  # Cache settings — increased capacity
  proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=erp_cache:20m max_size=500m inactive=60m use_temp_path=off;
  proxy_cache_path /var/cache/nginx/api levels=1:2 keys_zone=api_cache:10m max_size=100m inactive=5m use_temp_path=off;

  # Rate limiting zones — tiered by endpoint sensitivity
  limit_req_zone $binary_remote_addr zone=general_limit:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=15r/s;
  limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
  limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=2r/s;
  limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

  # Upstream servers (ERP System) — with health checks
  upstream frontend {
    server frontend:3000;
    keepalive 16;
  }

  upstream api_backend {
    least_conn;
    server backend:3001 weight=1 max_fails=3 fail_timeout=30s;
    keepalive 64;
  }

  upstream sso_server {
    server sso-server:3002 weight=1 max_fails=3 fail_timeout=30s;
    keepalive 16;
  }

  # HTTP redirect to HTTPS
  server {
    listen 80;
    server_name _;

    # Health check endpoint (for load balancers — no redirect)
    location /health {
      access_log off;
      return 200 "healthy\n";
      add_header Content-Type text/plain;
    }

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    return 301 https://$host$request_uri;
  }

  # HTTPS server (ERP System)
  server {
    listen 443 ssl http2;
    server_name alawael.org alaweal.org *.alawael.org *.alaweal.org;

    # SSL certificates — active configuration
    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_trusted_certificate /etc/nginx/ssl/chain.pem;

    # Modern TLS (A+ rating on SSL Labs)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;  # Let client pick (TLS 1.3 handles this)
    ssl_session_cache shared:SSL:20m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # HSTS — enforce HTTPS for 2 years
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Connection limits
    limit_conn conn_limit 50;

    # Frontend routes — React SPA
    location / {
      limit_req zone=general_limit burst=30 nodelay;

      proxy_pass http://frontend;
      proxy_http_version 1.1;

      # WebSocket support (React hot reload, Socket.IO)
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $request_id;

      proxy_connect_timeout 60s;
      proxy_send_timeout 60s;
      proxy_read_timeout 60s;

      # Static assets — cache aggressively with versioned hash busting
      location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif|map)$ {
        proxy_pass http://frontend;
        proxy_cache erp_cache;
        proxy_cache_valid 200 365d;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Cache-Status $upstream_cache_status;
        access_log off;
      }

      # Service worker should never be cached
      location = /service-worker.js {
        proxy_pass http://frontend;
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
      }
    }

    # Socket.IO — dedicated WebSocket location
    location /socket.io/ {
      proxy_pass http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_connect_timeout 7d;
      proxy_send_timeout 7d;
      proxy_read_timeout 7d;

      # Disable buffering for real-time
      proxy_buffering off;
      proxy_cache off;
    }

    # API routes  — general endpoints
    location /api/ {
      limit_req zone=api_limit burst=20 nodelay;

      proxy_pass http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $request_id;
      proxy_set_header Connection "";

      proxy_connect_timeout 30s;
      proxy_send_timeout 60s;
      proxy_read_timeout 60s;

      proxy_buffering on;
      proxy_buffer_size 8k;
      proxy_buffers 16 8k;
      proxy_busy_buffers_size 16k;

      # Short-lived API cache for repeated reads
      proxy_cache api_cache;
      proxy_cache_methods GET HEAD;
      proxy_cache_valid 200 30s;
      proxy_cache_bypass $http_authorization $cookie_token;
      proxy_no_cache $http_authorization $cookie_token;
      add_header X-Cache-Status $upstream_cache_status;
    }

    # API — long-running operations (reports, exports, bulk imports)
    location ~ ^/api/(reports|export|import|backup|bulk) {
      limit_req zone=upload_limit burst=5 nodelay;

      proxy_pass http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $request_id;
      proxy_set_header Connection "";

      # Extended timeouts for heavy operations
      proxy_connect_timeout 60s;
      proxy_send_timeout 300s;
      proxy_read_timeout 300s;

      # Larger buffers for big payloads
      proxy_buffering on;
      proxy_buffer_size 16k;
      proxy_buffers 32 16k;
      proxy_busy_buffers_size 64k;

      proxy_no_cache 1;
      proxy_cache_bypass 1;
    }

    # API — file uploads endpoint
    location ~ ^/api/(uploads|documents|attachments) {
      limit_req zone=upload_limit burst=5 nodelay;
      client_max_body_size 100M;   # Allow larger uploads for documents

      proxy_pass http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";

      proxy_connect_timeout 60s;
      proxy_send_timeout 120s;
      proxy_read_timeout 120s;

      proxy_request_buffering off;   # Stream uploads directly
      proxy_no_cache 1;
      proxy_cache_bypass 1;
    }

    # Auth routes — strict rate limiting
    location ~ ^/api/auth/ {
      limit_req zone=auth_limit burst=3 nodelay;

      proxy_pass http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";

      proxy_connect_timeout 10s;
      proxy_send_timeout 10s;
      proxy_read_timeout 10s;

      proxy_no_cache 1;
      proxy_cache_bypass 1;
    }

    # SSO routes
    location /sso/ {
      limit_req zone=auth_limit burst=10 nodelay;

      proxy_pass http://sso_server;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";

      proxy_connect_timeout 30s;
      proxy_send_timeout 30s;
      proxy_read_timeout 30s;

      proxy_no_cache 1;
      proxy_cache_bypass 1;
    }

    # Health check endpoint — internal only
    location /health {
      access_log off;
      proxy_pass http://api_backend/health;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_connect_timeout 5s;
      proxy_read_timeout 5s;
    }

    # Readiness probe
    location /readiness {
      access_log off;
      proxy_pass http://api_backend/health;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
    }

    # Custom error pages
    error_page 502 /502.html;
    error_page 503 /503.html;
    error_page 504 /504.html;
    location = /502.html {
      internal;
      default_type text/html;
      return 502 '<!DOCTYPE html><html dir="rtl" lang="ar"><head><meta charset="utf-8"><title>خطأ في الخادم</title></head><body style="text-align:center;font-family:sans-serif;padding:50px"><h1>502 - خطأ في البوابة</h1><p>الخادم الخلفي غير متاح مؤقتاً. يرجى المحاولة بعد لحظات.</p></body></html>';
    }
    location = /503.html {
      internal;
      default_type text/html;
      return 503 '<!DOCTYPE html><html dir="rtl" lang="ar"><head><meta charset="utf-8"><title>صيانة</title></head><body style="text-align:center;font-family:sans-serif;padding:50px"><h1>503 - جاري الصيانة</h1><p>النظام تحت الصيانة حالياً. يرجى المحاولة لاحقاً.</p></body></html>';
    }
    location = /504.html {
      internal;
      default_type text/html;
      return 504 '<!DOCTYPE html><html dir="rtl" lang="ar"><head><meta charset="utf-8"><title>انتهت المهلة</title></head><body style="text-align:center;font-family:sans-serif;padding:50px"><h1>504 - انتهت مهلة البوابة</h1><p>استغرقت العملية وقتاً طويلاً. يرجى المحاولة مرة أخرى.</p></body></html>';
    }

    # Deny access to sensitive files
    location ~ /\. {
      deny all;
      access_log off;
      log_not_found off;
    }

    location ~ ~$ {
      deny all;
      access_log off;
      log_not_found off;
    }

    # Block common exploit paths
    location ~* (\.php|\.asp|\.aspx|\.jsp|\.cgi|\.env)$ {
      deny all;
      access_log off;
      log_not_found off;
    }

    location ~* ^/(wp-admin|wp-login|xmlrpc|phpmyadmin|admin\.php) {
      deny all;
      access_log off;
      log_not_found off;
    }
  }
}
