# ═══════════════════════════════════════════════════════════════════════════════
# Al-Awael ERP — Backend-Only NGINX Reverse Proxy
# ═══════════════════════════════════════════════════════════════════════════════
#
# Proxies all traffic to the backend Express API (port 3001).
# Designed for production deployments where the frontend is hosted elsewhere
# or served via a CDN / separate ingress.
#
# Endpoints:
#   /        → backend:3001
#   /api/    → backend:3001
#   /health  → backend:3001/health (NGINX health check)
# ═══════════════════════════════════════════════════════════════════════════════

server {
  listen 80;
  listen [::]:80;
  server_name _;

  # ─── Security Headers ─────────────────────────────────────────────────────
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "0" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

  # ─── Body / Timeout Limits ────────────────────────────────────────────────
  client_max_body_size 50M;
  client_body_buffer_size 128k;
  large_client_header_buffers 4 16k;

  proxy_connect_timeout 60s;
  proxy_send_timeout 60s;
  proxy_read_timeout 60s;

  # ─── Gzip Compression ─────────────────────────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 256;
  gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/xml+rss
    application/atom+xml
    image/svg+xml;

  # ─── Health Check (used by NGINX + Docker) ──────────────────────────────
  location /health {
    access_log off;
    proxy_pass http://backend:3001/health;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # ─── API Routes ───────────────────────────────────────────────────────────
  location /api/ {
    proxy_pass http://backend:3001/api/;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;

    # WebSocket support (if backend uses Socket.io or similar)
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Buffering
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 4k;
  }

  # ─── Root / Catch-All ───────────────────────────────────────────────────
  location / {
    proxy_pass http://backend:3001;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 4k;
  }

  # ─── Static / Uploads (optional passthrough) ────────────────────────────
  location /uploads/ {
    proxy_pass http://backend:3001/uploads/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Longer timeouts for file uploads
    proxy_read_timeout 120s;
  }

  # ─── Standard error pages ─────────────────────────────────────────────────
  error_page 502 503 504 /502.html;
  location = /502.html {
    return 503 '{"error":"Service temporarily unavailable","status":503}\n';
    add_header Content-Type application/json always;
  }
}
