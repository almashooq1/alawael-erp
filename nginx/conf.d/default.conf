# ──────────────────────────────────────────
#  Al-Awael ERP Backend — Reverse Proxy
#  Domain: api.alawael.sa  (localhost for dev)
#  Upstream: Express on port 3001
# ─────────────────────────────────────────-

upstream backend {
    server 127.0.0.1:3001;
    keepalive 32;
}

# ──────────────────────────────────────────
#  HTTP Server (Port 80)
#  Redirect to HTTPS when SSL is enabled,
#  or proxy directly for local development.
# ──────────────────────────────────────────
server {
    listen      80;
    listen      [::]:80;
    server_name api.alawael.sa localhost;

    # For local dev without SSL, proxy directly.
    # When SSL is ready, uncomment the redirect below
    # and uncomment the HTTPS server block.

    # return 301 https://$server_name$request_uri;

    include /etc/nginx/conf.d/security.conf;

    # ──────────────────────────────────────────
    #  Health Checks — Passthrough (no rate limit)
    # ──────────────────────────────────────────
    location /health {
        proxy_pass         http://backend/health;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection "";
        proxy_connect_timeout 5s;
        proxy_send_timeout    5s;
        proxy_read_timeout    5s;
    }

    location /api/health {
        proxy_pass         http://backend/api/health;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection "";
        proxy_connect_timeout 5s;
        proxy_send_timeout    5s;
        proxy_read_timeout    5s;
    }

    # ──────────────────────────────────────────
    #  WebSocket / Socket.IO Support
    # ──────────────────────────────────────────
    location /socket.io/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;

        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ──────────────────────────────────────────
    #  API & General Reverse Proxy
    # ──────────────────────────────────────────
    location / {
        proxy_pass         http://backend;
        proxy_http_version 1.1;

        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host $host;
        proxy_set_header   X-Forwarded-Port $server_port;

        proxy_set_header   Connection "";
        proxy_hide_header  X-Powered-By;

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
        proxy_buffering       on;
        proxy_buffer_size     4k;
        proxy_buffers         8 4k;
    }

    location /api/ {
        proxy_pass         http://backend/;
        proxy_http_version 1.1;

        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host $host;
        proxy_set_header   X-Forwarded-Port $server_port;

        proxy_set_header   Connection "";
        proxy_hide_header  X-Powered-By;

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
        proxy_buffering       on;
        proxy_buffer_size     4k;
        proxy_buffers         8 4k;
    }

    # ──────────────────────────────────────────
    #  Error Pages
    # ──────────────────────────────────────────
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}

