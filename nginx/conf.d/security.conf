# ──────────────────────────────────────────
#  Al-Awael ERP — Security & Rate Limits
# ──────────────────────────────────────────

# ──────────────────────────────────────────
#  Hide Nginx version from error pages & headers
# ──────────────────────────────────────────
server_tokens off;

# ──────────────────────────────────────────
#  Rate Limiting: 100 req/min ≈ 2 r/s per IP
#   burst=20  -> allow 20 requests in a burst,
#   nodelay   -> serve immediately up to burst,
#   excess is queued (or rejected with 503 if queue full)
# ──────────────────────────────────────────
limit_req  zone=api_limit  burst=20  nodelay;

# ──────────────────────────────────────────
#  Connection Limiting: max 10 concurrent per IP
# ──────────────────────────────────────────
limit_conn conn_limit 10;

# ──────────────────────────────────────────
#  Security Headers
# ──────────────────────────────────────────

# Prevent clickjacking / iframe embedding
add_header X-Frame-Options "SAMEORIGIN" always;

# Prevent MIME type sniffing (force declared content-type)
add_header X-Content-Type-Options "nosniff" always;

# Referrer policy: only send origin to same-origin, strict-origin-when-cross-origin
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# HTTP Strict Transport Security (HSTS)
#   Uncomment once SSL is enabled and tested.
#   31536000 seconds = 1 year.
# add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# Content Security Policy (CSP) — strict baseline for API
#   Adjust if your frontend needs inline scripts/styles.
add_header Content-Security-Policy "default-src 'self'; frame-ancestors 'self';" always;

# Permissions Policy (formerly Feature Policy) — restrict browser features
add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;

# ──────────────────────────────────────────
#  Additional hardening
# ──────────────────────────────────────────

# Block access to hidden files (.git, .env, .htaccess, etc.)
location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
}

# Block access to backup / source files
location ~ \.(bak|swp|old|orig|save|git|svn|hg)$ {
    deny all;
    access_log off;
    log_not_found off;
}

# Block common exploit paths
location ~* (\^composer\.(json|lock)|package\.json|\.env|\.gitignore|\.htaccess)$ {
    deny all;
    access_log off;
    log_not_found off;
}
