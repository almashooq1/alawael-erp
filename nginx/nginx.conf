user  nginx;
worker_processes  auto;

# Error log level — use warn in production
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    use                 epoll;
    multi_accept        on;
}

http {
    # ──────────────────────────────────────────
    #  MIME & Core
    # ──────────────────────────────────────────
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ──────────────────────────────────────────
    #  Log Format
    # ──────────────────────────────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      'rt=$request_time uct="$upstream_connect_time" '
                      'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log  /var/log/nginx/access.log  main;

    # ──────────────────────────────────────────
    #  Performance
    # ──────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # ──────────────────────────────────────────
    #  Gzip Compression
    # ──────────────────────────────────────────
    gzip                on;
    gzip_vary           on;
    gzip_proxied        any;
    gzip_comp_level     6;
    gzip_types
        application/json
        application/javascript
        application/xml
        application/xml+rss
        text/javascript
        text/css
        text/plain
        text/xml
        image/svg+xml
        font/woff
        font/woff2;

    # ──────────────────────────────────────────
    #  Rate Limiting Zones
    #   100 req/min per IP  =>  1.6 r/s  (round to 2r/s for simplicity, burst=20)
    # ──────────────────────────────────────────
    limit_req_zone  $binary_remote_addr  zone=api_limit:10m  rate=2r/s;
    limit_conn_zone $binary_remote_addr  zone=conn_limit:10m  1;

    # ──────────────────────────────────────────
    #  SSL Settings (commented defaults for Let's Encrypt)
    # ──────────────────────────────────────────
    ssl_session_cache    shared:SSL:10m;
    ssl_session_timeout  1d;
    ssl_session_tickets  off;

    ssl_protocols        TLSv1.2 TLSv1.3;
    ssl_ciphers          HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ──────────────────────────────────────────
    #  Upload Limits
    # ──────────────────────────────────────────
    client_max_body_size  50M;
    client_body_timeout   30s;
    client_header_timeout 30s;

    # ──────────────────────────────────────────
    #  Include site-specific configs
    # ──────────────────────────────────────────
    include /etc/nginx/conf.d/*.conf;
}
