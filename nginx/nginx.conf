user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 4096;
  multi_accept on;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" rt=$request_time';

  map $request_uri $loggable {
    ~*^/health  0;
    default     1;
  }
  access_log /var/log/nginx/access.log main if=$loggable;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  keepalive_requests 1000;
  server_tokens off;
  client_max_body_size 100M;

  # Gzip compression
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 256;
  gzip_types text/plain text/css text/xml text/javascript
             application/json application/javascript application/xml+rss
             image/svg+xml;

  # Security headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "0" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Cache settings
  proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=erp_cache:10m max_size=200m inactive=60m use_temp_path=off;
  proxy_cache_path /var/cache/nginx/api levels=1:2 keys_zone=api_cache:5m max_size=50m inactive=5m use_temp_path=off;

  # Rate limiting zones
  limit_req_zone $binary_remote_addr zone=general_limit:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=15r/s;
  limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
  limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=2r/s;

  # Upstream servers
  upstream frontend {
    server frontend:80;
    keepalive 16;
  }

  upstream api_backend {
    least_conn;
    server backend:3001 weight=1 max_fails=3 fail_timeout=30s;
    keepalive 32;
  }

  upstream api_gateway {
    server api-gateway:8080;
    keepalive 16;
  }

  # ─── HTTP Server ───────────────────────────────────────────────────────────
  server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Health check endpoint
    location /health {
      access_log off;
      return 200 '{"status":"healthy","service":"nginx-proxy"}';
      add_header Content-Type application/json;
    }

    # Socket.IO — real-time WebSocket
    location /socket.io/ {
      proxy_pass http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_connect_timeout 1h;
      proxy_send_timeout 1h;
      proxy_read_timeout 1h;
      proxy_buffering off;
      proxy_cache off;
    }

    # API Gateway — unified entry point
    location /gateway/ {
      limit_req zone=api_limit burst=20 nodelay;
      rewrite ^/gateway/(.*)$ /$1 break;
      proxy_pass http://api_gateway;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";
      proxy_connect_timeout 30s;
      proxy_send_timeout 60s;
      proxy_read_timeout 60s;
    }

    # Auth routes — strict rate limiting
    location ~ ^/api/(v1/)?auth/ {
      limit_req zone=auth_limit burst=5 nodelay;
      proxy_pass http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";
      proxy_connect_timeout 10s;
      proxy_send_timeout 30s;
      proxy_read_timeout 30s;
      proxy_no_cache 1;
      proxy_cache_bypass 1;
    }

    # Upload routes — extended timeouts
    location ~ ^/api/(v1/)?(uploads|documents|attachments|files) {
      limit_req zone=upload_limit burst=5 nodelay;
      client_max_body_size 100M;
      proxy_pass http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";
      proxy_connect_timeout 60s;
      proxy_send_timeout 300s;
      proxy_read_timeout 300s;
      proxy_request_buffering off;
      proxy_no_cache 1;
      proxy_cache_bypass 1;
    }

    # API routes — general
    location /api/ {
      limit_req zone=api_limit burst=30 nodelay;
      proxy_pass http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $request_id;
      proxy_set_header Connection "";
      proxy_connect_timeout 30s;
      proxy_send_timeout 60s;
      proxy_read_timeout 60s;
      proxy_buffering on;
      proxy_buffer_size 8k;
      proxy_buffers 16 8k;
    }

    # Frontend — React SPA
    location / {
      limit_req zone=general_limit burst=50 nodelay;
      proxy_pass http://frontend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_connect_timeout 60s;
      proxy_send_timeout 60s;
      proxy_read_timeout 60s;

      # Cache static assets
      location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        proxy_pass http://frontend;
        proxy_cache erp_cache;
        proxy_cache_valid 200 30d;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
      }

      # Never cache service worker
      location = /service-worker.js {
        proxy_pass http://frontend;
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
      }
    }

    # Block sensitive paths
    location ~ /\. {
      deny all;
      access_log off;
      log_not_found off;
    }

    # Custom error pages
    error_page 502 503 504 /50x.html;
    location = /50x.html {
      internal;
      default_type text/html;
      return 502 '<!DOCTYPE html><html dir="rtl" lang="ar"><head><meta charset="utf-8"><title>خطأ مؤقت</title><style>body{text-align:center;font-family:sans-serif;padding:50px;background:#f5f5f5}h1{color:#e74c3c}</style></head><body><h1>🔧 خدمة غير متاحة مؤقتاً</h1><p>يرجى المحاولة بعد لحظات</p></body></html>';
    }
  }

  # ─── HTTPS Server (SSL) — للإنتاج فقط ─────────────────────────────────────
  # يتطلب شهادات SSL صالحة في /etc/nginx/ssl/
  # server {
  #   listen 443 ssl http2;
  #   ssl_certificate /etc/nginx/ssl/cert.pem;
  #   ssl_certificate_key /etc/nginx/ssl/key.pem;
  #   ssl_protocols TLSv1.2 TLSv1.3;
  #   include conf.d/ssl-params.conf;
  #   add_header Strict-Transport-Security "max-age=63072000" always;
  # }
}
