server {
    listen 80;
    listen [::]:80;
    server_name alaweal.org www.alaweal.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name alaweal.org www.alaweal.org;

    ssl_certificate /etc/letsencrypt/live/alaweal.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/alaweal.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers (hardening 2026-06-18): HSTS + clickjacking + MIME-sniff + referrer.
    # NOTE: nginx add_header is NOT inherited by locations that set their own add_header
    # (/api/, /uploads/, /socket.io/) — /api already gets these from the app (helmet).
    server_tokens off;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    root /home/alawael/app/frontend/build;
    index index.html;

    # API dashboard alias
    location = /api/dashboard {
        proxy_pass http://127.0.0.1:5000/api/dashboard/stats;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Content-Type $http_content_type;
        proxy_read_timeout 30s;
    }

    # Backend API
    location /api/ {
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin' 'https://alaweal.org' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET,POST,PUT,DELETE,PATCH,OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type,Authorization,X-Requested-With,X-CSRF-Token,X-Request-Id' always;
            add_header 'Access-Control-Max-Age' '86400' always;
            return 204;
        }
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Origin https://alaweal.org;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        add_header 'Access-Control-Allow-Origin' 'https://alaweal.org' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods' 'GET,POST,PUT,DELETE,PATCH,OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type,Authorization,X-Requested-With,X-CSRF-Token,X-Request-Id' always;
    }

    # WebSocket
    location /socket.io/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Origin https://alaweal.org;
        proxy_read_timeout 86400;
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        add_header 'Access-Control-Allow-Origin' 'https://alaweal.org' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
    }

    # Health check
    location /health {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Rehab ERP
    location = /rehab {
        return 303 $scheme://$host/rehab/;
    }
    location ^~ /rehab/ {
        proxy_pass http://127.0.0.1:3005/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /rehab;
    }

    # Phase 29 — public /forms/* alias (rewrites to Next.js /admin/forms/*)
    location ^~ /forms/ {
        rewrite ^/forms/(.*)$ /admin/forms/$1 break;
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_intercept_errors on;
        error_page 502 503 504 = @admin_down;
    }

    # Phase 27 — uploads static (admin-uploaded images, public-read)
    location ^~ /uploads/ {
        alias /home/alawael/app/uploads/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
        try_files $uri =404;
    }

    # Phase 25 — public /landing alias (rewrites to Next.js /admin/landing-preview)
    location = /landing {
        return 302 /landing/;
    }
    location ^~ /landing/ {
        rewrite ^/landing/?$ /admin/landing-preview break;
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_intercept_errors on;
        error_page 502 503 504 = @admin_down;
    }

    # Phase 22 — Next.js admin UI (PM2 alawael-web-admin on :3100)
    location ^~ /admin/_next/ {
        proxy_pass http://127.0.0.1:3100/admin/_next/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
    location ^~ /admin {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        # Graceful fallback when the web-admin upstream (:3100) is down: send the
        # user to the working legacy app at / instead of a raw 502.
        proxy_intercept_errors on;
        error_page 502 503 504 = @admin_down;
    }
    location @admin_down {
        # W1415: serve the legacy app directly (no redirect) so an admin-down
        # state does NOT loop now that / -> /admin. Graceful degrade to legacy.
        root /home/alawael/app/frontend/build;
        try_files /index.html =503;
    }
    # Service-worker scripts must NEVER be HTTP-cached — else a stale/old SW
    # (a cache-first one served old app shells → route 404s) can never be
    # replaced. Exact-match wins over the regex .js block below.
    location = /service-worker.js { add_header Cache-Control "no-cache, no-store, must-revalidate" always; try_files $uri =404; }
    location = /sw.js            { add_header Cache-Control "no-cache, no-store, must-revalidate" always; try_files $uri =404; }
    location = /registerSW.js    { add_header Cache-Control "no-cache, no-store, must-revalidate" always; try_files $uri =404; }

    # Static assets with long cache
    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # W1415: root now lands on the professional Next.js admin UI (/admin).
    # Exact-match (=) so ONLY the bare root redirects; legacy deep links, /api,
    # /admin, /forms, /landing, /rehab, /health, /socket.io, assets are all
    # unaffected. 302 (temporary) keeps this reversible.
    location = / {
        try_files /index.html =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }
}
