apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    password: ''
    user: ''
    database: ''
    basicAuth: false
    isDefault: true
    jsonData:
      timeInterval: 15s
      manageAlerts: true
      alertmanagerUid: alertmanager
    editable: true

  - name: Alertmanager
    type: alertmanager
    access: proxy
    url: http://alertmanager:9093
    password: ''
    user: ''
    database: ''
    basicAuth: false
    isDefault: false
    jsonData:
      implementation: prometheus
    editable: true
